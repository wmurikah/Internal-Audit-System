<!-- dashboard.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Audit Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=San+Francisco:wght@400&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'San Francisco', sans-serif;
      background-color: #f1f1f1;
      margin: 0;
      padding: 0;
    }
    .navbar {
      background-color: #4CAF50;
      color: white;
      padding: 15px;
      text-align: center;
    }
    .navbar a {
      color: white;
      text-decoration: none;
      margin: 0 15px;
    }
    .task-container {
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .task-table {
      width: 80%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    .task-table th, .task-table td {
      padding: 12px;
      border: 1px solid #ccc;
      text-align: center;
    }
    .task-table th {
      background-color: #4CAF50;
      color: white;
    }
    .button {
      background-color: #4CAF50;
      color: white;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
    }
    .button:hover {
      background-color: #45a049;
    }
  </style>
</head>
<body>
  <div class="navbar">
    <h2>Audit Tracker</h2>
    <a href="#">Dashboard</a>
    <a href="#">Logout</a>
  </div>
  <div class="task-container">
    <h3>Your Assigned Tasks</h3>
    <table class="task-table" id="taskTable">
      <thead>
        <tr>
          <th>Task Name</th>
          <th>Status</th>
          <th>Action</th>
          <th>Upload Evidence</th>
        </tr>
      </thead>
      <tbody>
        <!-- Tasks will be dynamically populated here -->
      </tbody>
    </table>
  </div>

  <script>
    function loadTasks() {
      google.script.run.withSuccessHandler(function(tasks) {
        var taskTable = document.getElementById("taskTable").getElementsByTagName('tbody')[0];
        tasks.forEach(function(task) {
          var row = taskTable.insertRow();
          row.insertCell(0).innerText = task[1]; // Task Name
          row.insertCell(1).innerText = task[4]; // Status
          var actionCell = row.insertCell(2);
          actionCell.innerHTML = '<button class="button" onclick="completeTask(' + task[0] + ')">Complete</button>';
          
          // Add evidence upload section for each task
          var uploadCell = row.insertCell(3);
          uploadCell.innerHTML = `
            <input type="file" id="fileUpload_${task[0]}" />
            <button class="button" onclick="uploadEvidence(${task[0]})">Upload</button>
          `;
        });
      }).getTasksForAuditee('auditee@example.com'); // Replace with actual email
    }

    function completeTask(taskId) {
      google.script.run.updateAuditTask(taskId, 'Completed', 'Task completed by auditee');
      loadTasks(); // Refresh tasks after completion
    }

    // Handle file upload for a specific task
    function uploadEvidence(taskId) {
      var fileInput = document.getElementById('fileUpload_' + taskId);
      var file = fileInput.files[0];

      if (file) {
        // Upload file to Google Drive and get file URL
        var fileUrl = uploadFileToDrive(file);
        google.script.run.uploadEvidence(taskId, 'auditee@example.com', fileUrl); // Link evidence to the task ID
      }
    }

    // Upload the file to Google Drive and return the file URL
    function uploadFileToDrive(file) {
      var blob = file.getBlob();
      var uploadedFile = DriveApp.createFile(blob);
      return uploadedFile.getUrl(); // Return the URL of the uploaded file
    }

    // Call the function when the page loads
    window.onload = loadTasks;
  </script>
</body>
</html>
