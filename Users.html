<!-- Users Page -->
<div class="users-page">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h5 class="mb-0">User Management</h5>
    <button class="btn btn-primary" onclick="showAddUser()"><i class="bi bi-person-plus me-2"></i>Add User</button>
  </div>

  <div class="filters-bar mb-4">
    <input type="text" class="form-control" placeholder="Search users..." id="userSearchInput" onkeyup="filterUsers()">
    <select class="form-select" id="userFilterRole" onchange="filterUsers()">
      <option value="">All Roles</option>
    </select>
    <select class="form-select" id="userFilterStatus" onchange="filterUsers()">
      <option value="">All Status</option>
      <option value="true">Active</option>
      <option value="false">Inactive</option>
    </select>
  </div>

  <div class="table-container">
    <table class="table table-hover">
      <thead>
        <tr><th>Name</th><th>Email</th><th>Role</th><th>Affiliate</th><th>Status</th><th>Last Login</th><th>Actions</th></tr>
      </thead>
      <tbody id="usersTableBody">
        <tr><td colspan="7" class="text-center py-5"><div class="spinner-border text-primary"></div></td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
let usersData = [];

function loadUsers() {
  // Populate role filter if dropdowns are ready (don't block on this)
  const roleSelect = document.getElementById('userFilterRole');
  if (roleSelect && window.appDropdowns?.roles) {
    roleSelect.innerHTML = '<option value="">All Roles</option>';
    window.appDropdowns.roles.forEach(r => roleSelect.innerHTML += `<option value="${r.code}">${r.name}</option>`);
  }
  
  showLoading('Loading users...');
  apiCall('getUsers', { filters: {} }).then(r => {
    hideLoading();
    if (r.success && r.users) { usersData = r.users; renderUsers(); }
    else showToast('Error loading users', 'danger');
  }).catch(() => { hideLoading(); showToast('Error', 'danger'); });
}

function renderUsers() {
  const search = (document.getElementById('userSearchInput')?.value || '').toLowerCase();
  const role = document.getElementById('userFilterRole')?.value;
  const status = document.getElementById('userFilterStatus')?.value;

  let filtered = usersData.filter(u => {
    if (search && !u.full_name?.toLowerCase().includes(search) && !u.email?.toLowerCase().includes(search)) return false;
    if (role && u.role_code !== role) return false;
    if (status !== '' && String(u.is_active) !== status) return false;
    return true;
  });

  const tbody = document.getElementById('usersTableBody');
  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="text-center py-4 text-muted">No users found</td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map(u => `
    <tr>
      <td>${escapeHtml(u.full_name || '-')}</td>
      <td>${escapeHtml(u.email || '-')}</td>
      <td>${escapeHtml(u.role_code || '-')}</td>
      <td>${u.affiliate_code || '-'}</td>
      <td><span class="badge ${u.is_active ? 'bg-success' : 'bg-secondary'}">${u.is_active ? 'Active' : 'Inactive'}</span></td>
      <td class="small text-muted">${u.last_login ? formatDate(u.last_login) : 'Never'}</td>
      <td>
        <div class="dropdown">
          <button class="btn btn-sm btn-outline-secondary" data-bs-toggle="dropdown"><i class="bi bi-three-dots-vertical"></i></button>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" href="#" onclick="editUser('${u.user_id}')"><i class="bi bi-pencil me-2"></i>Edit</a></li>
            <li><a class="dropdown-item" href="#" onclick="resetUserPassword('${u.user_id}')"><i class="bi bi-key me-2"></i>Reset Password</a></li>
            ${u.is_active ? `<li><a class="dropdown-item text-danger" href="#" onclick="deactivateUser('${u.user_id}')"><i class="bi bi-person-x me-2"></i>Deactivate</a></li>` : ''}
          </ul>
        </div>
      </td>
    </tr>
  `).join('');
}

function filterUsers() { renderUsers(); }

function showAddUser() {
  document.getElementById('userFormId').value = '';
  document.getElementById('userForm').reset();
  document.getElementById('userModalLabel').textContent = 'Add User';
  populateDropdown('userFormRole', window.appDropdowns?.roles || [], 'code', 'name', 'Select Role');
  populateDropdown('userFormAffiliate', window.appDropdowns?.affiliates || [], 'code', 'display', 'Select Affiliate');
  new bootstrap.Modal(document.getElementById('userFormModal')).show();
}

function editUser(id) {
  const user = usersData.find(u => u.user_id === id);
  if (!user) return;
  document.getElementById('userFormId').value = user.user_id;
  document.getElementById('userFormName').value = user.full_name || '';
  document.getElementById('userFormEmail').value = user.email || '';
  populateDropdown('userFormRole', window.appDropdowns?.roles || [], 'code', 'name', 'Select Role');
  populateDropdown('userFormAffiliate', window.appDropdowns?.affiliates || [], 'code', 'display', 'Select Affiliate');
  document.getElementById('userFormRole').value = user.role_code || '';
  document.getElementById('userFormAffiliate').value = user.affiliate_code || '';
  document.getElementById('userModalLabel').textContent = 'Edit User';
  new bootstrap.Modal(document.getElementById('userFormModal')).show();
}

function saveUser() {
  const id = document.getElementById('userFormId').value;
  const data = {
    full_name: document.getElementById('userFormName').value,
    email: document.getElementById('userFormEmail').value,
    role_code: document.getElementById('userFormRole').value,
    affiliate_code: document.getElementById('userFormAffiliate').value
  };
  if (id) data.userId = id;

  showLoading('Saving...');
  apiCall(id ? 'updateUser' : 'createUser', data).then(r => {
    hideLoading();
    bootstrap.Modal.getInstance(document.getElementById('userFormModal')).hide();
    if (r.success) {
      showToast(id ? 'Updated' : 'User created', 'success');
      if (r.tempPassword) showToast('Temp password: ' + r.tempPassword, 'info', 10000);
      loadUsers();
    } else showToast(r.error || 'Error', 'danger');
  }).catch(() => { hideLoading(); showToast('Error', 'danger'); });
}

function resetUserPassword(id) {
  if (!confirm('Reset password for this user?')) return;
  showLoading('Resetting...');
  apiCall('resetPassword', { userId: id }).then(r => {
    hideLoading();
    if (r.success) showToast('Password reset. Temp: ' + r.tempPassword, 'success', 10000);
    else showToast(r.error || 'Error', 'danger');
  }).catch(() => { hideLoading(); showToast('Error', 'danger'); });
}

function deactivateUser(id) {
  if (!confirm('Deactivate this user?')) return;
  showLoading('Processing...');
  apiCall('deactivateUser', { userId: id }).then(r => {
    hideLoading();
    if (r.success) { showToast('Deactivated', 'success'); loadUsers(); }
    else showToast(r.error || 'Error', 'danger');
  }).catch(() => { hideLoading(); showToast('Error', 'danger'); });
}
</script>
