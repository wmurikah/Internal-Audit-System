// ===============================================================================
// CACHE MANAGEMENT SYSTEM
// ===============================================================================
const CacheManager = {
  cache: new Map(),
  
  set(key, data, ttl = 300000) {
    const cacheEntry = { data, timestamp: Date.now(), ttl };
    this.cache.set(key, cacheEntry);
    try {
      localStorage.setItem(`app_cache_${key}`, JSON.stringify(cacheEntry));
    } catch (e) {
      console.warn('localStorage not available:', e.message);
    }
  },
  
  get(key) {
    const cached = this.cache.get(key);
    if (cached && Date.now() - cached.timestamp < cached.ttl) {
      return cached.data;
    }
    
    try {
      const localStorageData = localStorage.getItem(`app_cache_${key}`);
      if (localStorageData) {
        const parsedCache = JSON.parse(localStorageData);
        if (Date.now() - parsedCache.timestamp < parsedCache.ttl) {
          this.cache.set(key, parsedCache);
          return parsedCache.data;
        }
        localStorage.removeItem(`app_cache_${key}`);
      }
    } catch (e) {
      console.warn('Error reading from localStorage:', e.message);
    }
    
    this.cache.delete(key);
    return null;
  },
  
  clear(pattern = null) {
    if (pattern) {
      const keysToDelete = [];
      this.cache.forEach((value, key) => {
        if (key.includes(pattern)) keysToDelete.push(key);
      });
      keysToDelete.forEach(key => this.cache.delete(key));
    } else {
      this.cache.clear();
    }
    
    try {
      Object.keys(localStorage).forEach(key => {
        if (key.startsWith('app_cache_') && (!pattern || key.includes(pattern))) {
          localStorage.removeItem(key);
        }
      });
    } catch (e) {
      console.warn('Error clearing localStorage:', e.message);
    }
  }
};

function showToast(message, type = 'info', duration = 5000) {
  const toastContainer = document.querySelector('.toast-container');
  if (!toastContainer) return;

  const toastId = 'toast-' + Date.now();
  const iconMap = {
    success: 'check-circle',
    danger: 'exclamation-circle',
    warning: 'exclamation-triangle',
    info: 'info-circle'
  };

  const toastHtml = `
    <div class="toast align-items-center text-bg-${type} border-0" role="alert" id="${toastId}">
      <div class="d-flex">
        <div class="toast-body">
          <i class="fas fa-${iconMap[type]} me-2"></i>
          ${escapeHtml(message)}
        </div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  `;

  toastContainer.insertAdjacentHTML('beforeend', toastHtml);

  const toastElement = document.getElementById(toastId);
  if (toastElement) {
    const toast = new bootstrap.Toast(toastElement, {
      autohide: true,
      delay: type === 'success' ? 3000 : duration
    });

    toast.show();

    toastElement.addEventListener('hidden.bs.toast', function() {
      this.remove();
    });
  }
}

// HTML ESCAPING FOR SECURITY
function escapeHtml(str) {
  if (typeof str !== 'string') str = String(str);
  return str.replace(/[&<>"'`]/g, function(match) {
    const escapeMap = {
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#39;',
      '`': '&#96;'
    };
    return escapeMap[match];
  });
}

function escapeAttr(str) {
  return String(str).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function safeDate(value) {
  try { 
    return new Date(value); 
  } catch(e) { 
    return null; 
  }
}

function formatDateSafe(value) {
  const date = safeDate(value);
  return date ? date.toLocaleDateString() : 'N/A';
}

// ===============================================================================
// SERVER COMMUNICATION SYSTEM
// ===============================================================================
function callServer(functionName, ...args) {
  return new Promise((resolve, reject) => {
    if (AppState.debugMode) {
      console.group(`🔍 Server Call: ${functionName}`);
      console.log('Arguments:', args.length > 0 ? args : '(none)');
    }

    const timeoutId = setTimeout(() => {
      if (AppState.debugMode) console.groupEnd();
      reject(new Error(`Server request timed out after 60 seconds`));
    }, 60000);

    try {
      const runner = google.script.run
        .withSuccessHandler((result) => {
          clearTimeout(timeoutId);
          if (AppState.debugMode) {
            console.log('✅ Success:', result);
            console.groupEnd();
          }
          resolve(result);
        })
        .withFailureHandler((error) => {
          clearTimeout(timeoutId);
          if (AppState.debugMode) {
            console.error('❌ Server Error:', error);
            console.groupEnd();
          }
          
          let errorMessage = error.message || error.toString() || 'Unknown server error';
          
          if (errorMessage.includes('not found') || errorMessage.includes('is not a function')) {
            errorMessage = `Function '${functionName}' not found on server.`;
          }
          
          reject(new Error(errorMessage));
        });

      if (typeof runner[functionName] !== 'function') {
        clearTimeout(timeoutId);
        if (AppState.debugMode) {
          console.error(`🚫 Function '${functionName}' not available`);
          console.groupEnd();
        }
        reject(new Error(`Server function '${functionName}' is not available`));
        return;
      }

      runner[functionName](...args);
      
    } catch (error) {
      clearTimeout(timeoutId);
      if (AppState.debugMode) {
        console.error('Client-side error:', error);
        console.groupEnd();
      }
      reject(new Error(`Client-side error calling ${functionName}: ${error.message}`));
    }
  });
}

// ===============================================================================

function getStatusBadgeClass(status) {
  if (!status) return 'bg-secondary';
  const s = status.toString().toLowerCase();
  
  if (['completed', 'closed', 'resolved', 'approved'].includes(s)) return 'bg-success';
  if (['in progress', 'review', 'pending review', 'submitted for review'].includes(s)) return 'bg-warning text-dark';
  if (['planning', 'open', 'not started', 'draft'].includes(s)) return 'bg-primary';
  if (['overdue', 'rejected', 'reopened', 'returned'].includes(s)) return 'bg-danger';
  
  return 'bg-secondary';
}

function getRiskBadgeClass(risk) {
  if (!risk) return 'bg-secondary';
  const r = risk.toString().toLowerCase();
  
  if (r === 'extreme') return 'bg-danger';
  if (r === 'high') return 'bg-warning text-dark';
  if (r === 'medium') return 'bg-info text-dark';
  if (r === 'low') return 'bg-success';
  
  return 'bg-secondary';
}

function renderIssuesPage(issues, loadTime) {
  const content = document.getElementById('pageContent');

    highRisk: issues.filter(i => ['Extreme', 'High'].includes(i.risk_rating)).length,
    overdue: issues.filter(i => {
      if (!i.due_date || ['Resolved', 'Closed'].includes(i.status)) return false;
      try {
        return new Date(i.due_date) < new Date();
      } catch (e) {
        return false;
      }
    }).length
  };
  
  content.innerHTML = `
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h3 class="mb-1">
          <i class="fas fa-exclamation-triangle text-warning me-2"></i>Issue Management
        </h3>
        <p class="text-muted mb-0">
          Track and resolve audit findings • ${stats.total} total issues
          ${loadTime < 1000 ? ` • ⚡ Loaded in ${loadTime}ms` : ''}
        </p>
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-outline-primary" onclick="loadPage('issues')">
          <i class="fas fa-sync-alt me-1"></i>Refresh
        </button>
        ${user?.permissions?.includes('create') ? `
        <button class="btn btn-success" onclick="createNewIssue()">
          <i class="fas fa-plus me-2"></i>New Issue
        </button>
        ` : ''}
      </div>
    </div>

    <div class="row g-4 mb-4">
      <div class="col-lg-3 col-md-6">
        <div class="stat-card">
          <i class="fas fa-list-alt text-primary stat-icon"></i>
          <div class="stat-number">${stats.total}</div>
          <div class="stat-label">Total Issues</div>
        </div>
      </div>
      <div class="col-lg-3 col-md-6">
        <div class="stat-card">
          <i class="fas fa-exclamation-circle text-warning stat-icon"></i>
          <div class="stat-number">${stats.open}</div>
          <div class="stat-label">Open Issues</div>
        </div>
      </div>
      <div class="col-lg-3 col-md-6">
        <div class="stat-card">
          <i class="fas fa-fire text-danger stat-icon"></i>
          <div class="stat-number">${stats.highRisk}</div>
          <div class="stat-label">High Risk</div>
        </div>
      </div>
      <div class="col-lg-3 col-md-6">
        <div class="stat-card">
          <i class="fas fa-clock text-dark stat-icon"></i>
          <div class="stat-number">${stats.overdue}</div>
          <div class="stat-label">Overdue</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0">
          <i class="fas fa-table me-2"></i>Issues from Worksheet
        </h5>
        <div class="d-flex gap-2">
          <select class="form-select form-select-sm" style="width: auto;" id="statusFilter" onchange="filterIssues()">
            <option value="">All Statuses</option>
            <option value="Open">Open</option>
            <option value="In Progress">In Progress</option>
            <option value="Under Review">Under Review</option>
            <option value="Resolved">Resolved</option>
            <option value="Closed">Closed</option>
          </select>
          <select class="form-select form-select-sm" style="width: auto;" id="riskFilter" onchange="filterIssues()">
            <option value="">All Risk Levels</option>
            <option value="Extreme">Extreme</option>
            <option value="High">High</option>
            <option value="Medium">Medium</option>
            <option value="Low">Low</option>

        </div>
      </div>
      <div class="card-body p-0">
        ${renderIssuesTable(issues)}
      </div>

  `;
}

function renderIssuesTable(issues) {
  if (!issues || issues.length === 0) {
    return `
      <div class="text-center py-5">
        <i class="fas fa-inbox text-muted" style="font-size: 4rem;"></i>
        <h4 class="mt-3 text-muted">No Issues Found</h4>
        <p class="text-muted">Issues from your worksheet will appear here.</p>
        <div class="mt-4">
          <button class="btn btn-primary" onclick="createNewIssue()">
            <i class="fas fa-plus me-1"></i>Add First Issue
          </button>
          <button class="btn btn-outline-secondary ms-2" onclick="loadPage('dashboard')">
            <i class="fas fa-arrow-left me-1"></i>Back to Dashboard
          </button>
        </div>
      </div>
    `;
  }

  return `
    <div class="table-responsive">
      <table class="table table-hover mb-0" id="issuesTable">
        <thead class="table-light">
          <tr>
            <th style="width: 120px;">ID</th>
            <th>Title</th>
            <th style="width: 100px;">Risk</th>
            <th style="width: 120px;">Status</th>
            <th style="width: 150px;">Owner</th>
            <th style="width: 120px;">Due Date</th>
            <th style="width: 100px;">Actions</th>
          </tr>
        </thead>
        <tbody>
          ${issues.map(issue => renderIssueRow(issue)).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function renderIssueRow(issue) {
  const isOverdue = issue.due_date && !['Resolved', 'Closed'].includes(issue.status) && 
                    new Date(issue.due_date) < new Date();
                    
  return `
    <tr class="issue-row ${isOverdue ? 'table-warning' : ''}" 
        data-status="${escapeAttr(issue.status || '')}" 
        data-risk="${escapeAttr(issue.risk_rating || '')}">
      <td>
        <strong class="text-primary">${escapeHtml(issue.id || 'N/A')}</strong>
        ${isOverdue ? '<i class="fas fa-clock text-danger ms-1" title="Overdue"></i>' : ''}
      </td>
      <td>
        <div class="fw-medium">${escapeHtml(issue.title || 'Untitled Issue')}</div>
        ${issue.audit_id ? `<small class="text-muted">Audit: ${escapeHtml(issue.audit_id)}</small>` : ''}
      </td>
      <td>
        <span class="badge ${getRiskBadgeClass(issue.risk_rating)}">
          ${escapeHtml(issue.risk_rating || 'Unknown')}
        </span>
      </td>
      <td>
        <span class="badge ${getStatusBadgeClass(issue.status)}">
          ${escapeHtml(issue.status || 'Unknown')}
        </span>
      </td>
      <td>
        <div>
          <div class="fw-medium">${issue.owner_email ? escapeHtml(issue.owner_email.split('@')[0]) : 'Unassigned'}</div>
          ${issue.owner_email ? `<small class="text-muted">${escapeHtml(issue.owner_email)}</small>` : ''}
        </div>
      </td>
      <td>
        ${issue.due_date ? `
          <div class="text-${isOverdue ? 'danger' : 'dark'} fw-medium">
            ${formatDateSafe(issue.due_date)}
          </div>
          ${isOverdue ? '<small class="text-danger fw-bold">OVERDUE</small>' : ''}
        ` : '<span class="text-muted">No date set</span>'}
      </td>
      <td>
        <div class="btn-group" role="group">
          <button class="btn btn-sm btn-outline-primary" onclick="viewIssue('${escapeAttr(issue.id || '')}')" title="View Details">
            <i class="fas fa-eye"></i>
          </button>
          ${AppState.currentUser?.permissions?.includes('update') ? `
          <button class="btn btn-sm btn-outline-warning" onclick="editIssue('${escapeAttr(issue.id || '')}')" title="Edit Issue">
            <i class="fas fa-edit"></i>
          </button>
          ` : ''}
        </div>
      </td>
    </tr>
  `;
}

// FILTERING FUNCTION
function filterIssues() {
  const statusFilter = document.getElementById('statusFilter')?.value || '';
  const riskFilter = document.getElementById('riskFilter')?.value || '';
  const rows = document.querySelectorAll('#issuesTable tbody tr');
  
  rows.forEach(row => {
    const rowStatus = row.getAttribute('data-status') || '';
    const rowRisk = row.getAttribute('data-risk') || '';
    
    const statusMatch = !statusFilter || rowStatus === statusFilter;
    const riskMatch = !riskFilter || rowRisk === riskFilter;
    
    row.style.display = (statusMatch && riskMatch) ? '' : 'none';
  });
}

function toggleApiKeyVisibility() {
  const input = document.getElementById('openaiApiKey');
  const icon = document.getElementById('apiKeyToggleIcon');
  
  if (input.type === 'password') {
    input.type = 'text';
    icon.className = 'fas fa-eye-slash';
  } else {
    input.type = 'password';
    icon.className = 'fas fa-eye';
  }

async function saveAIConfig() {
  const apiKey = document.getElementById('openaiApiKey').value.trim();
  
  if (!apiKey) {
    showToast('Please enter an OpenAI API key', 'warning');
    return;
  }
  
  if (!apiKey.startsWith('sk-')) {
    showToast('Invalid API key format. OpenAI keys start with "sk-"', 'warning');
    return;
  }
  
  try {
    const config = await callServer('getConfig');
    config.OPENAI_API_KEY = apiKey;
    
    const result = await callServer('updateConfig', config);
    
    if (result.success) {
      showToast('AI configuration saved successfully!', 'success');
    } else {
      showToast('Error saving AI configuration: ' + result.error, 'danger');
    }
  } catch (error) {
    showToast('Error saving AI configuration: ' + error.message, 'danger');
  }
}

function performLogout() {
  if (confirm('Are you sure you want to logout?')) {
    callServer('performLogout').then(result => {
      if (result && result.success) {
        CacheManager.clear();
        window.location.href = result.redirectUrl || window.location.href + '?logout=1';
      }
    }).catch(error => {
      showToast('Logout failed: ' + error.message, 'danger');
    });
  }
}

  }

function setupEventHandlers() {
  const refreshBtn = document.getElementById('refreshBtn');
  if (refreshBtn) {
    refreshBtn.addEventListener('click', () => {
      const icon = refreshBtn.querySelector('i');
      const originalClass = icon.className;
      
      icon.className = 'fas fa-spinner fa-spin';
      refreshBtn.disabled = true;
      
      CacheManager.clear(AppState.currentPage);
      
      loadPage(AppState.currentPage).finally(() => {
        setTimeout(() => {
          icon.className = originalClass;
          refreshBtn.disabled = false;
          showToast('Page refreshed', 'success');
        }, 1000);
      });
    });
  }
}
