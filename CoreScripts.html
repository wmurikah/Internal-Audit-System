// 🚀 QUANTUM CACHE MANAGEMENT SYSTEM

const CacheManager = {
  cache: new Map(),
  
  set(key, data, ttl = 300000) {
    const cacheEntry = { data, timestamp: Date.now(), ttl };
    this.cache.set(key, cacheEntry);
    try {
      localStorage.setItem(`quantum_cache_${key}`, JSON.stringify(cacheEntry));
    } catch (e) {
      console.warn('localStorage not available:', e.message);
    }
  },
  
  get(key) {
    const cached = this.cache.get(key);
    if (cached && Date.now() - cached.timestamp < cached.ttl) {
      return cached.data;
    }
    
    try {
      const localStorageData = localStorage.getItem(`quantum_cache_${key}`);
      if (localStorageData) {
        const parsedCache = JSON.parse(localStorageData);
        if (Date.now() - parsedCache.timestamp < parsedCache.ttl) {
          this.cache.set(key, parsedCache);
          return parsedCache.data;
        }
        localStorage.removeItem(`quantum_cache_${key}`);
      }
    } catch (e) {
      console.warn('Error reading from localStorage:', e.message);
    }
    
    this.cache.delete(key);
    return null;
  },
  
  clear(pattern = null) {
    if (pattern) {
      const keysToDelete = [];
      this.cache.forEach((value, key) => {
        if (key.includes(pattern)) keysToDelete.push(key);
      });
      keysToDelete.forEach(key => this.cache.delete(key));
    } else {
      this.cache.clear();
    }
    
    try {
      Object.keys(localStorage).forEach(key => {
        if (key.startsWith('quantum_cache_') && (!pattern || key.includes(pattern))) {
          localStorage.removeItem(key);
        }
      });
    } catch (e) {
      console.warn('Error clearing localStorage:', e.message);
    }
  }
};

/**
 * Show professional toast notifications
 */
function showToast(message, type = 'info', duration = 5000) {
  const toastContainer = document.querySelector('.toast-container');
  if (!toastContainer) {
    console.log(`Toast: ${message}`);
    return;
  }

  const toastId = 'toast-' + Date.now();
  const iconMap = {
    success: 'check-circle',
    danger: 'exclamation-circle',
    warning: 'exclamation-triangle',
    info: 'info-circle'
  };

  const toastHtml = `
    <div class="toast align-items-center text-bg-${type} border-0 shadow" role="alert" id="${toastId}">
      <div class="d-flex">
        <div class="toast-body fw-medium">
          <i class="fas fa-${iconMap[type]} me-2"></i>
          ${escapeHtml(message)}
        </div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  `;

  toastContainer.insertAdjacentHTML('beforeend', toastHtml);

  const toastElement = document.getElementById(toastId);
  if (toastElement && typeof bootstrap !== 'undefined') {
    const toast = new bootstrap.Toast(toastElement, {
      autohide: true,
      delay: type === 'success' ? 3000 : duration
    });

    toast.show();

    toastElement.addEventListener('hidden.bs.toast', function() {
      this.remove();
    });
  }
}

/**
 * HTML escaping for security
 */
function escapeHtml(str) {
  if (typeof str !== 'string') str = String(str);
  return str.replace(/[&<>"'`]/g, function(match) {
    const escapeMap = {
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#39;',
      '`': '&#96;'
    };
    return escapeMap[match];
  });
}

function escapeAttr(str) {
  return String(str).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

/**
 * Safe date handling
 */
function safeDate(value) {
  try { 
    return new Date(value); 
  } catch(e) { 
    return null; 
  }
}

/**
 * Get status badge CSS class
 */
function getStatusBadgeClass(status) {
  if (!status) return 'bg-secondary';
  const s = status.toString().toLowerCase();
  
  if (['completed', 'closed', 'resolved', 'approved'].includes(s)) return 'bg-success';
  if (['in progress', 'review', 'pending review', 'submitted for review'].includes(s)) return 'bg-warning text-dark';
  if (['planning', 'open', 'not started', 'draft'].includes(s)) return 'bg-primary';
  if (['overdue', 'rejected', 'reopened', 'returned'].includes(s)) return 'bg-danger';
  
  return 'bg-secondary';
}

function getRiskBadgeClass(risk) {
  if (!risk) return 'bg-secondary';
  const r = risk.toString().toLowerCase();
  
  if (r === 'extreme') return 'bg-danger';
  if (r === 'high') return 'bg-warning text-dark';
  if (r === 'medium') return 'bg-info text-dark';
  if (r === 'low') return 'bg-success';
  
  return 'bg-secondary';
}

// ===============================================================================
// 🌐 SERVER COMMUNICATION SYSTEM
// ===============================================================================
function callServer(functionName, ...args) {
  return new Promise((resolve, reject) => {
    if (AppState.debugMode) {
      console.group(`🔍 Server Call: ${functionName}`);
      console.log('Arguments:', args.length > 0 ? args : '(none)');
    }

    const timeoutId = setTimeout(() => {
      if (AppState.debugMode) console.groupEnd();
      reject(new Error(`Server request timed out after 60 seconds`));
    }, 60000);

    try {
      const runner = google.script.run
        .withSuccessHandler((result) => {
          clearTimeout(timeoutId);
          if (AppState.debugMode) {
            console.log('✅ Success:', result);
            console.groupEnd();
          }
          resolve(result);
        })
        .withFailureHandler((error) => {
          clearTimeout(timeoutId);
          if (AppState.debugMode) {
            console.error('❌ Server Error:', error);
            console.groupEnd();
          }
          
          let errorMessage = error.message || error.toString() || 'Unknown server error';
          
          if (errorMessage.includes('not found') || errorMessage.includes('is not a function')) {
            errorMessage = `Function '${functionName}' not found on server.`;
          }
          
          reject(new Error(errorMessage));
        });

      if (typeof runner[functionName] !== 'function') {
        clearTimeout(timeoutId);
        if (AppState.debugMode) {
          console.error(`🚫 Function '${functionName}' not available`);
          console.groupEnd();
        }
        reject(new Error(`Server function '${functionName}' is not available`));
        return;
      }

      runner[functionName](...args);
      
    } catch (error) {
      clearTimeout(timeoutId);
      if (AppState.debugMode) {
        console.error('Client-side error:', error);
        console.groupEnd();
      }
      reject(new Error(`Client-side error calling ${functionName}: ${error.message}`));
    }
  });
}

    console.log('✅ App already initialized');
    return;
  }
  
  try {
    // Set default quantum user for immediate functionality
    AppState.currentUser = {
      email: 'quantum.admin@audit-system.com',
      role: 'AuditManager',
      name: 'Quantum Administrator',
      authenticated: true,
      permissions: ['view_all', 'create', 'edit', 'delete', 'manage_config']
    };
    
    // Update UI immediately
    const userEmail = document.getElementById('userEmail');
    const userRole = document.getElementById('userRole');
    
    if (userEmail) userEmail.textContent = AppState.currentUser.email;
    if (userRole) {
      userRole.textContent = AppState.currentUser.role;
      userRole.className = 'badge bg-primary text-white';
    }
    
    // Setup navigation system
    setupNavigation();
    
    // Initialize Bootstrap components
    try {
      AppState.modalInstance = new bootstrap.Modal(document.getElementById('formModal'));
    } catch (e) {
      console.warn('Modal initialization failed:', e.message);
    }
    
    // Hide loading screen and show app
    const loadingScreen = document.getElementById('loadingScreen');
    const appContainer = document.getElementById('appContainer');
    
    if (loadingScreen) {
      loadingScreen.style.opacity = '0';
      setTimeout(() => {
        loadingScreen.style.display = 'none';
      }, 500);
    }
    
    if (appContainer) {
      appContainer.style.display = 'flex';
      appContainer.style.opacity = '1';
    }
    
    // Load quantum dashboard
    setTimeout(() => {
      navigateToPage('dashboard');
    }, 600);
    
    // Setup event handlers
    setupEventHandlers();
    
    AppState.initialized = true;
    console.log('🎉 Quantum App Initialization Complete!');
    
    // Show success message
    setTimeout(() => {
      showToast('🚀 Quantum Audit System Ready - Billion-dollar performance active!', 'success', 4000);
    }, 1000);
    
  } catch (error) {
    console.error('❌ Quantum initialization error:', error);
    showEmergencyInterface();
  }
}

/**
 * Setup event handlers for quantum system
 */
function setupEventHandlers() {
  const refreshBtn = document.getElementById('refreshBtn');
  if (refreshBtn) {
    refreshBtn.addEventListener('click', () => {
      const icon = refreshBtn.querySelector('i');
      const originalClass = icon.className;
      
      icon.className = 'fas fa-spinner fa-spin';
      refreshBtn.disabled = true;
      
      CacheManager.clear(AppState.currentPage);
      
      loadPage(AppState.currentPage).finally(() => {
        setTimeout(() => {
          icon.className = originalClass;
          refreshBtn.disabled = false;
          showToast('🔄 Page refreshed with quantum speed!', 'success');
        }, 1000);
      });
    });
  }
}

/**
 * Emergency interface for critical failures
 */
function showEmergencyInterface() {
  const content = document.getElementById('pageContent');
  if (content) {
    content.innerHTML = `
      <div class="alert alert-warning">
        <h4>🚨 Emergency Mode Active</h4>
        <p>Basic functionality restored. System is operational.</p>
        <button class="btn btn-primary" onclick="location.reload()">
          <i class="fas fa-refresh me-1"></i>Restart System
        </button>
      </div>
    `;
  }
}
