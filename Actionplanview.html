<!-- Action Plan View Page -->
<div class="action-plan-view">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <button class="btn btn-outline-secondary btn-sm" onclick="navigateTo('action-plans')"><i class="bi bi-arrow-left me-1"></i>Back</button>
    <div class="btn-group" id="apViewActions"></div>
  </div>

  <div class="row">
    <div class="col-lg-8">
      <div class="card mb-4">
        <div class="card-header d-flex justify-content-between">
          <span><i class="bi bi-list-check me-2"></i><span id="apViewId">-</span></span>
          <span class="badge" id="apViewStatus">-</span>
        </div>
        <div class="card-body">
          <h5>Action Description</h5>
          <p id="apViewDesc">-</p>
          <hr>
          <div class="row g-3">
            <div class="col-md-6"><strong>Work Paper:</strong> <a href="#" id="apViewWPLink">-</a></div>
            <div class="col-md-6"><strong>Due Date:</strong> <span id="apViewDue">-</span></div>
            <div class="col-md-6"><strong>Owner(s):</strong> <span id="apViewOwners">-</span></div>
            <div class="col-md-6"><strong>Days Overdue:</strong> <span id="apViewOverdue">-</span></div>
          </div>
        </div>
      </div>

      <!-- Implementation -->
      <div class="card mb-4">
        <div class="card-header"><i class="bi bi-check2-square me-2"></i>Implementation</div>
        <div class="card-body">
          <div class="mb-3">
            <label class="form-label">Implementation Notes</label>
            <textarea class="form-control" id="apViewNotes" rows="4"></textarea>
          </div>
          <div id="apImplementBtn"></div>
        </div>
      </div>

      <!-- Evidence -->
      <div class="card mb-4">
        <div class="card-header d-flex justify-content-between align-items-center">
          <span><i class="bi bi-paperclip me-2"></i>Evidence Documents</span>
          <span class="badge bg-secondary" id="evidenceCount">0</span>
        </div>
        <div class="card-body">
          <!-- Inline Upload Zone -->
          <div class="ap-upload-zone" id="apUploadZone" onclick="document.getElementById('apEvidenceFileInput').click()">
            <input type="file" class="d-none" id="apEvidenceFileInput"
                   accept=".pdf,.doc,.docx,.xls,.xlsx,.png,.jpg,.jpeg"
                   onchange="handleAPEvidenceUpload(this)">
            <i class="bi bi-cloud-arrow-up ap-upload-icon"></i>
            <div class="ap-upload-text">
              <strong>Drop files here or click to browse</strong>
              <br><small class="text-muted">PDF, Word, Excel, Images (Max 10MB)</small>
            </div>
          </div>

          <!-- Evidence Files List -->
          <div id="apViewEvidence" class="ap-evidence-list mt-3"></div>
        </div>
      </div>
    </div>

    <div class="col-lg-4">
      <!-- Status History -->
      <div class="card mb-4">
        <div class="card-header"><i class="bi bi-clock-history me-2"></i>History</div>
        <div class="card-body">
          <div class="timeline" id="apViewHistory"></div>
        </div>
      </div>

      <!-- Review Section -->
      <div class="card mb-4" id="apReviewCard" style="display:none;">
        <div class="card-header"><i class="bi bi-clipboard-check me-2"></i>Verification</div>
        <div class="card-body">
          <div class="mb-3">
            <label class="form-label">Auditor Comments</label>
            <textarea class="form-control" id="apReviewComments" rows="3"></textarea>
          </div>
          <div class="d-grid gap-2">
            <button class="btn btn-success" onclick="verifyAP('approve')"><i class="bi bi-check-circle me-1"></i>Verify</button>
            <button class="btn btn-warning" onclick="verifyAP('return')"><i class="bi bi-arrow-return-left me-1"></i>Return</button>
            <button class="btn btn-danger" onclick="verifyAP('reject')"><i class="bi bi-x-circle me-1"></i>Reject</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
/* Action Plan Upload Zone */
.ap-upload-zone {
  border: 2px dashed #d1d5db;
  border-radius: 8px;
  padding: 24px;
  text-align: center;
  background: #fafafa;
  cursor: pointer;
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
}

.ap-upload-zone:hover,
.ap-upload-zone.dragover {
  border-color: #1a365d;
  background: #f0f4f8;
}

.ap-upload-zone .ap-upload-icon {
  font-size: 32px;
  color: #9ca3af;
}

.ap-upload-zone:hover .ap-upload-icon {
  color: #1a365d;
}

.ap-upload-text {
  text-align: left;
}

/* Evidence List */
.ap-evidence-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.ap-evidence-item {
  display: flex;
  align-items: center;
  padding: 12px;
  background: #f8f9fa;
  border: 1px solid #e9ecef;
  border-radius: 8px;
  transition: all 0.2s ease;
}

.ap-evidence-item:hover {
  background: #f1f5f9;
}

.ap-evidence-item .evidence-icon {
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  margin-right: 12px;
  font-size: 18px;
}

.ap-evidence-item .evidence-icon.pdf { background: #fee2e2; color: #dc2626; }
.ap-evidence-item .evidence-icon.doc { background: #dbeafe; color: #2563eb; }
.ap-evidence-item .evidence-icon.xls { background: #dcfce7; color: #16a34a; }
.ap-evidence-item .evidence-icon.img { background: #fef3c7; color: #d97706; }
.ap-evidence-item .evidence-icon.default { background: #e5e7eb; color: #6b7280; }

.ap-evidence-item .evidence-info {
  flex: 1;
  min-width: 0;
}

.ap-evidence-item .evidence-name {
  font-weight: 500;
  color: #374151;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  text-decoration: none;
  display: block;
}

.ap-evidence-item .evidence-name:hover {
  color: #1a365d;
  text-decoration: underline;
}

.ap-evidence-item .evidence-meta {
  font-size: 0.75rem;
  color: #6b7280;
}

.ap-evidence-item .evidence-actions {
  display: flex;
  gap: 8px;
}

.ap-evidence-empty {
  text-align: center;
  padding: 24px;
  color: #6b7280;
  background: #f9fafb;
  border-radius: 8px;
}

.ap-evidence-empty i {
  font-size: 32px;
  margin-bottom: 8px;
  display: block;
}
</style>

<script>
let currentActionPlan = null;

// Setup drag and drop for AP upload zone
function setupAPUploadZone() {
  const uploadZone = document.getElementById('apUploadZone');
  if (!uploadZone) return;

  ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
    uploadZone.addEventListener(eventName, (e) => {
      e.preventDefault();
      e.stopPropagation();
    }, false);
  });

  ['dragenter', 'dragover'].forEach(eventName => {
    uploadZone.addEventListener(eventName, () => uploadZone.classList.add('dragover'), false);
  });

  ['dragleave', 'drop'].forEach(eventName => {
    uploadZone.addEventListener(eventName, () => uploadZone.classList.remove('dragover'), false);
  });

  uploadZone.addEventListener('drop', (e) => {
    const files = e.dataTransfer.files;
    if (files.length > 0) {
      document.getElementById('apEvidenceFileInput').files = files;
      handleAPEvidenceUpload(document.getElementById('apEvidenceFileInput'));
    }
  }, false);
}

// Handle AP evidence upload
function handleAPEvidenceUpload(input) {
  const file = input.files[0];
  if (!file) return;

  if (file.size > 10 * 1024 * 1024) {
    showToast('File size must be less than 10MB', 'danger');
    input.value = '';
    return;
  }

  showLoading('Uploading evidence...');

  const reader = new FileReader();
  reader.onload = function(e) {
    const base64 = e.target.result.split(',')[1];

    google.script.run
      .withSuccessHandler(function(result) {
        if (result.success) {
          // Add evidence to action plan
          apiCall('addActionPlanEvidence', {
            actionPlanId: currentActionPlan.action_plan_id,
            drive_file_id: result.file.drive_file_id,
            drive_url: result.file.drive_url,
            file_name: result.file.file_name
          }).then(r => {
            hideLoading();
            if (r.success) {
              showToast('Evidence uploaded successfully', 'success');
              loadActionPlanView({ id: currentActionPlan.action_plan_id });
            } else {
              showToast(r.error || 'Failed to save evidence', 'danger');
            }
          }).catch(() => {
            hideLoading();
            showToast('Error saving evidence', 'danger');
          });
        } else {
          hideLoading();
          showToast(result.error || 'Upload failed', 'danger');
        }
        input.value = '';
      })
      .withFailureHandler(function(err) {
        hideLoading();
        showToast('Upload failed: ' + err.message, 'danger');
        input.value = '';
      })
      .uploadFileToDrive(file.name, file.type, base64);
  };
  reader.readAsDataURL(file);
}

// Get file icon class
function getEvidenceIconClass(fileName) {
  const ext = fileName.split('.').pop().toLowerCase();
  if (['pdf'].includes(ext)) return 'pdf';
  if (['doc', 'docx'].includes(ext)) return 'doc';
  if (['xls', 'xlsx'].includes(ext)) return 'xls';
  if (['png', 'jpg', 'jpeg', 'gif'].includes(ext)) return 'img';
  return 'default';
}

// Get file icon
function getEvidenceIcon(fileName) {
  const ext = fileName.split('.').pop().toLowerCase();
  if (['pdf'].includes(ext)) return 'bi-file-earmark-pdf';
  if (['doc', 'docx'].includes(ext)) return 'bi-file-earmark-word';
  if (['xls', 'xlsx'].includes(ext)) return 'bi-file-earmark-excel';
  if (['png', 'jpg', 'jpeg', 'gif'].includes(ext)) return 'bi-file-earmark-image';
  return 'bi-file-earmark';
}

function loadActionPlanView(params) {
  if (!params?.id) { navigateTo('action-plans'); return; }
  showLoading('Loading...');
  apiCall('getActionPlan', { actionPlanId: params.id, includeRelated: true }).then(r => {
    hideLoading();
    if (r.actionPlan) { currentActionPlan = r.actionPlan; renderActionPlanView(); }
    else { showToast('Not found', 'danger'); navigateTo('action-plans'); }
  }).catch(() => { hideLoading(); showToast('Error', 'danger'); });
}

function renderActionPlanView() {
  const ap = currentActionPlan;
  document.getElementById('apViewId').textContent = ap.action_plan_id;
  document.getElementById('apViewDesc').textContent = ap.action_description || '-';
  document.getElementById('apViewDue').textContent = ap.due_date ? formatDate(ap.due_date) : '-';
  document.getElementById('apViewOwners').textContent = ap.owner_names || '-';
  document.getElementById('apViewOverdue').innerHTML = ap.days_overdue > 0 ? `<span class="badge bg-danger">${ap.days_overdue} days</span>` : '<span class="text-success">On track</span>';
  document.getElementById('apViewNotes').value = ap.implementation_notes || '';

  const statusEl = document.getElementById('apViewStatus');
  statusEl.textContent = ap.status || '-';
  statusEl.className = 'badge badge-status ' + getStatusClass(ap.status);

  const wpLink = document.getElementById('apViewWPLink');
  wpLink.textContent = ap.work_paper_id;
  wpLink.onclick = () => navigateTo('work-paper-view', { id: ap.work_paper_id });

  renderAPActions(ap);
  renderAPHistory(ap.history || []);
  renderAPEvidence(ap.evidence || []);

  // Setup upload zone drag and drop
  setupAPUploadZone();

  // Show review card for auditors if implemented
  const user = window.currentUser;
  const isAuditor = ['SUPER_ADMIN', 'HEAD_OF_AUDIT', 'SENIOR_AUDITOR'].includes(user?.role_code);
  document.getElementById('apReviewCard').style.display = (isAuditor && ap.status === 'Implemented') ? 'block' : 'none';
}

function renderAPActions(ap) {
  const actions = document.getElementById('apViewActions');
  const impl = document.getElementById('apImplementBtn');
  const user = window.currentUser;
  const isOwner = (ap.owner_ids || '').split(',').includes(user?.user_id);
  const isAuditor = ['SUPER_ADMIN', 'HEAD_OF_AUDIT', 'SENIOR_AUDITOR'].includes(user?.role_code);
  
  let actionsHtml = '';
  let implHtml = '';

  if ((isOwner || isAuditor) && !['Implemented', 'Verified'].includes(ap.status)) {
    implHtml = `<button class="btn btn-success" onclick="markImplemented()"><i class="bi bi-check2-circle me-1"></i>Mark as Implemented</button>`;
    actionsHtml = `<button class="btn btn-primary" onclick="saveNotes()"><i class="bi bi-save me-1"></i>Save Notes</button>`;
  }

  actions.innerHTML = actionsHtml;
  impl.innerHTML = implHtml;
}

function renderAPHistory(history) {
  const timeline = document.getElementById('apViewHistory');
  if (!history.length) { timeline.innerHTML = '<p class="text-muted">No history</p>'; return; }
  timeline.innerHTML = history.map(h => `
    <div class="timeline-item">
      <div class="fw-medium">${h.previous_status || 'Created'} → ${h.new_status}</div>
      <div class="timeline-date">${formatDate(h.changed_at)} by ${h.user_name || '-'}</div>
      ${h.comments ? `<small class="text-muted">${escapeHtml(h.comments)}</small>` : ''}
    </div>
  `).join('');
}

function renderAPEvidence(evidence) {
  const list = document.getElementById('apViewEvidence');
  const countBadge = document.getElementById('evidenceCount');

  // Update count badge
  if (countBadge) countBadge.textContent = evidence.length;

  if (!evidence.length) {
    list.innerHTML = `
      <div class="ap-evidence-empty">
        <i class="bi bi-folder2-open"></i>
        <p class="mb-0">No evidence uploaded yet</p>
        <small>Upload files to support implementation</small>
      </div>
    `;
    return;
  }

  list.innerHTML = evidence.map(e => {
    const iconClass = getEvidenceIconClass(e.file_name);
    const icon = getEvidenceIcon(e.file_name);
    const uploadDate = e.uploaded_at ? formatDate(e.uploaded_at) : 'Recently';

    return `
      <div class="ap-evidence-item">
        <div class="evidence-icon ${iconClass}">
          <i class="bi ${icon}"></i>
        </div>
        <div class="evidence-info">
          <a href="${e.drive_url}" target="_blank" class="evidence-name">${escapeHtml(e.file_name)}</a>
          <div class="evidence-meta">Uploaded ${uploadDate}</div>
        </div>
        <div class="evidence-actions">
          <a href="${e.drive_url}" target="_blank" class="btn btn-sm btn-outline-primary" title="View file">
            <i class="bi bi-eye"></i>
          </a>
          <button type="button" class="btn btn-sm btn-outline-danger" onclick="deleteEvidence('${e.evidence_id}')" title="Delete">
            <i class="bi bi-trash"></i>
          </button>
        </div>
      </div>
    `;
  }).join('');
}

function saveNotes() {
  const notes = document.getElementById('apViewNotes').value;
  showLoading('Saving...');
  apiCall('updateActionPlan', { actionPlanId: currentActionPlan.action_plan_id, implementation_notes: notes }).then(r => {
    hideLoading();
    if (r.success) showToast('Saved', 'success');
    else showToast(r.error || 'Error', 'danger');
  }).catch(() => { hideLoading(); showToast('Error', 'danger'); });
}

function markImplemented() {
  const notes = document.getElementById('apViewNotes').value;
  if (!notes && !confirm('No implementation notes provided. Continue?')) return;
  showLoading('Processing...');
  apiCall('markAsImplemented', { actionPlanId: currentActionPlan.action_plan_id, implementationNotes: notes }).then(r => {
    hideLoading();
    if (r.success) { showToast('Marked as implemented', 'success'); loadActionPlanView({ id: currentActionPlan.action_plan_id }); }
    else showToast(r.error || 'Error', 'danger');
  }).catch(() => { hideLoading(); showToast('Error', 'danger'); });
}

function verifyAP(action) {
  const comments = document.getElementById('apReviewComments').value;
  showLoading('Processing...');
  apiCall('verifyImplementation', { actionPlanId: currentActionPlan.action_plan_id, action, comments }).then(r => {
    hideLoading();
    if (r.success) { showToast(action === 'approve' ? 'Verified' : 'Updated', 'success'); loadActionPlanView({ id: currentActionPlan.action_plan_id }); }
    else showToast(r.error || 'Error', 'danger');
  }).catch(() => { hideLoading(); showToast('Error', 'danger'); });
}

function showUploadEvidence() {
  document.getElementById('uploadEntityType').value = 'ACTION_PLAN';
  document.getElementById('uploadEntityId').value = currentActionPlan.action_plan_id;
  new bootstrap.Modal(document.getElementById('uploadFileModal')).show();
}

function deleteEvidence(id) {
  if (!confirm('Delete this evidence?')) return;
  showLoading('Deleting...');
  apiCall('deleteActionPlanEvidence', { evidenceId: id }).then(r => {
    hideLoading();
    if (r.success) { showToast('Deleted', 'success'); loadActionPlanView({ id: currentActionPlan.action_plan_id }); }
    else showToast(r.error || 'Error', 'danger');
  }).catch(() => { hideLoading(); showToast('Error', 'danger'); });
}
</script>
