<!-- Action Plan Detail Page -->
<div class="action-plan-view">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <button class="btn btn-outline-secondary btn-sm me-2" onclick="_apvGoBack()"><i class="bi bi-arrow-left me-1"></i>Back</button>
      <span class="badge bg-secondary" id="apvStatus">-</span>
      <span class="badge" id="apvRisk">-</span>
      <span class="badge bg-danger" id="apvOverdue" style="display:none;"></span>
      <span class="badge bg-info" id="apvProposed" style="display:none;">Proposed by Auditee</span>
    </div>
    <div class="btn-group" id="apvHeaderActions"></div>
  </div>

  <!-- Loading spinner -->
  <div id="apvLoading" class="text-center py-5">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="mt-3 text-muted">Loading action plan...</p>
  </div>

  <!-- Main content (hidden until loaded) -->
  <div id="apvContent" style="display:none;">
    <div class="row">
      <div class="col-lg-8">
        <!-- Details Card -->
        <div class="card mb-4">
          <div class="card-header d-flex justify-content-between">
            <span><i class="bi bi-list-check me-2"></i><code id="apvId">-</code></span>
          </div>
          <div class="card-body">
            <div id="apvDescription" style="white-space:pre-wrap;" class="mb-3">-</div>
            <hr>
            <div class="row g-3">
              <div class="col-md-6"><strong>Owner(s):</strong> <span id="apvOwners">-</span></div>
              <div class="col-md-6"><strong>Due Date:</strong> <span id="apvDueDate">-</span></div>
              <div class="col-md-6"><strong>Created By:</strong> <span id="apvCreatedBy">-</span></div>
              <div class="col-md-6"><strong>Created:</strong> <span id="apvCreatedDate">-</span></div>
              <div class="col-md-6"><strong>Affiliate:</strong> <span id="apvAffiliate">-</span></div>
              <div class="col-md-6"><strong>Action #:</strong> <span id="apvNumber">-</span></div>
            </div>
            <!-- Delegation info -->
            <div id="apvDelegationInfo" class="alert alert-secondary mt-3" style="display:none;">
              <i class="bi bi-person-plus me-2"></i><span id="apvDelegationText"></span>
            </div>
          </div>
        </div>

        <!-- Related Observation -->
        <div class="card mb-4">
          <div class="card-header d-flex justify-content-between align-items-center" data-bs-toggle="collapse" data-bs-target="#apvObsCollapse" style="cursor:pointer;">
            <span><i class="bi bi-eye me-2"></i>Related Observation</span>
            <i class="bi bi-chevron-down"></i>
          </div>
          <div class="collapse show" id="apvObsCollapse">
            <div class="card-body">
              <h6 id="apvObsTitle">-</h6>
              <button class="btn btn-sm btn-outline-primary mt-2" id="apvViewWPBtn" onclick="_apvViewWP()">
                <i class="bi bi-file-earmark-text me-1"></i>View Full Work Paper
              </button>
            </div>
          </div>
        </div>

        <!-- Implementation Section -->
        <div class="card mb-4" id="apvImplCard">
          <div class="card-header"><i class="bi bi-check2-square me-2"></i>Implementation</div>
          <div class="card-body" id="apvImplBody">
            <!-- Populated by JS -->
          </div>
        </div>

        <!-- Evidence Files -->
        <div class="card mb-4">
          <div class="card-header d-flex justify-content-between">
            <span><i class="bi bi-paperclip me-2"></i>Evidence (<span id="apvEvidenceCount">0</span>)</span>
            <button class="btn btn-sm btn-outline-primary" id="apvUploadBtn" onclick="_apvUploadEvidence()"><i class="bi bi-upload me-1"></i>Upload</button>
          </div>
          <div class="card-body p-0">
            <ul class="list-group list-group-flush" id="apvEvidenceList">
              <li class="list-group-item text-muted text-center">No evidence files</li>
            </ul>
          </div>
        </div>
      </div>

      <div class="col-lg-4">
        <!-- Actions Card -->
        <div class="card mb-4" id="apvActionsCard">
          <div class="card-header"><i class="bi bi-lightning me-2"></i>Actions</div>
          <div class="card-body" id="apvActions">
            <!-- Populated by JS based on role -->
          </div>
        </div>

        <!-- Timeline -->
        <div class="card mb-4">
          <div class="card-header"><i class="bi bi-diagram-3 me-2"></i>History</div>
          <div class="card-body">
            <div class="timeline" id="apvTimeline"></div>
          </div>
        </div>

        <!-- Review Comments -->
        <div class="card mb-4" id="apvReviewCard" style="display:none;">
          <div class="card-header"><i class="bi bi-chat-left-text me-2"></i>Review Comments</div>
          <div class="card-body" id="apvReviewBody"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
var _currentAP = null;

function loadActionPlanView(params) {
  if (!params || !params.id) { navigateTo('action-plans'); return; }

  var loading = document.getElementById('apvLoading');
  var content = document.getElementById('apvContent');
  if (loading) loading.style.display = 'block';
  if (content) content.style.display = 'none';

  apiCall('getActionPlan', { actionPlanId: params.id, includeRelated: true })
    .then(function(r) {
      if (loading) loading.style.display = 'none';
      if (r && r.success !== false && r.actionPlan) {
        _currentAP = r.actionPlan;
        if (content) content.style.display = 'block';
        renderActionPlanView();
      } else {
        showToast(r ? r.error || 'Action plan not found' : 'Not found', 'danger');
        navigateTo('action-plans');
      }
    })
    .catch(function(err) {
      if (loading) loading.style.display = 'none';
      showToast('Error loading action plan: ' + (err.message || err), 'danger');
      navigateTo('action-plans');
    });
}

function renderActionPlanView() {
  var ap = _currentAP;
  if (!ap) return;

  var wp = ap.workPaper || {};

  // Header badges
  var statusEl = document.getElementById('apvStatus');
  if (statusEl) { statusEl.textContent = ap.status || '-'; statusEl.className = 'badge badge-status ' + getStatusClass(ap.status); }

  var riskEl = document.getElementById('apvRisk');
  if (riskEl) { riskEl.textContent = wp.risk_rating || 'Not Rated'; riskEl.className = 'badge ' + getRiskClass(wp.risk_rating); }

  var overdueEl = document.getElementById('apvOverdue');
  if (overdueEl) {
    if (ap.days_overdue > 0) { overdueEl.textContent = ap.days_overdue + ' days overdue'; overdueEl.style.display = ''; }
    else { overdueEl.style.display = 'none'; }
  }

  var proposedEl = document.getElementById('apvProposed');
  if (proposedEl) proposedEl.style.display = ap.auditee_proposed ? '' : 'none';

  // Details
  var el = document.getElementById('apvId');
  if (el) el.textContent = ap.action_plan_id || '-';
  el = document.getElementById('apvDescription');
  if (el) el.textContent = ap.action_description || '-';
  el = document.getElementById('apvOwners');
  if (el) el.textContent = ap.owner_names || '-';
  el = document.getElementById('apvDueDate');
  if (el) el.textContent = ap.due_date ? formatDate(ap.due_date) : '-';
  el = document.getElementById('apvCreatedBy');
  if (el) el.textContent = ap.created_by || '-';
  el = document.getElementById('apvCreatedDate');
  if (el) el.textContent = ap.created_at ? formatDate(ap.created_at) : '-';
  el = document.getElementById('apvAffiliate');
  if (el) el.textContent = wp.affiliate_code || '-';
  el = document.getElementById('apvNumber');
  if (el) el.textContent = ap.action_number || '-';

  // Delegation info
  var delegInfo = document.getElementById('apvDelegationInfo');
  if (delegInfo) {
    if (ap.delegated_by_id) {
      var txt = 'Delegated by ' + escapeHtml(ap.delegated_by_name || ap.delegated_by_id);
      if (ap.delegated_date) txt += ' on ' + formatDate(ap.delegated_date);
      if (ap.delegation_notes) txt += '. Notes: ' + escapeHtml(ap.delegation_notes);
      if (ap.original_owner_ids) txt += '. Original owner: ' + escapeHtml(ap.original_owner_ids);
      document.getElementById('apvDelegationText').innerHTML = txt;
      delegInfo.style.display = 'block';
    } else {
      delegInfo.style.display = 'none';
    }
  }

  // Related observation
  el = document.getElementById('apvObsTitle');
  if (el) el.textContent = wp.observation_title || 'No observation linked';

  // Implementation section
  renderAPImplementation(ap);

  // Evidence
  renderAPEvidence(ap.evidence || []);

  // Actions
  renderAPActions(ap);

  // Timeline
  renderAPTimeline(ap.history || []);

  // Review comments
  renderAPReviewComments(ap);

  // Upload button visibility
  var uploadBtn = document.getElementById('apvUploadBtn');
  if (uploadBtn) {
    var user = window.currentUser;
    var isOwner = _apvIsOwner(ap, user);
    var auditorRoles = ['SUPER_ADMIN', 'SENIOR_AUDITOR', 'AUDITOR'];
    var isAuditor = auditorRoles.indexOf(user?.role_code) >= 0;
    var terminalStatuses = ['Verified', 'Closed', 'Not Implemented'];
    uploadBtn.style.display = (isOwner || isAuditor) && terminalStatuses.indexOf(ap.status) === -1 ? '' : 'none';
  }
}

function _apvIsOwner(ap, user) {
  if (!ap || !user || !ap.owner_ids) return false;
  return ap.owner_ids.split(',').indexOf(user.user_id) >= 0;
}

function renderAPActions(ap) {
  var container = document.getElementById('apvActions');
  if (!container) return;
  var html = '';
  var user = window.currentUser;
  var role = user?.role_code || '';
  var auditorRoles = ['SUPER_ADMIN', 'SENIOR_AUDITOR', 'AUDITOR'];
  var hoaRoles = ['SUPER_ADMIN', 'SENIOR_AUDITOR'];
  var isAuditor = auditorRoles.indexOf(role) >= 0;
  var isHOA = hoaRoles.indexOf(role) >= 0;
  var isOwner = _apvIsOwner(ap, user);
  var readOnlyRoles = ['BOARD_MEMBER', 'EXTERNAL_AUDITOR'];
  var isReadOnly = readOnlyRoles.indexOf(role) >= 0;
  var terminalStatuses = ['Verified', 'Closed', 'Not Implemented'];
  var isTerminal = terminalStatuses.indexOf(ap.status) >= 0;
  var evidence = ap.evidence || [];
  var hasEvidence = evidence.length > 0;

  // Delegation banner (delegated to current user, pending acceptance)
  if (isOwner && ap.delegated_by_id && ap.original_owner_ids) {
    html += '<div class="alert alert-info mb-3">' +
      '<i class="bi bi-person-plus me-2"></i>' +
      'This action plan was delegated to you by <strong>' + escapeHtml(ap.delegated_by_name || '') + '</strong>' +
      (ap.delegated_date ? ' on ' + formatDate(ap.delegated_date) : '') + '.' +
      (ap.delegation_notes ? '<br><small>' + escapeHtml(ap.delegation_notes) + '</small>' : '') +
      '<div class="mt-2">' +
      '<button class="btn btn-success btn-sm me-2" onclick="respondDelegation(\'accept\')"><i class="bi bi-check me-1"></i>Accept</button>' +
      '<button class="btn btn-outline-danger btn-sm" onclick="respondDelegation(\'reject\')"><i class="bi bi-x me-1"></i>Reject</button>' +
      '</div></div>';
  }

  // Owner actions (non-terminal)
  if (isOwner && !isTerminal) {
    var implStatuses = ['Pending', 'Not Due', 'In Progress', 'Rejected'];
    if (implStatuses.indexOf(ap.status) >= 0) {
      html += '<button class="btn btn-success w-100 mb-2" onclick="markAPImplemented()" ' +
        (!hasEvidence ? 'disabled title="Upload at least one evidence document first"' : '') + '>' +
        '<i class="bi bi-check-circle me-1"></i>Mark as Implemented' +
        (!hasEvidence ? ' <small>(needs evidence)</small>' : '') + '</button>';
    }
    html += '<button class="btn btn-outline-primary w-100 mb-2" onclick="showDelegateModal()"><i class="bi bi-person-plus me-1"></i>Delegate</button>';
    html += '<button class="btn btn-outline-secondary w-100 mb-2" onclick="_apvUploadEvidence()"><i class="bi bi-upload me-1"></i>Upload Evidence</button>';
  }

  // Auditor: Verification buttons
  if (isAuditor && ap.status === 'Pending Verification') {
    html += '<hr>';
    html += '<p class="small text-muted mb-2">Verification</p>';
    html += '<button class="btn btn-success w-100 mb-2" onclick="showVerifyModal(\'approve\')"><i class="bi bi-check-circle me-1"></i>Verify (Approve)</button>';
    html += '<button class="btn btn-warning w-100 mb-2" onclick="showVerifyModal(\'return\')"><i class="bi bi-arrow-return-left me-1"></i>Return for Rework</button>';
    html += '<button class="btn btn-danger w-100 mb-2" onclick="showVerifyModal(\'reject\')"><i class="bi bi-x-circle me-1"></i>Reject</button>';
  }

  // HOA: Final review buttons
  if (isHOA && ap.status === 'Verified') {
    html += '<hr>';
    html += '<p class="small text-muted mb-2">HOA Final Review</p>';
    html += '<button class="btn btn-primary w-100 mb-2" onclick="showHOAReviewModal(\'approve\')"><i class="bi bi-check-all me-1"></i>HOA Approve (Close)</button>';
    html += '<button class="btn btn-outline-danger w-100 mb-2" onclick="showHOAReviewModal(\'reject\')"><i class="bi bi-x-circle me-1"></i>HOA Reject</button>';
  }

  // Auditor general actions
  if (isAuditor && !isReadOnly) {
    html += '<hr>';
    var canEdit = ['Verified', 'Closed'].indexOf(ap.status) === -1;
    var canDelegate = terminalStatuses.indexOf(ap.status) === -1;
    var canDelete = ['Not Due', 'Pending', 'In Progress'].indexOf(ap.status) >= 0;

    if (canEdit) html += '<button class="btn btn-outline-primary btn-sm me-1 mb-1" onclick="showEditAPModal()"><i class="bi bi-pencil me-1"></i>Edit</button>';
    if (canDelegate) html += '<button class="btn btn-outline-secondary btn-sm me-1 mb-1" onclick="showDelegateModal()"><i class="bi bi-person-plus me-1"></i>Delegate</button>';
    if (canDelete) html += '<button class="btn btn-outline-danger btn-sm me-1 mb-1" onclick="deleteAP()"><i class="bi bi-trash me-1"></i>Delete</button>';
  }

  if (isReadOnly) {
    html += '<p class="text-muted small mb-0"><i class="bi bi-eye me-1"></i>Read-only access</p>';
  }

  if (!html) {
    html = '<p class="text-muted small mb-0">No actions available</p>';
  }

  container.innerHTML = html;

  // Hide actions card for read-only users with nothing to show
  var card = document.getElementById('apvActionsCard');
  if (card && isReadOnly) card.style.display = 'none';
}

function renderAPImplementation(ap) {
  var body = document.getElementById('apvImplBody');
  if (!body) return;
  var html = '';
  var user = window.currentUser;
  var isOwner = _apvIsOwner(ap, user);
  var evidence = ap.evidence || [];
  var implStatuses = ['Pending', 'Not Due', 'In Progress', 'Rejected'];

  if (ap.implementation_notes) {
    html += '<div class="mb-3"><strong>Implementation Notes:</strong><div class="mt-1 p-3 bg-light rounded" style="white-space:pre-wrap;">' + escapeHtml(ap.implementation_notes) + '</div></div>';
  }
  if (ap.implemented_date) {
    html += '<p class="text-muted small"><i class="bi bi-calendar-check me-1"></i>Implemented on ' + formatDate(ap.implemented_date) + '</p>';
  }

  // Show textarea for owner to add notes before marking implemented
  if (isOwner && implStatuses.indexOf(ap.status) >= 0) {
    html += '<div class="mt-3">' +
      '<label class="form-label">Implementation Notes</label>' +
      '<textarea class="form-control" id="apvImplNotes" rows="3" placeholder="Describe what was implemented...">' + escapeHtml(ap.implementation_notes || '') + '</textarea>' +
      '</div>';
  }

  if (!html) {
    html = '<p class="text-muted small mb-0">No implementation details yet.</p>';
  }

  body.innerHTML = html;
}

function renderAPEvidence(evidence) {
  var list = document.getElementById('apvEvidenceList');
  var countEl = document.getElementById('apvEvidenceCount');
  if (countEl) countEl.textContent = evidence.length;

  if (!list) return;
  if (!evidence.length) {
    list.innerHTML = '<li class="list-group-item text-muted text-center">No evidence files</li>';
    return;
  }

  var user = window.currentUser;
  var isOwner = _apvIsOwner(_currentAP, user);
  var auditorRoles = ['SUPER_ADMIN', 'SENIOR_AUDITOR', 'AUDITOR'];
  var isAuditor = auditorRoles.indexOf(user?.role_code) >= 0;
  var canDelete = isOwner || isAuditor;
  var terminalStatuses = ['Verified', 'Closed', 'Not Implemented'];
  var isTerminal = terminalStatuses.indexOf(_currentAP?.status) >= 0;

  list.innerHTML = evidence.map(function(f) {
    var icon = typeof getFileIcon === 'function' ? getFileIcon(f.mime_type, f.file_name) : 'bi-file-earmark';
    var size = f.file_size ? (f.file_size < 1024 * 1024 ? Math.round(f.file_size / 1024) + ' KB' : (f.file_size / (1024 * 1024)).toFixed(1) + ' MB') : '';
    var deleteBtn = canDelete && !isTerminal ? '<button class="btn btn-sm btn-outline-danger ms-2" onclick="event.stopPropagation(); deleteAPEvidence(\'' + f.evidence_id + '\')"><i class="bi bi-trash"></i></button>' : '';
    return '<li class="list-group-item d-flex justify-content-between align-items-center">' +
      '<a href="' + escapeHtml(f.drive_url || '#') + '" target="_blank" class="text-decoration-none">' +
      '<i class="bi ' + icon + ' me-2"></i>' + escapeHtml(f.file_name || 'File') +
      (size ? ' <small class="text-muted">(' + size + ')</small>' : '') +
      '</a>' + deleteBtn + '</li>';
  }).join('');
}

function renderAPTimeline(history) {
  var timeline = document.getElementById('apvTimeline');
  if (!timeline) return;

  if (!history || !history.length) {
    timeline.innerHTML = '<p class="text-muted">No history</p>';
    return;
  }

  // Sort newest first
  var sorted = history.slice().sort(function(a, b) {
    return new Date(b.changed_at || 0) - new Date(a.changed_at || 0);
  });

  timeline.innerHTML = sorted.map(function(h) {
    var statusColor = '';
    var ns = (h.new_status || '').toLowerCase();
    if (ns.indexOf('approved') >= 0 || ns.indexOf('verified') >= 0 || ns.indexOf('closed') >= 0 || ns.indexOf('implemented') >= 0) statusColor = 'text-success';
    else if (ns.indexOf('rejected') >= 0 || ns.indexOf('not implemented') >= 0) statusColor = 'text-danger';
    else statusColor = 'text-primary';

    var label = '';
    if (h.previous_status && h.new_status) label = h.previous_status + ' &rarr; ' + h.new_status;
    else if (h.new_status) label = h.new_status;
    else label = 'Update';

    return '<div class="timeline-item">' +
      '<div class="fw-medium ' + statusColor + '">' + label + '</div>' +
      '<div class="timeline-date">' + formatDate(h.changed_at) + (h.user_name ? ' by ' + escapeHtml(h.user_name) : '') + '</div>' +
      (h.comments ? '<div class="small text-muted mt-1">' + escapeHtml(h.comments) + '</div>' : '') +
      '</div>';
  }).join('');
}

function renderAPReviewComments(ap) {
  var card = document.getElementById('apvReviewCard');
  var body = document.getElementById('apvReviewBody');
  if (!card || !body) return;

  var html = '';
  if (ap.auditor_review_comments) {
    html += '<div class="mb-3"><strong>Auditor Review</strong>' +
      (ap.auditor_review_by ? '<br><small class="text-muted">By ' + escapeHtml(ap.auditor_review_by) + (ap.auditor_review_date ? ' on ' + formatDate(ap.auditor_review_date) : '') + '</small>' : '') +
      '<div class="mt-1 p-2 bg-light rounded">' + escapeHtml(ap.auditor_review_comments) + '</div></div>';
  }
  if (ap.hoa_review_comments) {
    html += '<div class="mb-3"><strong>HOA Review</strong>' +
      (ap.hoa_review_by ? '<br><small class="text-muted">By ' + escapeHtml(ap.hoa_review_by) + (ap.hoa_review_date ? ' on ' + formatDate(ap.hoa_review_date) : '') + '</small>' : '') +
      '<div class="mt-1 p-2 bg-light rounded">' + escapeHtml(ap.hoa_review_comments) + '</div></div>';
  }

  if (html) {
    body.innerHTML = html;
    card.style.display = 'block';
  } else {
    card.style.display = 'none';
  }
}

// ── Action handlers ──

function _apvGoBack() {
  var ap = _currentAP;
  if (ap && ap.work_paper_id && document.referrer && document.referrer.indexOf('work-paper-view') >= 0) {
    navigateTo('work-paper-view', { id: ap.work_paper_id });
  } else {
    navigateTo('action-plans');
  }
}

function _apvViewWP() {
  if (_currentAP && _currentAP.work_paper_id) {
    navigateTo('work-paper-view', { id: _currentAP.work_paper_id });
  }
}

function _apvUploadEvidence() {
  if (_currentAP) showUploadModal('ACTION_PLAN', _currentAP.action_plan_id);
}

function _apvReload() {
  if (_currentAP) loadActionPlanView({ id: _currentAP.action_plan_id });
}

function _apvSpinBtn(btn) {
  if (!btn) return { restore: function(){} };
  var orig = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Processing...';
  return { restore: function() { btn.disabled = false; btn.innerHTML = orig; } };
}

function markAPImplemented() {
  var ap = _currentAP;
  if (!ap) return;
  var evidence = ap.evidence || [];
  if (!evidence.length) { showToast('Upload at least one evidence document first', 'warning'); return; }

  var notesEl = document.getElementById('apvImplNotes');
  var notes = notesEl ? notesEl.value : (ap.implementation_notes || '');

  if (!confirm('Mark this action plan as implemented?')) return;

  var btn = document.querySelector('[onclick="markAPImplemented()"]');
  safeAction(btn, async function() {
    var r = await apiCall('markAsImplemented', { actionPlanId: ap.action_plan_id, implementationNotes: notes });
    if (r && r.success) { showToast('Marked as implemented', 'success'); _apvReload(); }
    else showToast(r ? r.error || 'Failed' : 'Failed', 'danger');
  });
}

function showVerifyModal(action) {
  var ap = _currentAP;
  if (!ap) return;
  document.getElementById('verifyAPAction').value = action;
  document.getElementById('verifyAPId').value = ap.action_plan_id;
  document.getElementById('verifyAPComments').value = '';

  var label = document.getElementById('verifyAPModalLabel');
  var info = document.getElementById('verifyAPInfo');
  var submitBtn = document.getElementById('verifyAPSubmitBtn');

  if (action === 'approve') {
    if (label) label.textContent = 'Verify Action Plan';
    if (info) info.textContent = 'Confirm that the implementation is complete and satisfactory.';
    if (submitBtn) { submitBtn.className = 'btn btn-success'; submitBtn.innerHTML = '<i class="bi bi-check-circle me-1"></i>Verify'; }
  } else if (action === 'return') {
    if (label) label.textContent = 'Return for Rework';
    if (info) info.textContent = 'Return this action plan for additional work. Please provide comments.';
    if (submitBtn) { submitBtn.className = 'btn btn-warning'; submitBtn.innerHTML = '<i class="bi bi-arrow-return-left me-1"></i>Return'; }
  } else {
    if (label) label.textContent = 'Reject Action Plan';
    if (info) info.textContent = 'Reject the implementation. Please provide a reason.';
    if (submitBtn) { submitBtn.className = 'btn btn-danger'; submitBtn.innerHTML = '<i class="bi bi-x-circle me-1"></i>Reject'; }
  }

  bootstrap.Modal.getOrCreateInstance(document.getElementById('verifyAPModal')).show();
}

function submitAPVerification() {
  var action = document.getElementById('verifyAPAction').value;
  var apId = document.getElementById('verifyAPId').value;
  var comments = document.getElementById('verifyAPComments').value;

  var btn = document.getElementById('verifyAPSubmitBtn');
  safeAction(btn, async function() {
    var r = await apiCall('verifyImplementation', { actionPlanId: apId, action: action, comments: comments });
    bootstrap.Modal.getInstance(document.getElementById('verifyAPModal'))?.hide();
    if (r && r.success) { showToast('Verification submitted', 'success'); _apvReload(); }
    else showToast(r ? r.error || 'Failed' : 'Failed', 'danger');
  });
}

function showHOAReviewModal(action) {
  var ap = _currentAP;
  if (!ap) return;
  document.getElementById('hoaReviewAPAction').value = action;
  document.getElementById('hoaReviewAPId').value = ap.action_plan_id;
  document.getElementById('hoaReviewAPComments').value = '';

  var label = document.getElementById('hoaReviewAPModalLabel');
  var info = document.getElementById('hoaReviewAPInfo');
  var submitBtn = document.getElementById('hoaReviewAPSubmitBtn');

  if (action === 'approve') {
    if (label) label.textContent = 'HOA Final Approval';
    if (info) info.textContent = 'Approve and close this action plan.';
    if (submitBtn) { submitBtn.className = 'btn btn-primary'; submitBtn.innerHTML = '<i class="bi bi-check-all me-1"></i>Approve & Close'; }
  } else {
    if (label) label.textContent = 'HOA Rejection';
    if (info) info.textContent = 'Reject this action plan. It will be returned to In Progress.';
    if (submitBtn) { submitBtn.className = 'btn btn-danger'; submitBtn.innerHTML = '<i class="bi bi-x-circle me-1"></i>Reject'; }
  }

  bootstrap.Modal.getOrCreateInstance(document.getElementById('hoaReviewAPModal')).show();
}

function submitHOAReview() {
  var action = document.getElementById('hoaReviewAPAction').value;
  var apId = document.getElementById('hoaReviewAPId').value;
  var comments = document.getElementById('hoaReviewAPComments').value;

  var btn = document.getElementById('hoaReviewAPSubmitBtn');
  safeAction(btn, async function() {
    var r = await apiCall('hoaReview', { actionPlanId: apId, action: action, comments: comments });
    bootstrap.Modal.getInstance(document.getElementById('hoaReviewAPModal'))?.hide();
    if (r && r.success) { showToast('HOA review submitted', 'success'); _apvReload(); }
    else showToast(r ? r.error || 'Failed' : 'Failed', 'danger');
  });
}

function showDelegateModal() {
  var ap = _currentAP;
  if (!ap) return;
  document.getElementById('delegateAPId').value = ap.action_plan_id;
  document.getElementById('delegateCurrentOwner').value = ap.owner_names || '-';
  document.getElementById('delegateNotes').value = '';
  populateMultiSelect('delegateNewOwner', window.appDropdowns?.users || [], 'id', 'display');
  bootstrap.Modal.getOrCreateInstance(document.getElementById('delegateAPModal')).show();
}

function submitDelegation() {
  var apId = document.getElementById('delegateAPId').value;
  var ownerSelect = document.getElementById('delegateNewOwner');
  var notes = document.getElementById('delegateNotes').value;
  var newOwnerIds = Array.from(ownerSelect.selectedOptions).map(function(o) { return o.value; }).join(',');
  var newOwnerNames = Array.from(ownerSelect.selectedOptions).map(function(o) { return o.text; }).join(', ');

  if (!newOwnerIds) { showToast('Please select a new owner', 'warning'); return; }

  var btn = document.querySelector('#delegateAPModal .btn-primary');
  safeAction(btn, async function() {
    var r = await apiCall('delegateActionPlan', { actionPlanId: apId, newOwnerIds: newOwnerIds, newOwnerNames: newOwnerNames, notes: notes });
    bootstrap.Modal.getInstance(document.getElementById('delegateAPModal'))?.hide();
    if (r && r.success) { showToast('Action plan delegated', 'success'); _apvReload(); }
    else showToast(r ? r.error || 'Delegation failed' : 'Failed', 'danger');
  });
}

function respondDelegation(action) {
  var ap = _currentAP;
  if (!ap) return;

  if (action === 'accept') {
    if (!confirm('Accept this delegated action plan?')) return;
    var btn = document.querySelector('[onclick*="respondDelegation(\'accept\')"]');
    safeAction(btn, async function() {
      var r = await apiCall('respondToDelegation', { actionPlanId: ap.action_plan_id, action: 'accept', reason: '' });
      if (r && r.success) { showToast('Delegation accepted', 'success'); _apvReload(); }
      else showToast(r ? r.error || 'Failed' : 'Failed', 'danger');
    });
  } else {
    document.getElementById('rejectDelegationAPId').value = ap.action_plan_id;
    document.getElementById('rejectDelegationReason').value = '';
    bootstrap.Modal.getOrCreateInstance(document.getElementById('rejectDelegationModal')).show();
  }
}

function submitRejectDelegation() {
  var apId = document.getElementById('rejectDelegationAPId').value;
  var reason = document.getElementById('rejectDelegationReason').value;
  if (!reason || reason.trim().length < 5) { showToast('Please provide a reason (at least 5 characters)', 'warning'); return; }

  var btn = document.querySelector('#rejectDelegationModal .btn-danger');
  safeAction(btn, async function() {
    var r = await apiCall('respondToDelegation', { actionPlanId: apId, action: 'reject', reason: reason });
    bootstrap.Modal.getInstance(document.getElementById('rejectDelegationModal'))?.hide();
    if (r && r.success) { showToast('Delegation rejected', 'success'); _apvReload(); }
    else showToast(r ? r.error || 'Failed' : 'Failed', 'danger');
  });
}

function showEditAPModal() {
  var ap = _currentAP;
  if (!ap) return;
  document.getElementById('editAPId').value = ap.action_plan_id;
  document.getElementById('editAPDesc').value = ap.action_description || '';
  document.getElementById('editAPDueDate').value = ap.due_date ? new Date(ap.due_date).toISOString().split('T')[0] : '';
  populateMultiSelect('editAPOwners', window.appDropdowns?.users || [], 'id', 'display');

  // Pre-select current owners
  if (ap.owner_ids) {
    var ids = ap.owner_ids.split(',');
    var sel = document.getElementById('editAPOwners');
    if (sel) {
      Array.from(sel.options).forEach(function(opt) {
        opt.selected = ids.indexOf(opt.value) >= 0;
      });
    }
  }

  bootstrap.Modal.getOrCreateInstance(document.getElementById('editAPModal')).show();
}

function submitEditAP() {
  var apId = document.getElementById('editAPId').value;
  var desc = document.getElementById('editAPDesc').value;
  var dueDate = document.getElementById('editAPDueDate').value;
  var ownerSelect = document.getElementById('editAPOwners');
  var ownerIds = Array.from(ownerSelect.selectedOptions).map(function(o) { return o.value; }).join(',');
  var ownerNames = Array.from(ownerSelect.selectedOptions).map(function(o) { return o.text; }).join(', ');

  // Validate mandatory action plan fields
  var apMissing = validateActionPlanFields({ action_description: desc, owner_ids: ownerIds, due_date: dueDate });
  if (apMissing.length > 0) { showValidationError(apMissing); return; }

  var btn = document.querySelector('#editAPModal .btn-primary');
  safeAction(btn, async function() {
    var r = await apiCall('updateActionPlan', { actionPlanId: apId, action_description: desc, owner_ids: ownerIds, owner_names: ownerNames, due_date: dueDate });
    bootstrap.Modal.getInstance(document.getElementById('editAPModal'))?.hide();
    if (r && r.success) { showToast('Action plan updated', 'success'); _apvReload(); }
    else showToast(r ? r.error || 'Update failed' : 'Failed', 'danger');
  });
}

function deleteAP() {
  var ap = _currentAP;
  if (!ap) return;
  if (!confirm('Delete action plan ' + ap.action_plan_id + '? This cannot be undone.')) return;

  var btn = document.querySelector('[onclick="deleteAP()"]');
  safeAction(btn, async function() {
    var r = await apiCall('deleteActionPlan', { actionPlanId: ap.action_plan_id });
    if (r && r.success) { showToast('Action plan deleted', 'success'); navigateTo('action-plans'); }
    else showToast(r ? r.error || 'Delete failed' : 'Failed', 'danger');
  });
}

function deleteAPEvidence(evidenceId) {
  if (!confirm('Delete this evidence file?')) return;

  apiCall('deleteActionPlanEvidence', { evidenceId: evidenceId })
    .then(function(r) {
      if (r && r.success) { showToast('Evidence deleted', 'success'); _apvReload(); }
      else showToast(r ? r.error || 'Delete failed' : 'Failed', 'danger');
    })
    .catch(function(e) { showToast('Error: ' + (e.message || e), 'danger'); });
}
</script>
