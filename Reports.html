<!-- Dashboard Page - Redesigned Internal Audit Reporting Module (V2) -->
<div class="reports-page">

  <!-- Filter Bar -->
  <div class="card mb-3">
    <div class="card-body py-3">
      <div class="d-flex flex-wrap align-items-center gap-2">
        <div class="d-flex align-items-center gap-2 flex-shrink-0">
          <i class="bi bi-funnel text-primary"></i>
          <strong class="small text-uppercase text-muted">Filters</strong>
        </div>

        <!-- Year Dropdown -->
        <select class="form-select form-select-sm" id="dashYear" style="max-width:120px;" onchange="onDashFilterChange()">
          <option value="">All Years</option>
        </select>

        <!-- Quarter Pills -->
        <div class="btn-group btn-group-sm" id="dashQuarterGroup">
          <button type="button" class="btn btn-outline-secondary active" data-quarter="all" onclick="selectQuarterPill(this)">All</button>
          <button type="button" class="btn btn-outline-secondary" data-quarter="q1" onclick="selectQuarterPill(this)">Q1</button>
          <button type="button" class="btn btn-outline-secondary" data-quarter="q2" onclick="selectQuarterPill(this)">Q2</button>
          <button type="button" class="btn btn-outline-secondary" data-quarter="q3" onclick="selectQuarterPill(this)">Q3</button>
          <button type="button" class="btn btn-outline-secondary" data-quarter="q4" onclick="selectQuarterPill(this)">Q4</button>
          <button type="button" class="btn btn-outline-secondary" data-quarter="ytd" onclick="selectQuarterPill(this)">YTD</button>
        </div>

        <!-- Affiliate Dropdown -->
        <select class="form-select form-select-sm" id="dashAffiliate" style="max-width:180px;" onchange="onDashFilterChange()">
          <option value="">All Affiliates</option>
        </select>

        <!-- Audit Area Dropdown -->
        <select class="form-select form-select-sm" id="dashAuditArea" style="max-width:200px;" onchange="onDashFilterChange()">
          <option value="">All Audit Areas</option>
        </select>

        <!-- Export & Refresh -->
        <div class="ms-auto d-flex gap-2 flex-shrink-0">
          <div class="dropdown">
            <button class="btn btn-sm btn-primary dropdown-toggle" data-bs-toggle="dropdown">
              <i class="bi bi-download me-1"></i>Export
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><a class="dropdown-item" href="#" onclick="exportReportPDF()"><i class="bi bi-file-earmark-pdf me-2 text-danger"></i>Export as PDF</a></li>
              <li><a class="dropdown-item" href="#" onclick="exportReportWord()"><i class="bi bi-file-earmark-word me-2 text-primary"></i>Export as Word</a></li>
              <li><a class="dropdown-item" href="#" onclick="exportReportExcel()"><i class="bi bi-file-earmark-excel me-2 text-success"></i>Export as Excel</a></li>
            </ul>
          </div>
          <button class="btn btn-sm btn-outline-secondary" onclick="refreshDashboard()" title="Refresh data">
            <i class="bi bi-arrow-clockwise"></i>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Dashboard Tabs (3 new tabs) -->
  <ul class="nav nav-tabs nav-tabs-custom mb-0" id="reportTabs">
    <li class="nav-item">
      <a class="nav-link active" href="#" data-tab="overview" onclick="onDashTabChange(event, 'overview')">
        <i class="bi bi-speedometer2 me-1"></i>Overview
      </a>
    </li>
    <li class="nav-item">
      <a class="nav-link" href="#" data-tab="risk" onclick="onDashTabChange(event, 'risk')">
        <i class="bi bi-shield-exclamation me-1"></i>Risk &amp; Performance
      </a>
    </li>
    <li class="nav-item">
      <a class="nav-link" href="#" data-tab="detail" onclick="onDashTabChange(event, 'detail')">
        <i class="bi bi-table me-1"></i>Detail
      </a>
    </li>
  </ul>

  <!-- Tab Content Area -->
  <div class="card card-tabs-report" id="reportContentArea">
    <div class="card-body" id="pane-overview">
      <div class="text-center text-muted py-5">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-3">Loading dashboard data...</p>
      </div>
    </div>
    <div class="card-body d-none" id="pane-risk">
      <div class="text-center text-muted py-5">Risk &amp; Performance tab content — will be built in Part 3</div>
    </div>
    <div class="card-body d-none" id="pane-detail">
      <div class="text-center text-muted py-5">Detail tab content — will be built in Part 3</div>
    </div>
  </div>
</div>

<!-- Print-only report header (hidden in normal view) -->
<div id="printReportHeader" class="d-none">
  <div style="text-align:center; margin-bottom:24px; border-bottom:3px solid #1a365d; padding-bottom:16px;">
    <h2 style="color:#1a365d; margin:0;">Hass Petroleum Internal Audit System</h2>
    <h4 style="color:#6b7280; margin:4px 0 0;" id="printReportTitle">Audit Report</h4>
    <p style="color:#9ca3af; font-size:12px; margin:4px 0 0;" id="printReportDate"></p>
  </div>
</div>

  border-radius: 0 0 12px 12px;
  border-top: none;
}

/* Quarter pill styles */

<script>
// ============================================================
// DASHBOARD V2 MODULE — Client-Side Data Architecture
// ============================================================

// ── Global State ──
var _dashboardCache = null;       // Raw API response (never filtered)
var _dashboardFiltered = null;    // Currently filtered data
var _chartInstances = {};         // Chart.js instances for cleanup
var _currentDashTab = 'overview'; // Active tab
var _currentDashFilters = {
  year: '',    // '' = all years, or a number like 2025
  quarter: 'all',
  affiliate: '',
  auditArea: ''
};

// LEGACY: keep reportData/reportCharts for export functions that reference them
var reportData = null;
var reportCharts = {};
var currentReportTab = 'overview';

// ============================================================
// ENTRY POINT
// ============================================================

function loadReports() {
  loadDashboardV2();
}

function loadDashboardV2() {
  // Show loading skeleton in active pane
  var pane = document.getElementById('pane-overview');
  if (pane) {
    pane.innerHTML =
      '<div class="row g-3 mb-3">' +
        '<div class="col-md-3"><div class="dash-skeleton dash-skeleton-card"></div></div>' +
        '<div class="col-md-3"><div class="dash-skeleton dash-skeleton-card"></div></div>' +
        '<div class="col-md-3"><div class="dash-skeleton dash-skeleton-card"></div></div>' +
        '<div class="col-md-3"><div class="dash-skeleton dash-skeleton-card"></div></div>' +
      '</div>' +
      '<div class="row g-3">' +
        '<div class="col-md-6"><div class="dash-skeleton dash-skeleton-chart"></div></div>' +
        '<div class="col-md-6"><div class="dash-skeleton dash-skeleton-chart"></div></div>' +
      '</div>';
  }

  apiCall('getDashboardDataV2', {})
    .then(function(response) {
      if (response && response.success !== false && response.observations) {
        _dashboardCache = response;
        populateDashFilters(response.meta);
        setDefaultYear(response.meta);
        onDashFilterChange();
      } else {
        showDashError(response ? response.error : 'No response from server');
      }
    })
    .catch(function(err) {
      console.error('Dashboard V2 load error:', err);
      showDashError('Error loading dashboard: ' + (err.message || err));
    });
}

function showDashError(msg) {
  var pane = document.getElementById('pane-' + _currentDashTab);
  if (pane) {
    pane.innerHTML =
      '<div class="text-center py-5">' +
        '<i class="bi bi-exclamation-circle text-danger" style="font-size:3rem;"></i>' +
        '<p class="mt-3">' + escapeHtml(msg || 'Unable to load dashboard.') + '</p>' +
        '<button class="btn btn-sm btn-primary mt-2" onclick="loadDashboardV2()">' +
          '<i class="bi bi-arrow-clockwise me-1"></i>Retry' +
        '</button>' +
      '</div>';
  }
}

// ============================================================
// FILTER POPULATION
// ============================================================

function populateDashFilters(meta) {
  if (!meta) return;

  // Year dropdown
  var yearEl = document.getElementById('dashYear');
  if (yearEl) {
    yearEl.innerHTML = '<option value="">All Years</option>';
    (meta.years || []).slice().reverse().forEach(function(y) {
      yearEl.innerHTML += '<option value="' + y + '">' + y + '</option>';
    });
  }

  // Affiliate dropdown
  var affEl = document.getElementById('dashAffiliate');
  if (affEl) {
    affEl.innerHTML = '<option value="">All Affiliates</option>';
    (meta.affiliates || []).forEach(function(a) {
      affEl.innerHTML += '<option value="' + a + '">' + escapeHtml(a) + '</option>';
    });
  }

  // Audit Area dropdown
  var areaEl = document.getElementById('dashAuditArea');
  if (areaEl) {
    areaEl.innerHTML = '<option value="">All Audit Areas</option>';
    (meta.auditAreas || []).forEach(function(a) {
      areaEl.innerHTML += '<option value="' + a + '">' + escapeHtml(a) + '</option>';
    });
  }
}

function setDefaultYear(meta) {
  var currentYear = new Date().getFullYear();
  var yearEl = document.getElementById('dashYear');
  if (!yearEl || !meta || !meta.years) return;

  if (meta.years.indexOf(currentYear) !== -1) {
    yearEl.value = String(currentYear);
  } else {
    yearEl.value = '';
  }
  _currentDashFilters.year = yearEl.value;
  updateQuarterPillState();
}

// ============================================================
// QUARTER PILL LOGIC
// ============================================================

function selectQuarterPill(btn) {
  if (btn.disabled) return;
  var group = document.getElementById('dashQuarterGroup');
  if (!group) return;

  var buttons = group.querySelectorAll('.btn');
  buttons.forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');

  onDashFilterChange();
}

function updateQuarterPillState() {
  var yearVal = (document.getElementById('dashYear') || {}).value || '';
  var group = document.getElementById('dashQuarterGroup');
  if (!group) return;

  var buttons = group.querySelectorAll('.btn');
  if (!yearVal) {
    // All Years selected — disable all except 'All', force 'All' active
    buttons.forEach(function(b) {
      if (b.dataset.quarter === 'all') {
        b.disabled = false;
        b.classList.add('active');
      } else {
        b.disabled = true;
        b.classList.remove('active');
      }
    });
  } else {
    // Specific year — enable all
    buttons.forEach(function(b) {
      b.disabled = false;
    });
  }
}

function getActiveQuarter() {
  var group = document.getElementById('dashQuarterGroup');
  if (!group) return 'all';
  var active = group.querySelector('.btn.active');
  return active ? (active.dataset.quarter || 'all') : 'all';
}

// ============================================================
// FILTER CHANGE HANDLER
// ============================================================

function onDashFilterChange() {
  // Read filter values from DOM
  _currentDashFilters.year = (document.getElementById('dashYear') || {}).value || '';
  _currentDashFilters.quarter = getActiveQuarter();
  _currentDashFilters.affiliate = (document.getElementById('dashAffiliate') || {}).value || '';
  _currentDashFilters.auditArea = (document.getElementById('dashAuditArea') || {}).value || '';

  // Handle quarter pill enable/disable
  updateQuarterPillState();

  // If pills forced quarter to 'all' when year='', re-read
  if (!_currentDashFilters.year) {
    _currentDashFilters.quarter = 'all';
  }

  if (!_dashboardCache) return;

  // Apply filters
  _dashboardFiltered = applyDashboardFilters(
    { observations: _dashboardCache.observations, actionPlans: _dashboardCache.actionPlans },
    _currentDashFilters
  );

  renderCurrentTab();
}

// ============================================================
// CLIENT-SIDE FILTERING (pure function)
// ============================================================

function applyDashboardFilters(rawData, filters) {
  var filteredObs = (rawData.observations || []).slice();
  var filteredAPs = (rawData.actionPlans || []).slice();

  // Year filter
  if (filters.year) {
    var yr = parseInt(filters.year, 10);
    filteredObs = filteredObs.filter(function(o) {
      // Use 'year' field if available, else parse created_at
      if (o.year) return parseInt(o.year, 10) === yr;
      if (o.created_at) return new Date(o.created_at).getFullYear() === yr;
      return false;
    });
    filteredAPs = filteredAPs.filter(function(ap) {
      if (ap.created_at) return new Date(ap.created_at).getFullYear() === yr;
      return false;
    });
  }

  // Quarter filter (only when specific year is selected)
  if (filters.year && filters.quarter && filters.quarter !== 'all') {
    var qFilter = getQuarterFilterFn(filters.quarter, parseInt(filters.year, 10));
    filteredObs = filteredObs.filter(function(o) {
      var d = o.created_at ? new Date(o.created_at) : null;
      return d ? qFilter(d) : false;
    });
    filteredAPs = filteredAPs.filter(function(ap) {
      var d = ap.created_at ? new Date(ap.created_at) : null;
      return d ? qFilter(d) : false;
    });
  }

  // Affiliate filter
  if (filters.affiliate) {
    filteredObs = filteredObs.filter(function(o) { return o.affiliate_code === filters.affiliate; });
    filteredAPs = filteredAPs.filter(function(ap) { return ap.affiliate_code === filters.affiliate; });
  }

  // Audit Area filter
  if (filters.auditArea) {
    filteredObs = filteredObs.filter(function(o) {
      return (o.audit_area_name || o.audit_area_id || '') === filters.auditArea;
    });
    // APs were enriched with audit_area_name in the backend
    filteredAPs = filteredAPs.filter(function(ap) {
      return (ap.audit_area_name || ap.audit_area_id || '') === filters.auditArea;
    });
  }

  return { observations: filteredObs, actionPlans: filteredAPs };
}

function getQuarterFilterFn(quarter, year) {
  switch (quarter) {
    case 'q1': return function(d) { return d.getMonth() >= 0 && d.getMonth() <= 2; };
    case 'q2': return function(d) { return d.getMonth() >= 3 && d.getMonth() <= 5; };
    case 'q3': return function(d) { return d.getMonth() >= 6 && d.getMonth() <= 8; };
    case 'q4': return function(d) { return d.getMonth() >= 9 && d.getMonth() <= 11; };
    case 'ytd':
      var today = new Date();
      var ytdStart = new Date(year, 0, 1);
      return function(d) { return d >= ytdStart && d <= today; };
    default: return function() { return true; };
  }
}

// ============================================================
// COMPARISON PERIOD DATA (for delta calculations)
// ============================================================

function getComparisonPeriodData() {
  if (!_dashboardCache || !_currentDashFilters.year) return null;

  var yr = parseInt(_currentDashFilters.year, 10);
  var q = _currentDashFilters.quarter;
  var compFilters = JSON.parse(JSON.stringify(_currentDashFilters));

  if (q !== 'all' && q !== 'ytd') {
    // Compare to previous quarter
    var qNum = parseInt(q.replace('q', ''), 10);
    if (qNum === 1) {
      compFilters.year = String(yr - 1);
      compFilters.quarter = 'q4';
    } else {
      compFilters.quarter = 'q' + (qNum - 1);
    }
  } else if (q === 'all') {
    // Compare to previous full year
    compFilters.year = String(yr - 1);
  } else {
    // YTD — no standard comparison
    return null;
  }

  return applyDashboardFilters(
    { observations: _dashboardCache.observations, actionPlans: _dashboardCache.actionPlans },
    compFilters
  );
}

// ============================================================
// TAB SWITCHING
// ============================================================

function onDashTabChange(event, tabId) {
  if (event) event.preventDefault();
  _currentDashTab = tabId;
  currentReportTab = tabId;

  // Update tab active state
  document.querySelectorAll('#reportTabs .nav-link').forEach(function(l) {
    l.classList.toggle('active', l.dataset.tab === tabId);
  });

  // Show/hide panes
  var panes = ['pane-overview', 'pane-risk', 'pane-detail'];
  panes.forEach(function(id) {
    var el = document.getElementById(id);
    if (el) {
      el.classList.toggle('d-none', id !== 'pane-' + tabId);
    }
  });

  if (_dashboardFiltered) {
    renderCurrentTab();
  }
}

// ============================================================
// RENDER DISPATCH
// ============================================================

function renderCurrentTab() {
  destroyAllCharts();

  switch (_currentDashTab) {
    case 'overview':
      renderOverviewTab(_dashboardFiltered);
      break;
    case 'risk':
      renderRiskTab(_dashboardFiltered);
      break;
    case 'detail':
      renderDetailTab(_dashboardFiltered);
      break;
    default:
      renderOverviewTab(_dashboardFiltered);
  }
}

// ── Tab renderers ──

// ── Overview Tab Helpers ──

function _shortAreaLabel(area) {
  var map = {
    'Human Resources': 'HR',
    'Inventory Management': 'Inv. Mgmt',
    'Accounts Receivable': 'Accts Rec.',
    'Accounts Payable': 'Accts Pay.',
    'Tax Management': 'Tax Mgmt',
    'Fixed Assets': 'Fixed Assets',
    'Legal & Compliance': 'Legal',
    'Customer Service': 'Cust. Svc',
    'Order Management': 'Order Mgmt',
    'Purchase to Pay (Opex)': 'P2P',
    'Information & Communications Technology': 'ICT',
    'Information Technology': 'IT',
    'Supply Chain': 'Supply Chain',
    'Cash Management': 'Cash Mgmt',
    'Revenue Assurance': 'Rev. Assurance',
    'Health Safety & Environment': 'HSE'
  };
  if (!area) return 'N/A';
  return map[area] || (area.length > 15 ? area.substring(0, 12) + '...' : area);
}

function _computeImplRate(actionPlans) {
  var implementedStatuses = ['Implemented', 'Verified', 'Closed'];
  var totalDue = actionPlans.filter(function(ap) { return ap.status !== 'Not Due'; });
  if (totalDue.length === 0) return 0;
  var impl = totalDue.filter(function(ap) { return implementedStatuses.indexOf(ap.status) !== -1; }).length;
  return Math.round(impl / totalDue.length * 100);
}

function _computeRiskScore(observations) {
  if (!observations || observations.length === 0) return 0;
  var scoreMap = { 'Extreme': 100, 'High': 75, 'Medium': 50, 'Low': 25 };
  var total = 0;
  var counted = 0;
  observations.forEach(function(o) {
    var s = scoreMap[(o.risk_rating || '').trim()];
    if (s !== undefined) { total += s; counted++; }
  });
  return counted > 0 ? Math.round(total / counted) : 0;
}

function _riskLabel(score) {
  if (score >= 76) return { text: 'Extreme', color: '#dc3545' };
  if (score >= 51) return { text: 'High', color: '#fd7e14' };
  if (score >= 26) return { text: 'Moderate', color: '#ffc107' };
  return { text: 'Low', color: '#28a745' };
}

function _implRateColor(pct) {
  if (pct >= 70) return '#198754';
  if (pct >= 40) return '#ffc107';
  return '#dc3545';
}

function _buildDelta(current, comparison, upIsGood) {
  if (comparison === null || comparison === undefined) return '';
  var diff = current - comparison;
  if (diff === 0) return '<span style="color:#6b7280;font-size:0.75rem">— no change</span>';
  var isUp = diff > 0;
  var arrow = isUp ? '▲' : '▼';
  var color;
  if (upIsGood) {
    color = isUp ? '#198754' : '#dc3545';
  } else {
    color = isUp ? '#dc3545' : '#198754';
  }
  var displayVal = Math.abs(diff);
  return '<span style="color:' + color + ';font-size:0.75rem">' + arrow + ' ' + displayVal + '</span>';
}

function _buildDeltaPP(current, comparison, upIsGood) {
  if (comparison === null || comparison === undefined) return '';
  var diff = current - comparison;
  if (diff === 0) return '<span style="color:#6b7280;font-size:0.75rem">— no change</span>';
  var isUp = diff > 0;
  var arrow = isUp ? '▲' : '▼';
  var color;
  if (upIsGood) {
    color = isUp ? '#198754' : '#dc3545';
  } else {
    color = isUp ? '#dc3545' : '#198754';
  }
  return '<span style="color:' + color + ';font-size:0.75rem">' + arrow + ' ' + (isUp ? '+' : '') + diff + 'pp</span>';
}

// ── Implementation by Audit Area grouped bar chart ──
function _createImplByAreaChart(aps, obs) {
  var ctx = document.getElementById('chartImplByArea');
  if (!ctx) return;

  var implementedStatuses = ['Implemented', 'Verified', 'Closed'];

  // Group APs by audit area
  var areaMap = {};
  aps.forEach(function(ap) {
    var area = ap.audit_area_name || ap.audit_area_id || 'Unknown';
    if (!areaMap[area]) areaMap[area] = { notImpl: 0, impl: 0, notDue: 0, total: 0 };
    if (ap.status === 'Not Due') {
      areaMap[area].notDue++;
    } else if (implementedStatuses.indexOf(ap.status) !== -1) {
      areaMap[area].impl++;
    } else {
      areaMap[area].notImpl++;
    }
    areaMap[area].total++;
  });

  // Sort by total descending
  var areas = Object.keys(areaMap).sort(function(a, b) { return areaMap[b].total - areaMap[a].total; });

  if (areas.length === 0) return;

  var shortLabels = areas.map(_shortAreaLabel);
  var notImplData = areas.map(function(a) { return areaMap[a].notImpl; });
  var implData = areas.map(function(a) { return areaMap[a].impl; });
  var notDueData = areas.map(function(a) { return areaMap[a].notDue; });

  _chartInstances['chartImplByArea'] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: shortLabels,
      datasets: [
        { label: 'Not Implemented', backgroundColor: '#dc3545', data: notImplData },
        { label: 'Implemented', backgroundColor: '#198754', data: implData },
        { label: 'Not Due', backgroundColor: '#adb5bd', data: notDueData }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } },
        tooltip: {
          mode: 'index',
          intersect: false,
          callbacks: {
            title: function(items) {
              // Show full audit area name on hover
              var idx = items[0] ? items[0].dataIndex : 0;
              return areas[idx] || '';
            }
          }
        }
      },
      scales: {
        x: { grid: { display: false } },
        y: { beginAtZero: true, ticks: { stepSize: 1, precision: 0 } }
      }
    }
  });
}

// ── 12-Month Trend line chart ──
function _createTrendChart(obs, aps) {
  var ctx = document.getElementById('chartTrend');
  if (!ctx) return;

  var implementedStatuses = ['Implemented', 'Verified', 'Closed'];

  // Find earliest date across all data
  var allDates = [];
  obs.forEach(function(o) { if (o.created_at) allDates.push(new Date(o.created_at)); });
  aps.forEach(function(ap) {
    if (ap.created_at) allDates.push(new Date(ap.created_at));
    if (ap.implemented_date) allDates.push(new Date(ap.implemented_date));
  });

  if (allDates.length === 0) return;

  allDates.sort(function(a, b) { return a - b; });
  var earliest = allDates[0];
  var now = new Date();

  // Build monthly buckets
  var buckets = [];
  var d = new Date(earliest.getFullYear(), earliest.getMonth(), 1);
  while (d <= now) {
    buckets.push({ year: d.getFullYear(), month: d.getMonth(), obsCreated: 0, apsCreated: 0, apsClosed: 0 });
    d.setMonth(d.getMonth() + 1);
  }

  // Fill buckets
  obs.forEach(function(o) {
    if (!o.created_at) return;
    var dt = new Date(o.created_at);
    var idx = _findBucketIdx(buckets, dt.getFullYear(), dt.getMonth());
    if (idx >= 0) buckets[idx].obsCreated++;
  });

  aps.forEach(function(ap) {
    if (ap.created_at) {
      var dt = new Date(ap.created_at);
      var idx = _findBucketIdx(buckets, dt.getFullYear(), dt.getMonth());
      if (idx >= 0) buckets[idx].apsCreated++;
    }
    // APs closed: check implemented_date or if status is implemented and has updated_at
    var closeDate = ap.implemented_date || null;
    if (closeDate && implementedStatuses.indexOf(ap.status) !== -1) {
      var cdt = new Date(closeDate);
      var cidx = _findBucketIdx(buckets, cdt.getFullYear(), cdt.getMonth());
      if (cidx >= 0) buckets[cidx].apsClosed++;
    }
  });

  // Skip leading zero months
  var startIdx = 0;
  for (var i = 0; i < buckets.length; i++) {
    if (buckets[i].obsCreated > 0 || buckets[i].apsCreated > 0 || buckets[i].apsClosed > 0) {
      startIdx = i;
      break;
    }
  }
  buckets = buckets.slice(startIdx);

  if (buckets.length === 0) return;

  var monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  var labels = buckets.map(function(b) { return monthNames[b.month] + ' ' + String(b.year).slice(2); });

  _chartInstances['chartTrend'] = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        {
          label: 'Observations Created',
          borderColor: '#1a365d',
          backgroundColor: 'rgba(26,54,93,0.1)',
          fill: true,
          tension: 0.3,
          data: buckets.map(function(b) { return b.obsCreated; })
        },
        {
          label: 'APs Created',
          borderColor: '#c9a227',
          fill: false,
          tension: 0.3,
          data: buckets.map(function(b) { return b.apsCreated; })
        },
        {
          label: 'APs Closed',
          borderColor: '#198754',
          borderDash: [5, 5],
          fill: false,
          tension: 0.3,
          data: buckets.map(function(b) { return b.apsClosed; })
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } },
        tooltip: { mode: 'index', intersect: false }
      },
      scales: {
        x: { grid: { display: false } },
        y: { beginAtZero: true, ticks: { stepSize: 1, precision: 0 } }
      }
    }
  });
}

function _findBucketIdx(buckets, year, month) {
  for (var i = 0; i < buckets.length; i++) {
    if (buckets[i].year === year && buckets[i].month === month) return i;
  }
  return -1;
}

function _apStatusColor(status) {
  var map = {
    'Not Due': '#adb5bd', 'Pending': '#ffc107', 'In Progress': '#0d6efd',
    'Implemented': '#198754', 'Pending Verification': '#17a2b8', 'Verified': '#0d6efd',
    'Rejected': '#6f42c1', 'Overdue': '#dc3545', 'Not Implemented': '#dc3545', 'Closed': '#198754'
  };
  return map[status] || '#6c757d';
}

function _obsStatusColor(status) {
  var map = {
    'Draft': '#adb5bd', 'Submitted': '#0d6efd', 'Under Review': '#17a2b8',
    'Revision Required': '#ffc107', 'Approved': '#198754', 'Sent to Auditee': '#fd7e14'
  };
  return map[status] || '#6c757d';
}

function _riskBadgeColor(rating) {
  var map = { 'Extreme': '#7f1d1d', 'High': '#dc3545', 'Medium': '#ffc107', 'Low': '#198754' };
  return map[rating] || '#6c757d';
}

function _riskBadgeTextColor(rating) {
  return rating === 'Medium' ? '#000' : '#fff';
}

function _scoreRating(score) {
  if (score >= 80) return { label: 'Effective', color: '#198754' };
  if (score >= 60) return { label: 'Satisfactory', color: '#0d6efd' };
  if (score >= 40) return { label: 'Needs Improvement', color: '#ffc107' };
  return { label: 'Ineffective', color: '#dc3545' };
}

function renderRiskTab(data) {
  var pane = document.getElementById('pane-risk');
  if (!pane) return;

  destroyAllCharts();

  var obs = data ? data.observations : [];
  var aps = data ? data.actionPlans : [];
  var implementedStatuses = ['Implemented', 'Verified', 'Closed'];
  var riskLevels = ['Extreme', 'High', 'Medium', 'Low'];
  var riskColors = { 'Extreme': '#7f1d1d', 'High': '#dc3545', 'Medium': '#ffc107', 'Low': '#198754' };
  var riskTextColors = { 'Extreme': '#fff', 'High': '#fff', 'Medium': '#000', 'Low': '#fff' };

  // Count observations per risk level
  var riskCounts = {};
  riskLevels.forEach(function(r) { riskCounts[r] = 0; });
  obs.forEach(function(o) {
    var r = (o.risk_rating || '').trim();
    if (riskCounts[r] !== undefined) riskCounts[r]++;
  });

  // Delta calculations
  var comp = getComparisonPeriodData();
  var compRiskCounts = null;
  if (comp) {
    compRiskCounts = {};
    riskLevels.forEach(function(r) { compRiskCounts[r] = 0; });
    comp.observations.forEach(function(o) {
      var r = (o.risk_rating || '').trim();
      if (compRiskCounts[r] !== undefined) compRiskCounts[r]++;

  // ═══ ROW 1: Risk severity cards ═══
  var html = '<div class="row g-3 mb-4">';
  riskLevels.forEach(function(level) {
    var delta = compRiskCounts ? _buildDelta(riskCounts[level], compRiskCounts[level], false) : '';

      '<div class="text-muted text-uppercase" style="font-size:0.7rem;letter-spacing:1px">' + level + ' Risk</div>' +

  html += '</div>';

  // ═══ ROW 2: Risk Distribution bar + Risk by Audit Area chart ═══
  html += '<div class="row g-3 mb-4">';

  // Left: Risk Distribution horizontal stacked bar
  var totalObs = obs.length || 1;
  html += '<div class="col-md-6"><div class="card shadow-sm h-100"><div class="card-body">' +
    '<h6 class="card-title">Risk Distribution</h6>' +
    '<div class="d-flex" style="height:40px;border-radius:6px;overflow:hidden">';
  riskLevels.forEach(function(level) {
    var pct = Math.round(riskCounts[level] / totalObs * 100);
    if (pct > 0) {
      var inner = pct >= 15 ? riskCounts[level] : '';
      html += '<div style="width:' + pct + '%;background:' + riskColors[level] + '" class="d-flex align-items-center justify-content-center fw-bold" style2="color:' + riskTextColors[level] + '" title="' + level + ': ' + riskCounts[level] + '"><span style="color:' + riskTextColors[level] + '">' + inner + '</span></div>';
    }
  });

  riskLevels.forEach(function(level) {
    html += '<span><span style="display:inline-block;width:10px;height:10px;background:' + riskColors[level] + ';border-radius:2px"></span> ' + level + ' (' + riskCounts[level] + ')</span>';
  });
  html += '</div></div></div></div>';

  // Right: Risk by Audit Area stacked bar chart
  html += '<div class="col-md-6"><div class="card shadow-sm h-100"><div class="card-body">' +
    '<h6 class="card-title">Risk by Audit Area</h6>' +
    '<div style="min-height:300px;position:relative"><canvas id="chartRiskByArea"></canvas></div>' +
    '</div></div></div>';
  html += '</div>'; // end row 2

  // ═══ ROW 3: Risk Heat Map ═══
  var affiliateRiskMap = {};
  obs.forEach(function(o) {
    var aff = o.affiliate_code || 'Unknown';
    if (!affiliateRiskMap[aff]) affiliateRiskMap[aff] = { Extreme: 0, High: 0, Medium: 0, Low: 0, total: 0 };
    var r = (o.risk_rating || '').trim();
    if (affiliateRiskMap[aff][r] !== undefined) affiliateRiskMap[aff][r]++;
    affiliateRiskMap[aff].total++;
  });
  var affiliates = Object.keys(affiliateRiskMap).sort(function(a, b) { return affiliateRiskMap[b].total - affiliateRiskMap[a].total; });

  html += '<div class="card shadow-sm mb-4"><div class="card-body">' +
    '<h6 class="card-title">Risk Heat Map (Affiliate × Severity)</h6>' +
    '<div class="table-responsive"><table class="table table-bordered table-sm mb-0">' +
    '<thead><tr><th>Affiliate</th>';
  riskLevels.forEach(function(r) { html += '<th class="text-center">' + r + '</th>'; });
  html += '<th class="text-center">Total</th></tr></thead><tbody>';

  var colTotals = { Extreme: 0, High: 0, Medium: 0, Low: 0, total: 0 };
  affiliates.forEach(function(aff) {
    var row = affiliateRiskMap[aff];
    html += '<tr><td class="fw-semibold">' + escapeHtml(aff) + '</td>';
    riskLevels.forEach(function(r) {
      var val = row[r];
      colTotals[r] += val;
      if (val > 0) {
        html += '<td style="background:' + riskColors[r] + ';color:' + riskTextColors[r] + ';font-weight:700;text-align:center">' + val + '</td>';
      } else {
        html += '<td style="background:#f8f9fa;color:#adb5bd;text-align:center">0</td>';
      }
    });
    colTotals.total += row.total;
    html += '<td class="fw-bold text-center">' + row.total + '</td></tr>';
  });

  // Footer totals
  html += '</tbody><tfoot><tr class="fw-bold"><td>Total</td>';
  riskLevels.forEach(function(r) { html += '<td class="text-center">' + colTotals[r] + '</td>'; });
  html += '<td class="text-center">' + colTotals.total + '</td></tr></tfoot></table></div></div></div>';

  // ═══ ROW 4: Performance Scorecard ═══
  var areaPerf = {};
  obs.forEach(function(o) {
    var area = o.audit_area_name || o.audit_area_id || 'Unknown';
    if (!areaPerf[area]) areaPerf[area] = { obs: 0, aps: 0, impl: 0, overdue: 0, highRisk: 0, totalDue: 0 };
    areaPerf[area].obs++;
    if (o.risk_rating === 'Extreme' || o.risk_rating === 'High') areaPerf[area].highRisk++;
  });
  aps.forEach(function(ap) {
    var area = ap.audit_area_name || ap.audit_area_id || 'Unknown';
    if (!areaPerf[area]) areaPerf[area] = { obs: 0, aps: 0, impl: 0, overdue: 0, highRisk: 0, totalDue: 0 };
    areaPerf[area].aps++;
    if (ap.status !== 'Not Due') {
      areaPerf[area].totalDue++;
      if (implementedStatuses.indexOf(ap.status) !== -1) areaPerf[area].impl++;
    }
    if (ap.days_overdue > 0 && implementedStatuses.indexOf(ap.status) === -1) areaPerf[area].overdue++;
  });

  // Compute scores and sort worst-first
  var areaPerfList = Object.keys(areaPerf).map(function(area) {
    var p = areaPerf[area];
    var implRate = p.totalDue > 0 ? p.impl / p.totalDue : 1;
    var score = Math.round(Math.max(0, Math.min(100, 100 - (p.overdue * 10) - ((1 - implRate) * 40) - (p.highRisk * 5))));
    return { area: area, obs: p.obs, aps: p.aps, implRate: Math.round(implRate * 100), overdue: p.overdue, score: score };
  }).sort(function(a, b) { return a.score - b.score; });

  html += '<div class="card shadow-sm mb-4"><div class="card-body">' +
    '<h6 class="card-title">Control Effectiveness by Audit Area</h6>' +
    '<div class="table-responsive"><table class="table table-bordered table-sm table-hover mb-0">' +
    '<thead><tr><th>Audit Area</th><th class="text-center">Observations</th><th class="text-center">Action Plans</th><th class="text-center">Impl. Rate</th><th class="text-center">Overdue</th><th class="text-center">Score</th><th class="text-center">Rating</th></tr></thead><tbody>';

  areaPerfList.forEach(function(p) {
    var irc = _implRateColor(p.implRate);
    var rating = _scoreRating(p.score);
    html += '<tr><td class="fw-semibold">' + escapeHtml(p.area) + '</td>' +
      '<td class="text-center">' + p.obs + '</td>' +
      '<td class="text-center">' + p.aps + '</td>' +
      '<td class="text-center"><span class="badge" style="background:' + irc + '">' + p.implRate + '%</span></td>' +
      '<td class="text-center"' + (p.overdue > 0 ? ' style="color:#dc3545;font-weight:700"' : '') + '>' + (p.overdue || '<span class="text-muted">0</span>') + '</td>' +
      '<td class="text-center" style="color:' + rating.color + ';font-weight:700">' + p.score + '</td>' +
      '<td class="text-center"><span class="badge" style="background:' + rating.color + '">' + rating.label + '</span></td>' +
      '</tr>';
  });
  html += '</tbody></table></div></div></div>';

  pane.innerHTML = html;

  // Create Risk by Audit Area chart
  _createRiskByAreaChart(obs);
}

function _createRiskByAreaChart(obs) {
  var ctx = document.getElementById('chartRiskByArea');
  if (!ctx) return;

  var riskLevels = ['Extreme', 'High', 'Medium', 'Low'];
  var riskColors = { 'Extreme': '#7f1d1d', 'High': '#dc3545', 'Medium': '#ffc107', 'Low': '#198754' };

  var areaMap = {};
  obs.forEach(function(o) {
    var area = o.audit_area_name || o.audit_area_id || 'Unknown';
    if (!areaMap[area]) areaMap[area] = { Extreme: 0, High: 0, Medium: 0, Low: 0, total: 0 };
    var r = (o.risk_rating || '').trim();
    if (areaMap[area][r] !== undefined) areaMap[area][r]++;
    areaMap[area].total++;
  });

  var areas = Object.keys(areaMap).sort(function(a, b) { return areaMap[b].total - areaMap[a].total; });
  if (areas.length === 0) return;

  var shortLabels = areas.map(_shortAreaLabel);
  var datasets = riskLevels.map(function(level) {
    return {
      label: level,
      backgroundColor: riskColors[level],
      data: areas.map(function(a) { return areaMap[a][level]; })
    };
  });

  _chartInstances['chartRiskByArea'] = new Chart(ctx, {
    type: 'bar',
    data: { labels: shortLabels, datasets: datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } },
        tooltip: {
          mode: 'index', intersect: false,
          callbacks: { title: function(items) { return areas[items[0] ? items[0].dataIndex : 0] || ''; } }
        }
      },
      scales: {
        x: { stacked: true, grid: { display: false } },
        y: { stacked: true, beginAtZero: true, ticks: { stepSize: 1, precision: 0 } }
      }
    }
  });
}

function toggleDetailGroup(el) {
  var next = el.nextElementSibling;
  if (!next) return;
  next.style.display = next.style.display === 'none' ? '' : 'none';
  var icon = el.querySelector('i');
  if (icon) { icon.classList.toggle('bi-chevron-up'); icon.classList.toggle('bi-chevron-down'); }
}

function switchToDashTab(tabId) {
  var link = document.querySelector('[data-tab="' + tabId + '"]');
  if (link) link.click();
}

function renderDetailTab(data) {
  var pane = document.getElementById('pane-detail');
  if (!pane) return;

  destroyAllCharts();

  var obs = data ? data.observations : [];
  var aps = data ? data.actionPlans : [];
  var implementedStatuses = ['Implemented', 'Verified', 'Closed'];

  var html = '';

  // ═══ SECTION 1: Observations grouped by risk level ═══
  html += '<h5 class="mb-3">Detailed Observations (' + obs.length + ')</h5>';

  var riskGroups = [
    { level: 'Extreme', bg: '#f8d7da', expanded: true },
    { level: 'High', bg: '#f8d7da', expanded: true },
    { level: 'Medium', bg: '#fff3cd', expanded: true },
    { level: 'Low', bg: '#d1e7dd', expanded: false }
  ];

  riskGroups.forEach(function(grp) {
    var groupObs = obs.filter(function(o) { return (o.risk_rating || '').trim() === grp.level; })
      .sort(function(a, b) { return new Date(b.created_at || 0) - new Date(a.created_at || 0); });

    if (groupObs.length === 0) return;

    var chevron = grp.expanded ? 'bi-chevron-up' : 'bi-chevron-down';
    html += '<div class="d-flex justify-content-between align-items-center p-2 rounded mb-1" style="background:' + grp.bg + ';cursor:pointer" onclick="toggleDetailGroup(this)">' +
      '<strong>' + grp.level + ' Risk (' + groupObs.length + ')</strong><i class="bi ' + chevron + '"></i></div>';

    html += '<div class="mb-3"' + (grp.expanded ? '' : ' style="display:none"') + '>';
    html += '<div class="table-responsive"><table class="table table-sm table-hover mb-0"><thead><tr>' +
      '<th>Risk</th><th>Observation</th><th>Affiliate</th><th>Audit Area</th><th>Status</th><th class="text-center">APs</th><th class="text-center">Overdue</th>' +
      '</tr></thead><tbody>';

    groupObs.forEach(function(o) {
      var title = o.observation_title || '';
      var shortTitle = title.length > 80 ? title.substring(0, 80) + '...' : title;
      var badgeColor = _riskBadgeColor(o.risk_rating);
      var badgeText = _riskBadgeTextColor(o.risk_rating);
      var statusColor = _obsStatusColor(o.status);
      var apCount = o.action_plan_count || 0;
      var overdueAps = o.overdue_ap_count || 0;

      html += '<tr>' +
        '<td><span class="badge" style="background:' + badgeColor + ';color:' + badgeText + '">' + escapeHtml(o.risk_rating || '') + '</span></td>' +
        '<td title="' + escapeHtml(title) + '">' + escapeHtml(shortTitle) + '</td>' +
        '<td>' + escapeHtml(o.affiliate_code || '') + '</td>' +
        '<td>' + escapeHtml(o.audit_area_name || o.audit_area_id || '') + '</td>' +
        '<td><span class="badge" style="background:' + statusColor + '">' + escapeHtml(o.status || '') + '</span></td>' +
        '<td class="text-center">' + apCount + '</td>' +
        '<td class="text-center"' + (overdueAps > 0 ? ' style="color:#dc3545;font-weight:700"' : '') + '>' + (overdueAps > 0 ? overdueAps : '<span class="text-muted">—</span>') + '</td>' +
        '</tr>';
    });
    html += '</tbody></table></div></div>';
  });

  // ═══ SECTION 2: AP Status Breakdown ═══
  html += '<div class="card shadow-sm mb-4"><div class="card-body">' +
    '<h6 class="card-title">Action Plan Status Breakdown</h6>';

  var statusCounts = {};
  aps.forEach(function(ap) {
    var s = ap.status || 'Unknown';
    statusCounts[s] = (statusCounts[s] || 0) + 1;
  });

  var statusList = Object.keys(statusCounts).map(function(s) { return { status: s, count: statusCounts[s] }; })
    .sort(function(a, b) { return b.count - a.count; });
  var totalAPs = aps.length || 1;

  html += '<table class="table table-sm mb-0"><thead><tr><th>Status</th><th class="text-center" style="width:80px">Count</th><th>Distribution</th></tr></thead><tbody>';
  statusList.forEach(function(item) {
    var pct = Math.round(item.count / totalAPs * 100);
    var color = _apStatusColor(item.status);
    html += '<tr>' +
      '<td><span class="badge" style="background:' + color + '">' + escapeHtml(item.status) + '</span></td>' +
      '<td class="text-center">' + item.count + '</td>' +
      '<td><div class="progress" style="height:20px"><div class="progress-bar" style="width:' + pct + '%;background:' + color + '">' + pct + '%</div></div></td>' +
      '</tr>';
  });
  html += '</tbody></table></div></div>';

  // ═══ SECTION 3: Aging Analysis ═══
  html += '<h5 class="mb-3">Aging Analysis</h5>';

  // Classify APs into aging buckets (only non-closed APs)
  var openAPs = aps.filter(function(ap) { return implementedStatuses.indexOf(ap.status) === -1; });
  var buckets = [
    { label: 'CURRENT', subtitle: 'Not yet due', color: '#198754', bg: 'rgba(25,135,84,0.1)', count: 0 },
    { label: '1-30 DAYS', subtitle: 'Overdue', color: '#ffc107', bg: 'rgba(255,193,7,0.1)', count: 0 },
    { label: '31-60 DAYS', subtitle: 'Overdue', color: '#fd7e14', bg: 'rgba(253,126,20,0.1)', count: 0 },
    { label: '61-90 DAYS', subtitle: 'Overdue', color: '#dc3545', bg: 'rgba(220,53,69,0.1)', count: 0 },
    { label: '90+ DAYS', subtitle: 'Critical', color: '#7f1d1d', bg: 'rgba(127,29,29,0.1)', count: 0 }
  ];

  openAPs.forEach(function(ap) {
    var d = ap.days_overdue || 0;
    if (d <= 0) buckets[0].count++;
    else if (d <= 30) buckets[1].count++;
    else if (d <= 60) buckets[2].count++;
    else if (d <= 90) buckets[3].count++;
    else buckets[4].count++;
  });

  // Aging bucket cards
  html += '<div class="row g-3 mb-4">';
  buckets.forEach(function(b) {
    html += '<div class="col"><div class="card text-center h-100" style="border-top:3px solid ' + b.color + ';background:' + b.bg + '">' +
      '<div class="card-body p-3"><div style="font-size:1.5rem;font-weight:700;color:' + b.color + '">' + b.count + '</div>' +
      '<div style="font-size:0.7rem;text-transform:uppercase;letter-spacing:1px;color:' + b.color + '">' + b.label + '</div>' +
      '<div class="text-muted" style="font-size:0.75rem">' + b.subtitle + '</div>' +
      '</div></div></div>';
  });
  html += '</div>';

  // Aging donut + summary side by side
  var totalOpen = openAPs.length;
  var totalOverdue = openAPs.filter(function(ap) { return (ap.days_overdue || 0) > 0; }).length;
  var overdueRate = totalOpen > 0 ? Math.round(totalOverdue / totalOpen * 100) : 0;
  var onTimeRate = 100 - overdueRate;

  html += '<div class="row g-3 mb-4">';

  // Left: Aging donut
  html += '<div class="col-md-6"><div class="card shadow-sm h-100"><div class="card-body">' +
    '<h6 class="card-title">Aging Distribution</h6>' +
    '<div style="min-height:250px;position:relative"><canvas id="chartAgingDonut"></canvas></div>' +
    '</div></div></div>';

  // Right: Summary stats
  html += '<div class="col-md-6"><div class="card shadow-sm h-100"><div class="card-body">' +
    '<h6 class="card-title">Summary</h6>' +
    '<div class="mb-3"><div class="d-flex justify-content-between mb-1"><span class="fw-bold">Total Open Action Plans</span><span class="fw-bold fs-5">' + totalOpen + '</span></div></div>' +
    '<div class="mb-3"><div class="d-flex justify-content-between mb-1"><span>Total Overdue</span><span style="' + (totalOverdue > 0 ? 'color:#dc3545;font-weight:700' : '') + '">' + totalOverdue + '</span></div></div>' +
    '<div class="mb-3"><div class="d-flex justify-content-between mb-1"><span>Overdue Rate</span><span style="' + (overdueRate > 30 ? 'color:#dc3545;font-weight:700' : '') + '">' + overdueRate + '%</span></div></div>' +
    '<div class="mb-2"><small class="text-muted">On-Time vs Overdue</small></div>' +
    '<div class="d-flex" style="height:24px;border-radius:6px;overflow:hidden">' +
      '<div style="width:' + onTimeRate + '%;background:#198754" class="d-flex align-items-center justify-content-center text-white" title="On-Time">' + (onTimeRate >= 15 ? onTimeRate + '%' : '') + '</div>' +
      '<div style="width:' + overdueRate + '%;background:#dc3545" class="d-flex align-items-center justify-content-center text-white" title="Overdue">' + (overdueRate >= 15 ? overdueRate + '%' : '') + '</div>' +
    '</div>' +
    '<div class="d-flex justify-content-between mt-1" style="font-size:0.75rem"><span><span style="display:inline-block;width:10px;height:10px;background:#198754;border-radius:2px"></span> On-Time</span><span><span style="display:inline-block;width:10px;height:10px;background:#dc3545;border-radius:2px"></span> Overdue</span></div>' +
    '</div></div></div>';
  html += '</div>'; // end row

  // Overdue table
  var allOverdue = aps.filter(function(ap) { return (ap.days_overdue || 0) > 0 && implementedStatuses.indexOf(ap.status) === -1; })
    .sort(function(a, b) { return (b.days_overdue || 0) - (a.days_overdue || 0); });

  html += '<div class="card shadow-sm mb-4"><div class="card-body">' +
    '<h6 class="card-title">Overdue Action Plans (' + allOverdue.length + ')</h6>';

  if (allOverdue.length > 0) {
    var showCount = Math.min(allOverdue.length, 20);
    var hasMore = allOverdue.length > 20;

    html += '<div class="table-responsive"><table class="table table-bordered table-sm table-hover mb-0"><thead><tr>' +
      '<th>Description</th><th>Owner</th><th>Affiliate</th><th>Risk</th><th class="text-end">Days Overdue</th><th>Status</th>' +
      '</tr></thead><tbody id="overdueTableBody">';

    allOverdue.forEach(function(ap, idx) {
      var desc = ap.action_description || '';
      var shortDesc = desc.length > 60 ? desc.substring(0, 60) + '...' : desc;
      var owner = '';
      if (ap.owner_names) {
        owner = Array.isArray(ap.owner_names) ? (ap.owner_names[0] || '') : String(ap.owner_names).split(',')[0].trim();
      } else if (ap.owner_ids) {
        owner = Array.isArray(ap.owner_ids) ? (ap.owner_ids[0] || '') : String(ap.owner_ids);
      }
      var riskColor = _riskBadgeColor(ap.risk_rating);
      var riskText = _riskBadgeTextColor(ap.risk_rating);
      var statusColor = _apStatusColor(ap.status);
      var hiddenClass = (hasMore && idx >= 20) ? ' class="d-none _overdue-extra"' : '';

      html += '<tr' + hiddenClass + '>' +
        '<td title="' + escapeHtml(desc) + '">' + escapeHtml(shortDesc) + '</td>' +
        '<td>' + escapeHtml(owner) + '</td>' +
        '<td>' + escapeHtml(ap.affiliate_code || '') + '</td>' +
        '<td><span class="badge" style="background:' + riskColor + ';color:' + riskText + '">' + escapeHtml(ap.risk_rating || '') + '</span></td>' +
        '<td class="text-end" style="color:#dc3545;font-weight:700">' + (ap.days_overdue || 0) + '</td>' +
        '<td><span class="badge" style="background:' + statusColor + '">' + escapeHtml(ap.status || '') + '</span></td>' +
        '</tr>';
    });
    html += '</tbody></table></div>';

    if (hasMore) {
      html += '<div class="text-center mt-2"><button class="btn btn-sm btn-outline-secondary" id="btnShowAllOverdue" onclick="_toggleAllOverdue()">Show all (' + allOverdue.length + ')</button></div>';
    }
  } else {
    html += '<div class="text-center text-success py-4"><i class="bi bi-check-circle" style="font-size:2rem"></i><div class="mt-2">No overdue action plans</div></div>';
  }
  html += '</div></div>';

  pane.innerHTML = html;

  // Create charts after DOM insertion
  _createAgingDonutChart(buckets);
}

function _toggleAllOverdue() {
  var extras = document.querySelectorAll('._overdue-extra');
  var btn = document.getElementById('btnShowAllOverdue');
  if (!extras.length) return;
  var showing = !extras[0].classList.contains('d-none');
  extras.forEach(function(el) { el.classList.toggle('d-none', showing); });
  if (btn) btn.textContent = showing ? 'Show all (' + (extras.length + 20) + ')' : 'Show less';
}

function _createAgingDonutChart(buckets) {
  var ctx = document.getElementById('chartAgingDonut');
  if (!ctx) return;

  _chartInstances['chartAgingDonut'] = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: buckets.map(function(b) { return b.label; }),
      datasets: [{
        data: buckets.map(function(b) { return b.count; }),
        backgroundColor: ['#198754', '#ffc107', '#fd7e14', '#dc3545', '#7f1d1d']
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } }
      }
    }
  });
}

function destroyAllCharts() {
  Object.keys(_chartInstances).forEach(function(id) {
    if (_chartInstances[id]) {
      try { _chartInstances[id].destroy(); } catch (e) {}
      delete _chartInstances[id];
    }
  });
  // Also clean legacy reportCharts
  Object.keys(reportCharts).forEach(function(k) {
    if (reportCharts[k]) {
      try { reportCharts[k].destroy(); } catch (e) {}
      delete reportCharts[k];
    }
  });
}

  _dashboardCache = null;
  _dashboardFiltered = null;
  destroyAllCharts();
  loadDashboardV2();
}

  var header = document.getElementById('printReportHeader');
  var title = document.getElementById('printReportTitle');
  var dateEl = document.getElementById('printReportDate');

  setTimeout(function() {
    window.print();
    setTimeout(function() { if (header) header.classList.add('d-none'); }, 1000);

  var tabNames = { overview: 'Dashboard Overview', risk: 'Risk & Performance', detail: 'Detail Report' };
  var reportTitle = tabNames[_currentDashTab] || 'Audit Report';

  var aps = _dashboardFiltered.actionPlans || [];
  var closedStatuses = ['Implemented', 'Verified', 'Not Implemented', 'Closed', 'Rejected'];
  var closedAPs = aps.filter(function(ap) { return closedStatuses.indexOf(ap.status) !== -1; });
  var overdueAPs = aps.filter(function(ap) { return ap.days_overdue > 0 && closedStatuses.indexOf(ap.status) === -1; });

  var html = '<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">' +
    '<head><meta charset="utf-8"><title>' + reportTitle + '</title>' +
    '<style>body{font-family:Calibri,Arial,sans-serif;font-size:11pt;color:#333;margin:40px;}' +
    'h1{color:#1a365d;font-size:18pt;border-bottom:3px solid #1a365d;padding-bottom:8px;}' +
    'h2{color:#1a365d;font-size:14pt;margin-top:20px;}' +
    'table{border-collapse:collapse;width:100%;margin:12px 0;}' +
    'th{background:#1a365d;color:#fff;padding:8px 12px;text-align:left;font-size:10pt;}' +
    'td{border:1px solid #ddd;padding:6px 12px;font-size:10pt;}' +
    'tr:nth-child(even){background:#f9fafb;}' +
    '</style></head><body>';

  html += '<h1>Hass Petroleum - ' + reportTitle + '</h1>';
  html += '<p style="color:#666;">Generated: ' + new Date().toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' }) + '</p>';

  html += '<h2>Summary</h2>';
  html += '<table><tr><th>Metric</th><th>Value</th></tr>' +
    '<tr><td>Total Observations</td><td>' + obs.length + '</td></tr>' +
    '<tr><td>Total Action Plans</td><td>' + aps.length + '</td></tr>' +
    '<tr><td>Closed Action Plans</td><td>' + closedAPs.length + '</td></tr>' +
    '<tr><td>Overdue Action Plans</td><td>' + overdueAPs.length + '</td></tr>' +
    '</table>';

  html += '</body></html>';

  var blob = new Blob([html], { type: 'application/msword' });
  var link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'Audit_Report_' + reportTitle.replace(/\s+/g, '_') + '_' + new Date().toISOString().split('T')[0] + '.doc';
  link.click();
  URL.revokeObjectURL(link.href);
  showToast('Word document downloaded', 'success');
}

function exportReportExcel() {
  if (!_dashboardFiltered) { showToast('No report data to export', 'warning'); return; }

  var obs = _dashboardFiltered.observations || [];
  var aps = _dashboardFiltered.actionPlans || [];

  var html = '<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">' +
    '<head><meta charset="utf-8"><!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets>' +
    '<x:ExcelWorksheet><x:Name>Observations</x:Name><x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions></x:ExcelWorksheet>' +
    '<x:ExcelWorksheet><x:Name>Action Plans</x:Name><x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions></x:ExcelWorksheet>' +
    '</x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]--></head><body>';

  // Observations sheet
  html += '<div id="Observations"><table border="1"><tr style="background:#1a365d;color:#fff;">' +
    '<th>ID</th><th>Title</th><th>Affiliate</th><th>Audit Area</th><th>Risk Rating</th><th>Status</th><th>Date</th><th>Action Plans</th><th>Overdue APs</th></tr>';
  obs.forEach(function(o) {
    html += '<tr><td>' + (o.work_paper_id || '') + '</td><td>' + escapeHtml(o.observation_title || '') + '</td><td>' + escapeHtml(o.affiliate_code || '') + '</td><td>' + escapeHtml(o.audit_area_name || o.audit_area_id || '') + '</td><td>' + escapeHtml(o.risk_rating || '') + '</td><td>' + escapeHtml(o.status || '') + '</td><td>' + (o.created_at ? formatDate(o.created_at) : '') + '</td><td>' + (o.action_plan_count || 0) + '</td><td>' + (o.overdue_ap_count || 0) + '</td></tr>';
  });
  html += '</table></div>';

  // Action Plans sheet
  html += '<div id="Action Plans"><table border="1"><tr style="background:#1a365d;color:#fff;">' +
    '<th>ID</th><th>Description</th><th>Owner</th><th>Affiliate</th><th>Due Date</th><th>Status</th><th>Days Overdue</th></tr>';
  aps.forEach(function(ap) {
    html += '<tr><td>' + (ap.action_plan_id || '') + '</td><td>' + escapeHtml(ap.action_description || '') + '</td><td>' + escapeHtml(ap.owner_names || '') + '</td><td>' + escapeHtml(ap.affiliate_code || '') + '</td><td>' + (ap.due_date ? formatDate(ap.due_date) : '') + '</td><td>' + escapeHtml(ap.status || '') + '</td><td>' + (ap.days_overdue || 0) + '</td></tr>';
  });
  html += '</table></div>';

  html += '</body></html>';

  var blob = new Blob([html], { type: 'application/vnd.ms-excel' });
  var link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'Audit_Report_' + new Date().toISOString().split('T')[0] + '.xls';
  link.click();
  URL.revokeObjectURL(link.href);
  showToast('Excel file downloaded', 'success');
}
