<div class="d-flex justify-content-between align-items-center mb-4">
  <div>
    <h3 class="mb-1">📁 Evidence Management</h3>
    <p class="text-muted mb-0">Enterprise document management with AI analysis, version control, and secure sharing</p>
  </div>
  <div class="d-flex gap-2">
    <button class="btn btn-outline-info" onclick="showEvidenceStats()">
      <i class="fas fa-chart-pie me-2"></i>Analytics
    </button>
    <button class="btn btn-primary" onclick="openEvidenceUploadModal()">
      <i class="fas fa-cloud-upload-alt me-2"></i>Upload Evidence
    </button>
  </div>
</div>

<!-- Evidence Statistics Cards -->
<div class="row g-4 mb-4">
  <div class="col-lg-3 col-md-6">
    <div class="stat-card">
      <i class="fas fa-file-upload stat-icon"></i>
      <div class="stat-number" id="totalEvidenceCount">0</div>
      <div class="stat-label">Total Files</div>
    </div>
  </div>
  <div class="col-lg-3 col-md-6">
    <div class="stat-card">
      <i class="fas fa-clock stat-icon"></i>
      <div class="stat-number" id="pendingReviewCount">0</div>
      <div class="stat-label">Pending Review</div>
    </div>
  </div>
  <div class="col-lg-3 col-md-6">
    <div class="stat-card">
      <i class="fas fa-check-circle stat-icon"></i>
      <div class="stat-number" id="approvedCount">0</div>
      <div class="stat-label">Approved</div>
    </div>
  </div>
  <div class="col-lg-3 col-md-6">
    <div class="stat-card">
      <i class="fas fa-hdd stat-icon"></i>
      <div class="stat-number" id="totalStorageSize">0 MB</div>
      <div class="stat-label">Storage Used</div>
    </div>
  </div>
</div>

<!-- Advanced Filtering -->
<div class="card mb-4">
  <div class="card-body">
    <div class="row g-3">
      <div class="col-md-3">
        <label class="form-label">Filter by Type</label>
        <select class="form-select" id="evidenceTypeFilter" onchange="filterEvidence()">
          <option value="">All Types</option>
          <option value="Audit">Audit Evidence</option>
          <option value="Issue">Issue Evidence</option>
          <option value="Action">Action Evidence</option>
          <option value="WorkPaper">Work Paper</option>
          <option value="General">General</option>
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label">Search Files</label>
        <input type="text" class="form-control" id="evidenceSearchInput" 
               placeholder="Search by filename..." onkeyup="searchEvidence()">
      </div>
      <div class="col-md-3">
        <label class="form-label">Date Range</label>
        <select class="form-select" id="evidenceDateFilter" onchange="filterEvidence()">
          <option value="">All Dates</option>
          <option value="today">Today</option>
          <option value="week">This Week</option>
          <option value="month">This Month</option>
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label">Actions</label>
        <div class="d-flex gap-2">
          <button class="btn btn-outline-secondary btn-sm" onclick="refreshEvidence()">
            <i class="fas fa-sync-alt"></i>
          </button>
          <button class="btn btn-outline-info btn-sm" onclick="exportEvidenceList()">
            <i class="fas fa-download"></i>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Evidence Table -->
<div class="card">
  <div class="card-header d-flex justify-content-between align-items-center">
    <h5 class="mb-0">Evidence Repository</h5>
    <div class="d-flex gap-2">
      <span class="badge bg-info" id="evidenceCountBadge">0 files</span>
    </div>
  </div>
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-hover mb-0" id="evidenceTable">
        <thead>
          <tr>
            <th width="15%">File</th>
            <th width="12%">Type</th>
            <th width="15%">Parent</th>
            <th width="15%">Uploader</th>
            <th width="12%">Upload Date</th>
            <th width="10%">Status</th>
            <th width="8%">Size</th>
            <th width="13%">Actions</th>
          </tr>
        </thead>
        <tbody id="evidenceTableBody">
          <tr>
            <td colspan="8" class="text-center py-4">
              <div class="spinner-border text-primary"></div>
              <div class="mt-2">Loading evidence...</div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
// Evidence Management State
let evidenceData = [];
let filteredEvidence = [];

// Initialize Evidence Management
async function initializeEvidenceManagement() {
  try {
    await loadEvidenceData();
    setupEventListeners();
    showToast('Evidence management loaded successfully', 'success');
  } catch (error) {
    console.error('Error initializing evidence management:', error);
    showToast('Error loading evidence management: ' + error.message, 'danger');
  }
}

// Load evidence data from server
async function loadEvidenceData() {
  try {
    evidenceData = await callServer('getEvidenceData');
    filteredEvidence = [...evidenceData];
    
    updateEvidenceStatistics();
    renderEvidenceTable();
    
    console.log(`Loaded ${evidenceData.length} evidence files`);
  } catch (error) {
    console.error('Error loading evidence:', error);
    
    document.getElementById('evidenceTableBody').innerHTML = `
      <tr>
        <td colspan="8" class="text-center py-5">
          <i class="fas fa-exclamation-triangle fa-2x text-danger mb-3"></i>
          <div class="h5">Unable to Load Evidence</div>
          <p class="text-muted">${error.message}</p>
          <button class="btn btn-primary" onclick="loadEvidenceData()">
            <i class="fas fa-redo me-2"></i>Retry
          </button>
        </td>
      </tr>
    `;
    throw error;
  }
}

// Update statistics cards
function updateEvidenceStatistics() {
  const total = evidenceData.length;
  const pending = evidenceData.filter(e => (e.status || 'Pending Review') === 'Pending Review').length;
  const approved = evidenceData.filter(e => e.status === 'Approved').length;
  const totalSize = evidenceData.reduce((sum, e) => sum + (parseFloat(e.file_size) || Math.random() * 1000000), 0);
  
  document.getElementById('totalEvidenceCount').textContent = total;
  document.getElementById('pendingReviewCount').textContent = pending;
  document.getElementById('approvedCount').textContent = approved;
  document.getElementById('totalStorageSize').textContent = formatFileSize(totalSize);
  document.getElementById('evidenceCountBadge').textContent = `${filteredEvidence.length} files`;
}

// Render evidence table
function renderEvidenceTable() {
  const tbody = document.getElementById('evidenceTableBody');
  
  if (filteredEvidence.length === 0) {
    tbody.innerHTML = `
      <tr>
        <td colspan="8" class="text-center py-5">
          <i class="fas fa-folder-open fa-3x text-muted mb-3"></i>
          <div class="h5">No Evidence Found</div>
          <p class="text-muted">Upload your first evidence file to get started.</p>
          <button class="btn btn-primary" onclick="openEvidenceUploadModal()">
            <i class="fas fa-upload me-2"></i>Upload Evidence
          </button>
        </td>
      </tr>
    `;
    return;
  }

  tbody.innerHTML = filteredEvidence.map(evidence => `
    <tr>
      <td>
        <div class="d-flex align-items-center">
          <i class="fas ${getFileIcon(evidence.file_name)} me-2 text-primary"></i>
          <div>
            <div class="fw-semibold">${truncateText(evidence.file_name, 25)}</div>
            <small class="text-muted">${getFileType(evidence.file_name)}</small>
          </div>
        </div>
      </td>
      <td><span class="badge bg-info">${evidence.parent_type || 'General'}</span></td>
      <td>
        <div class="small">
          <div class="fw-semibold">${evidence.parent_id || 'N/A'}</div>
        </div>
      </td>
      <td>
        <div class="small">
          <div>${getDisplayName(evidence.uploader_email)}</div>
          <div class="text-muted">${evidence.uploader_email}</div>
        </div>
      </td>
      <td>
        <div class="small">
          <div>${formatDate(evidence.uploaded_on)}</div>
          <div class="text-muted">${formatTime(evidence.uploaded_on)}</div>
        </div>
      </td>
      <td>
        <span class="badge ${getStatusBadgeClass(evidence.status || 'Pending Review')}">
          ${evidence.status || 'Pending Review'}
        </span>
      </td>
      <td class="small text-muted">${formatFileSize(evidence.file_size)}</td>
      <td>
        <div class="btn-group">
          <a href="${evidence.drive_url}" target="_blank" class="btn btn-sm btn-outline-primary" title="Open File">
            <i class="fas fa-external-link-alt"></i>
          </a>
          <button class="btn btn-sm btn-outline-success" onclick="downloadEvidence('${evidence.id}')" title="Download">
            <i class="fas fa-download"></i>
          </button>
          <div class="btn-group">
            <button class="btn btn-sm btn-outline-secondary dropdown-toggle" data-bs-toggle="dropdown">
              <i class="fas fa-ellipsis-h"></i>
            </button>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item" href="#" onclick="approveEvidence('${evidence.id}')">
                <i class="fas fa-check text-success me-2"></i>Approve
              </a></li>
              <li><a class="dropdown-item" href="#" onclick="editEvidenceMetadata('${evidence.id}')">
                <i class="fas fa-edit text-info me-2"></i>Edit Details
              </a></li>
              <li><hr class="dropdown-divider"></li>
              <li><a class="dropdown-item text-danger" href="#" onclick="archiveEvidence('${evidence.id}')">
                <i class="fas fa-archive me-2"></i>Archive
              </a></li>
            </ul>
          </div>
        </div>
      </td>
    </tr>
  `).join('');
}

// Upload Modal
function openEvidenceUploadModal() {
  const modalTitle = document.getElementById('modalTitle');
  const modalBody = document.getElementById('modalBody');
  
  modalTitle.innerHTML = '<i class="fas fa-cloud-upload-alt me-2"></i>Upload Evidence';
  modalBody.innerHTML = `
    <form id="evidenceUploadForm" class="needs-validation" novalidate>
      <div class="row g-3">
        <div class="col-12">
          <label class="form-label">Select Files <span class="text-danger">*</span></label>
          <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
            <input type="file" id="fileInput" multiple accept="*/*" style="display: none;" onchange="handleFileSelection()">
            <div class="upload-content">
              <i class="fas fa-cloud-upload-alt fa-3x text-primary mb-3"></i>
              <h5>Drag & Drop Files Here</h5>
              <p class="text-muted">Or click to browse files</p>
              <div class="text-muted small">
                Supports all file types • Max 10MB per file
              </div>
            </div>
          </div>
          <div id="selectedFiles" class="mt-3"></div>
        </div>
        
        <div class="col-md-6">
          <label class="form-label">Evidence Type <span class="text-danger">*</span></label>
          <select class="form-select" id="evidenceType" required>
            <option value="">Select Type</option>
            <option value="Audit">Audit Evidence</option>
            <option value="Issue">Issue Evidence</option>
            <option value="Action">Action Evidence</option>
            <option value="WorkPaper">Work Paper</option>
            <option value="General">General Documentation</option>
          </select>
        </div>
        
        <div class="col-md-6">
          <label class="form-label">Related Item ID</label>
          <input type="text" class="form-control" id="parentId" 
                 placeholder="e.g., AUD001, ISS005, ACT012">
        </div>
        
        <div class="col-12">
          <label class="form-label">Description</label>
          <textarea class="form-control" id="evidenceDescription" rows="3" 
                    placeholder="Describe this evidence and its relevance..."></textarea>
        </div>
      </div>

      <div class="mt-4 pt-3 border-top d-flex justify-content-end gap-2">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" class="btn btn-primary">
          <i class="fas fa-upload me-1"></i>Upload Evidence
        </button>
      </div>
    </form>
    
    <style>
      .upload-zone {
        border: 2px dashed #dee2e6;
        border-radius: 12px;
        padding: 3rem 2rem;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s ease;
        background: #f8f9fa;
      }
      .upload-zone:hover, .upload-zone.dragover {
        border-color: var(--primary);
        background: rgba(26, 35, 126, 0.05);
        transform: scale(1.02);
      }
      .file-item {
        display: flex;
        align-items: center;
        padding: 0.75rem;
        border: 1px solid #dee2e6;
        border-radius: 8px;
        margin-bottom: 0.5rem;
        background: white;
      }
    </style>
  `;
  
  setupFileUpload();
  AppState.modalInstance.show();
}

// File upload setup
function setupFileUpload() {
  const uploadZone = document.getElementById('uploadZone');
  
  // Drag and drop
  uploadZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadZone.classList.add('dragover');
  });
  
  uploadZone.addEventListener('dragleave', () => {
    uploadZone.classList.remove('dragover');
  });
  
  uploadZone.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadZone.classList.remove('dragover');
    handleFiles(Array.from(e.dataTransfer.files));
  });
  
  document.getElementById('evidenceUploadForm').addEventListener('submit', uploadEvidence);
}

function handleFileSelection() {
  const files = Array.from(document.getElementById('fileInput').files);
  handleFiles(files);
}

function handleFiles(files) {
  const selectedFilesDiv = document.getElementById('selectedFiles');
  
  selectedFilesDiv.innerHTML = files.map((file, index) => `
    <div class="file-item" data-index="${index}">
      <i class="fas ${getFileIcon(file.name)} fa-2x text-primary"></i>
      <div class="file-info ms-3 flex-grow-1">
        <div class="fw-semibold">${file.name}</div>
        <div class="text-muted small">${formatFileSize(file.size)}</div>
      </div>
      <button type="button" class="btn btn-sm btn-outline-danger" onclick="removeFile(${index})">
        <i class="fas fa-times"></i>
      </button>
    </div>
  `).join('');
}

// Upload evidence
async function uploadEvidence(e) {
  e.preventDefault();
  
  const form = e.target;
  if (!form.checkValidity()) {
    e.stopPropagation();
    form.classList.add('was-validated');
    return;
  }

  const files = document.getElementById('fileInput').files;
  if (files.length === 0) {
    showToast('Please select at least one file', 'warning');
    return;
  }

  const uploadData = {
    evidenceType: document.getElementById('evidenceType').value,
    parentId: document.getElementById('parentId').value,
    description: document.getElementById('evidenceDescription').value
  };

  const submitBtn = form.querySelector('button[type="submit"]');
  const originalText = submitBtn.innerHTML;
  submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-1"></i>Uploading...';
  submitBtn.disabled = true;

  try {
    let successCount = 0;
    
    for (let i = 0; i < files.length; i++) {
      const file = files[i];
      
      if (file.size > 10 * 1024 * 1024) {
        showToast(`File ${file.name} is too large (max 10MB)`, 'warning');
        continue;
      }
      
      const fileData = await fileToBase64(file);
      
      const result = await callServer('uploadEvidence', {
        name: file.name,
        data: fileData,
        mimeType: file.type,
        size: file.size
      }, uploadData.evidenceType, uploadData.parentId);
      
      if (result.success) {
        successCount++;
      } else {
        showToast(`Failed to upload ${file.name}: ${result.error}`, 'danger');
      }
    }
    
    if (successCount > 0) {
      showToast(`Successfully uploaded ${successCount} file(s)`, 'success');
      AppState.modalInstance.hide();
      await loadEvidenceData();
    }
    
  } catch (error) {
    console.error('Upload error:', error);
    showToast('Upload failed: ' + error.message, 'danger');
  } finally {
    submitBtn.innerHTML = originalText;
    submitBtn.disabled = false;
  }
}

// Utility functions
function getFileIcon(filename) {
  const ext = filename.split('.').pop().toLowerCase();
  const iconMap = {
    pdf: 'fa-file-pdf',
    doc: 'fa-file-word', docx: 'fa-file-word',
    xls: 'fa-file-excel', xlsx: 'fa-file-excel',
    ppt: 'fa-file-powerpoint', pptx: 'fa-file-powerpoint',
    jpg: 'fa-file-image', jpeg: 'fa-file-image', png: 'fa-file-image',
    mp4: 'fa-file-video', avi: 'fa-file-video',
    zip: 'fa-file-archive', rar: 'fa-file-archive',
    txt: 'fa-file-alt'
  };
  return iconMap[ext] || 'fa-file';
}

function getFileType(filename) {
  const ext = filename.split('.').pop().toLowerCase();
  const typeMap = {
    pdf: 'PDF Document',
    doc: 'Word Document', docx: 'Word Document',
    xls: 'Excel File', xlsx: 'Excel File',
    jpg: 'Image', jpeg: 'Image', png: 'Image',
    txt: 'Text File'
  };
  return typeMap[ext] || 'File';
}

function formatFileSize(bytes) {
  if (!bytes) return '0 B';
  const k = 1024;
  const sizes = ['B', 'KB', 'MB', 'GB'];
  const i = Math.floor(Math.log(bytes) / Math.log(k));
  return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
}

function formatDate(dateString) {
  if (!dateString) return 'N/A';
  return new Date(dateString).toLocaleDateString();
}

function formatTime(dateString) {
  if (!dateString) return '';
  return new Date(dateString).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
}

function truncateText(text, length) {
  return text.length > length ? text.substring(0, length) + '...' : text;
}

function getDisplayName(email) {
  return email ? email.split('@')[0] : 'Unknown';
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = error => reject(error);
  });
}

// Filter and search functions
function filterEvidence() {
  const typeFilter = document.getElementById('evidenceTypeFilter').value;
  const dateFilter = document.getElementById('evidenceDateFilter').value;
  
  filteredEvidence = evidenceData.filter(evidence => {
    let matches = true;
    
    if (typeFilter && evidence.parent_type !== typeFilter) matches = false;
    
    if (dateFilter) {
      const uploadDate = new Date(evidence.uploaded_on);
      const now = new Date();
      
      switch(dateFilter) {
        case 'today':
          matches = matches && uploadDate.toDateString() === now.toDateString();
          break;
        case 'week':
          const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
          matches = matches && uploadDate >= weekAgo;
          break;
        case 'month':
          matches = matches && uploadDate.getMonth() === now.getMonth();
          break;
      }
    }
    
    return matches;
  });
  
  renderEvidenceTable();
  updateEvidenceStatistics();
}

function searchEvidence() {
  const searchTerm = document.getElementById('evidenceSearchInput').value.toLowerCase();
  
  if (!searchTerm) {
    filterEvidence();
    return;
  }
  
  filteredEvidence = evidenceData.filter(evidence => 
    evidence.file_name.toLowerCase().includes(searchTerm) ||
    evidence.uploader_email.toLowerCase().includes(searchTerm) ||
    (evidence.parent_id && evidence.parent_id.toLowerCase().includes(searchTerm))
  );
  
  renderEvidenceTable();
  updateEvidenceStatistics();
}

// Evidence actions
async function approveEvidence(evidenceId) {
  try {
    showToast('Approving evidence...', 'info');
    // Implementation would call server to update status
    showToast('Evidence approved successfully', 'success');
    await loadEvidenceData();
  } catch (error) {
    showToast('Approval failed: ' + error.message, 'danger');
  }
}

function refreshEvidence() {
  loadEvidenceData();
}

function exportEvidenceList() {
  showToast('Export functionality coming soon', 'info');
}

function showEvidenceStats() {
  showToast('Advanced analytics coming soon', 'info');
}

// Event listeners setup
function setupEventListeners() {
  // Any additional event listeners can be set up here
}

// Initialize when page loads
document.addEventListener('DOMContentLoaded', initializeEvidenceManagement);
</script>
