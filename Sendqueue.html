<!-- Send Queue Page - Batch send approved work papers to auditees -->
<div class="send-queue-page">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h5 class="mb-1"><i class="bi bi-send-check me-2"></i>Send Queue</h5>
      <p class="text-muted small mb-0">Approved work papers ready to send. Grouped by auditee to avoid email spam.</p>
    </div>
    <div class="btn-group">
      <button class="btn btn-outline-secondary btn-sm" onclick="loadSendQueue()">
        <i class="bi bi-arrow-repeat me-1"></i>Refresh
      </button>
      <button class="btn btn-primary btn-sm" id="btnSendAllQueue" onclick="sendAllQueue()" disabled>
        <i class="bi bi-send-fill me-1"></i>Send All to Auditees
      </button>
    </div>
  </div>

  <!-- Summary Cards -->
  <div class="row mb-4" id="sendQueueSummary">
    <div class="col-md-3">
      <div class="card border-0 bg-light">
        <div class="card-body py-3 text-center">
          <div class="h3 mb-0 text-primary" id="sqTotalWPs">0</div>
          <small class="text-muted">Work Papers</small>
        </div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card border-0 bg-light">
        <div class="card-body py-3 text-center">
          <div class="h3 mb-0 text-info" id="sqTotalAuditees">0</div>
          <small class="text-muted">Auditees</small>
        </div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card border-0 bg-light">
        <div class="card-body py-3 text-center">
          <div class="h3 mb-0 text-success" id="sqSelectedCount">0</div>
          <small class="text-muted">Selected</small>
        </div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card border-0 bg-light">
        <div class="card-body py-3 text-center">
          <button class="btn btn-sm btn-outline-primary" onclick="toggleSelectAllQueue()">
            <i class="bi bi-check2-all me-1"></i><span id="sqSelectAllLabel">Select All</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Grouped-by-auditee panels -->
  <div id="sendQueueContent">
    <div class="text-center py-5 text-muted">
      <div class="spinner-border spinner-border-sm me-2"></div>Loading send queue...
    </div>
  </div>
</div>

<script>
let sendQueueData = [];
let sendQueueSelected = {};

function loadSendQueue() {
  document.getElementById('sendQueueContent').innerHTML =
    '<div class="text-center py-5 text-muted"><div class="spinner-border spinner-border-sm me-2"></div>Loading send queue...</div>';

  apiCall('getSendQueue', {}).then(function(r) {
    if (r.success) {
      sendQueueData = r.groups || [];
      sendQueueSelected = {};

      // Select all by default
      sendQueueData.forEach(function(group) {
        group.workPapers.forEach(function(wp) {
          sendQueueSelected[wp.work_paper_id] = true;
        });
      });

      renderSendQueue();
    } else {
      document.getElementById('sendQueueContent').innerHTML =
        '<div class="alert alert-warning"><i class="bi bi-exclamation-triangle me-2"></i>' + escapeHtml(r.error || 'Failed to load send queue') + '</div>';
    }
  }).catch(function(err) {
    document.getElementById('sendQueueContent').innerHTML =
      '<div class="alert alert-danger"><i class="bi bi-x-circle me-2"></i>Error: ' + escapeHtml(err.message) + '</div>';
  });
}

function renderSendQueue() {
  var totalWPs = 0;
  sendQueueData.forEach(function(g) { totalWPs += g.workPapers.length; });

  document.getElementById('sqTotalWPs').textContent = totalWPs;
  document.getElementById('sqTotalAuditees').textContent = sendQueueData.length;
  updateSelectedCount();

  var sendBtn = document.getElementById('btnSendAllQueue');
  sendBtn.disabled = totalWPs === 0;

  if (sendQueueData.length === 0) {
    document.getElementById('sendQueueContent').innerHTML =
      '<div class="text-center py-5">' +
      '<i class="bi bi-inbox" style="font-size:48px; color:#ccc;"></i>' +
      '<p class="text-muted mt-3 mb-0">No approved work papers in the send queue.</p>' +
      '<p class="text-muted small">Approve work papers first, then they will appear here for batch sending.</p>' +
      '</div>';
    return;
  }

  var html = '';

  sendQueueData.forEach(function(group, gi) {
    var auditee = group.auditee;
    var wps = group.workPapers;
    var allChecked = wps.every(function(wp) { return sendQueueSelected[wp.work_paper_id]; });
    var someChecked = wps.some(function(wp) { return sendQueueSelected[wp.work_paper_id]; });

    html += '<div class="card mb-3 send-queue-group">';
    html += '<div class="card-header d-flex justify-content-between align-items-center bg-white">';
    html += '<div class="d-flex align-items-center">';
    html += '<input type="checkbox" class="form-check-input me-3" ' +
            (allChecked ? 'checked' : (someChecked ? 'indeterminate' : '')) +
            ' onchange="toggleGroupSelect(' + gi + ', this.checked)" title="Select/deselect all for this auditee">';
    html += '<div>';
    html += '<strong><i class="bi bi-person me-1"></i>' + escapeHtml(auditee.full_name || auditee.user_id) + '</strong>';
    html += '<br><small class="text-muted">' + escapeHtml(auditee.email || '') + '</small>';
    html += '</div>';
    html += '</div>';
    html += '<span class="badge bg-primary rounded-pill">' + wps.length + ' finding' + (wps.length > 1 ? 's' : '') + '</span>';
    html += '</div>';

    html += '<div class="card-body p-0">';
    html += '<table class="table table-hover table-sm mb-0">';
    html += '<thead><tr>';
    html += '<th style="width:40px;"></th>';
    html += '<th>Observation</th>';
    html += '<th>Affiliate</th>';
    html += '<th>Audit Area</th>';
    html += '<th>Risk</th>';
    html += '<th>Approved</th>';
    html += '</tr></thead>';
    html += '<tbody>';

    wps.forEach(function(wp) {
      var isChecked = sendQueueSelected[wp.work_paper_id] ? 'checked' : '';
      html += '<tr>';
      html += '<td><input type="checkbox" class="form-check-input sq-wp-check" data-wpid="' + wp.work_paper_id + '" ' + isChecked +
              ' onchange="toggleWPSelect(\'' + wp.work_paper_id + '\', this.checked)"></td>';
      html += '<td>';
      html += '<a href="#" onclick="navigateTo(\'work-paper-view\', {id:\'' + wp.work_paper_id + '\'}); return false;" class="text-decoration-none">';
      html += escapeHtml((wp.observation_title || wp.work_paper_id).substring(0, 60));
      html += '</a>';
      if (wp.observation_description) {
        html += '<br><small class="text-muted">' + escapeHtml(wp.observation_description.substring(0, 80)) + '...</small>';
      }
      html += '</td>';
      html += '<td><small>' + escapeHtml(wp.affiliate_name || wp.affiliate_code || '-') + '</small></td>';
      html += '<td><small>' + escapeHtml(wp.audit_area_name || wp.audit_area_id || '-') + '</small></td>';
      html += '<td><span class="badge ' + getRiskClass(wp.risk_rating) + '">' + escapeHtml(wp.risk_rating || '-') + '</span></td>';
      html += '<td><small>' + (wp.approved_date ? formatDate(wp.approved_date) : '-') + '</small></td>';
      html += '</tr>';
    });

    html += '</tbody></table>';
    html += '</div>';
    html += '</div>';
  });

  document.getElementById('sendQueueContent').innerHTML = html;
}

function toggleWPSelect(wpId, checked) {
  if (checked) {
    sendQueueSelected[wpId] = true;
  } else {
    delete sendQueueSelected[wpId];
  }
  updateSelectedCount();
}

function toggleGroupSelect(groupIndex, checked) {
  var group = sendQueueData[groupIndex];
  if (!group) return;
  group.workPapers.forEach(function(wp) {
    if (checked) {
      sendQueueSelected[wp.work_paper_id] = true;
    } else {
      delete sendQueueSelected[wp.work_paper_id];
    }
  });
  renderSendQueue();
}

function toggleSelectAllQueue() {
  var totalWPs = 0;
  sendQueueData.forEach(function(g) { totalWPs += g.workPapers.length; });
  var selectedCount = Object.keys(sendQueueSelected).length;

  if (selectedCount >= totalWPs) {
    // Deselect all
    sendQueueSelected = {};
  } else {
    // Select all
    sendQueueData.forEach(function(g) {
      g.workPapers.forEach(function(wp) {
        sendQueueSelected[wp.work_paper_id] = true;
      });
    });
  }
  renderSendQueue();
}

function updateSelectedCount() {
  var count = Object.keys(sendQueueSelected).length;
  document.getElementById('sqSelectedCount').textContent = count;

  var totalWPs = 0;
  sendQueueData.forEach(function(g) { totalWPs += g.workPapers.length; });
  var label = document.getElementById('sqSelectAllLabel');
  if (label) {
    label.textContent = (count >= totalWPs && totalWPs > 0) ? 'Deselect All' : 'Select All';
  }

  var sendBtn = document.getElementById('btnSendAllQueue');
  if (sendBtn) {
    sendBtn.disabled = count === 0;
    sendBtn.innerHTML = '<i class="bi bi-send-fill me-1"></i>Send ' + (count === totalWPs ? 'All' : count) + ' to Auditees';
  }
}

function sendAllQueue() {
  var selectedIds = Object.keys(sendQueueSelected);
  if (selectedIds.length === 0) {
    showToast('No work papers selected', 'warning');
    return;
  }

  // Build confirmation message with auditee summary
  var auditeeCount = 0;
  var auditeeNames = [];
  sendQueueData.forEach(function(group) {
    var hasSelected = group.workPapers.some(function(wp) { return sendQueueSelected[wp.work_paper_id]; });
    if (hasSelected) {
      auditeeCount++;
      auditeeNames.push(group.auditee.full_name || group.auditee.email);
    }
  });

  var msg = 'Send ' + selectedIds.length + ' work paper(s) to ' + auditeeCount + ' auditee(s)?\n\n' +
    'Recipients:\n' + auditeeNames.map(function(n) { return '  - ' + n; }).join('\n') +
    '\n\nEach auditee will receive ONE combined email with all their findings in a table.';

  if (!confirm(msg)) return;

  var btn = document.getElementById('btnSendAllQueue');
  safeAction(btn, async function() {
    showLoading('Sending to auditees...');
    var r = await apiCall('batchSendToAuditees', { workPaperIds: selectedIds });
    hideLoading();
    if (r.success) {
      showToast(r.message || (r.sent + ' work papers sent'), 'success');
      if (r.errors && r.errors.length > 0) {
        showToast('Some errors: ' + r.errors.join('; '), 'warning');
      }
      loadSendQueue();
      if (typeof refreshSidebarCounts === 'function') refreshSidebarCounts();
    } else {
      showToast(r.error || 'Error sending', 'danger');
    }
  });
}
</script>
