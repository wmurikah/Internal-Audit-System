<div class="risk-register-container">
  <h2>Risk Register</h2>
  
  <div style="margin-bottom: 20px;">
    <button class="btn btn-primary" onclick="createNewRisk()">+ Register New Risk</button>
    <button class="btn btn-primary" onclick="loadRiskHeatMap()">View Heat Map</button>
  </div>
  
  <div id="riskHeatMap" style="display: none; margin-bottom: 20px;">
    <h3>Risk Heat Map</h3>
    <canvas id="heatMapCanvas" width="600" height="400"></canvas>
  </div>
  
  <table id="riskRegisterTable">
    <thead>
      <tr>
        <th>ID</th>
        <th>Unit</th>
        <th>Process</th>
        <th>Risk Statement</th>
        <th>Inherent Rating</th>
        <th>Owner</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr><td colspan="8" class="loading">Loading galactic risks...</td></tr>
    </tbody>
  </table>
</div>

<script>
  // Load risk register when page is shown
  (function() {
    loadRiskRegister();
  })();
  
  function loadRiskRegister() {
    google.script.run
      .withSuccessHandler(displayRisks)
      .withFailureHandler(handleRiskError)
      .listRisks();
  }
  
  function displayRisks(risks) {
    const tbody = document.querySelector('#riskRegisterTable tbody');
    if (risks.length === 0) {
      tbody.innerHTML = '<tr><td colspan="8">No risks registered yet</td></tr>';
      return;
    }
    
    tbody.innerHTML = risks.map(risk => `
      <tr>
        <td>${risk.id}</td>
        <td>${risk.unit}</td>
        <td>${risk.process}</td>
        <td>${risk.risk_statement}</td>
        <td><span class="risk-badge risk-${risk.inherent_rating.toLowerCase()}">${risk.inherent_rating}</span></td>
        <td>${risk.owner_email}</td>
        <td>${risk.status}</td>
        <td>
          <button onclick="editRisk('${risk.id}')">Edit</button>
          <button onclick="mitigateRisk('${risk.id}')">Mitigate</button>
        </td>
      </tr>
    `).join('');
  }
  
  function createNewRisk() {
    const risk = {
      unit: prompt('Business Unit:'),
      process: prompt('Process:'),
      risk_statement: prompt('Risk Statement:'),
      inherent_rating: prompt('Rating (Extreme/High/Medium/Low):'),
      owner_email: prompt('Owner Email:')
    };
    
    if (risk.unit && risk.process && risk.risk_statement) {
      google.script.run
        .withSuccessHandler(() => {
          alert('Risk registered successfully!');
          loadRiskRegister();
        })
        .withFailureHandler(handleRiskError)
        .createRisk(risk);
    }
  }
  
  function mitigateRisk(id) {
    const plan = prompt('Enter mitigation plan:');
    if (plan) {
      google.script.run
        .withSuccessHandler(() => {
          alert('Risk mitigated!');
          loadRiskRegister();
        })
        .withFailureHandler(handleRiskError)
        .mitigateRisk(id, plan);
    }
  }
  
  function loadRiskHeatMap() {
    google.script.run
      .withSuccessHandler(displayHeatMap)
      .withFailureHandler(handleRiskError)
      .getRiskHeatMap();
  }
  
  function displayHeatMap(heatMapData) {
    document.getElementById('riskHeatMap').style.display = 'block';
    
    // Create visual heat map
    const canvas = document.getElementById('heatMapCanvas');
    const ctx = canvas.getContext('2d');
    
    // Clear canvas
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Draw heat map grid
    const units = Object.keys(heatMapData);
    const risks = ['Extreme', 'High', 'Medium', 'Low'];
    const cellWidth = canvas.width / (risks.length + 1);
    const cellHeight = canvas.height / (units.length + 1);
    
    // Colors for risk levels
    const colors = {
      'Extreme': '#d32f2f',
      'High': '#f57c00', 
      'Medium': '#fbc02d',
      'Low': '#689f38'
    };
    
    // Draw headers
    ctx.fillStyle = '#333';
    ctx.font = '12px Arial';
    risks.forEach((risk, i) => {
      ctx.fillText(risk, (i + 1) * cellWidth + 10, 20);
    });
    
    units.forEach((unit, i) => {
      ctx.fillText(unit, 10, (i + 1) * cellHeight + cellHeight/2);
    });
    
    // Draw data cells
    units.forEach((unit, row) => {
      risks.forEach((risk, col) => {
        const value = heatMapData[unit][risk] || 0;
        
        // Draw cell
        ctx.fillStyle = value > 0 ? colors[risk] : '#f0f0f0';
        ctx.globalAlpha = Math.min(1, 0.3 + (value * 0.2));
        ctx.fillRect(
          (col + 1) * cellWidth,
          (row + 1) * cellHeight,
          cellWidth - 2,
          cellHeight - 2
        );
        
        // Draw value
        ctx.globalAlpha = 1;
        ctx.fillStyle = value > 0 ? 'white' : '#999';
        ctx.font = 'bold 16px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(
          value.toString(),
          (col + 1) * cellWidth + cellWidth/2,
          (row + 1) * cellHeight + cellHeight/2 + 5
        );
      });
    });
  }
  
  function editRisk(id) {
    alert('Edit risk ' + id);
  }
  
  function handleRiskError(error) {
    console.error('Risk Register Error:', error);
    alert('Error: ' + error.message);
  }
</script>
