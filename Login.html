<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Hass Petroleum Audit System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --primary-color: #1a365d;
      --accent-color: #c9a227;
      --bg-gradient: linear-gradient(135deg, #1a365d 0%, #2d4a7c 100%);
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-gradient);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    
    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }
    
    .login-card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }
    
    .login-header {
      background: var(--primary-color);
      padding: 30px;
      text-align: center;
      position: relative;
    }
    
    .login-header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--accent-color);
    }
    
    .login-logo {
      width: 80px;
      height: 80px;
      background: #ffffff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 15px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }
    
    .login-logo i {
      font-size: 40px;
      color: var(--primary-color);
    }
    
    .login-header h1 {
      color: #ffffff;
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 5px;
    }
    
    .login-header p {
      color: rgba(255, 255, 255, 0.8);
      font-size: 0.9rem;
    }
    
    .login-body {
      padding: 30px;
    }
    
    .form-floating {
      margin-bottom: 20px;
    }
    
    .form-floating > .form-control {
      border: 2px solid #e9ecef;
      border-radius: 10px;
      height: 58px;
      padding: 1rem 1rem 0.5rem 2.8rem;
      font-size: 1rem;
      transition: all 0.3s ease;
    }
    
    .form-floating > .form-control:focus {
      border-color: var(--primary-color);
      box-shadow: 0 0 0 4px rgba(26, 54, 93, 0.1);
    }
    
    .form-floating > label {
      padding-left: 2.8rem;
      color: #6c757d;
    }
    
    .form-floating .input-icon {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #6c757d;
      font-size: 1.2rem;
      z-index: 5;
      transition: color 0.3s ease;
    }
    
    .form-floating:focus-within .input-icon {
      color: var(--primary-color);
    }
    
    .password-toggle {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #6c757d;
      cursor: pointer;
      z-index: 5;
      padding: 5px;
    }
    
    .password-toggle:hover {
      color: var(--primary-color);
    }
    
    .btn-login {
      width: 100%;
      padding: 14px;
      font-size: 1.1rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      background: var(--primary-color);
      color: #ffffff;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    
    .btn-login:hover:not(:disabled) {
      background: #2d4a7c;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(26, 54, 93, 0.3);
    }
    
    .btn-login:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
    
    .btn-login .spinner-border {
      width: 20px;
      height: 20px;
      border-width: 2px;
    }
    
    .alert {
      border-radius: 10px;
      padding: 12px 15px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.9rem;
    }
    
    .alert-danger {
      background: #fff5f5;
      border: 1px solid #feb2b2;
      color: #c53030;
    }
    
    .alert-success {
      background: #f0fff4;
      border: 1px solid #9ae6b4;
      color: #276749;
    }
    
    .login-footer {
      text-align: center;
      padding: 20px 30px 30px;
      background: #f8f9fa;
      border-top: 1px solid #e9ecef;
    }
    
    .login-footer p {
      color: #6c757d;
      font-size: 0.85rem;
      margin: 0;
    }
    
    .login-footer a {
      color: var(--primary-color);
      text-decoration: none;
      font-weight: 500;
    }
    
    .login-footer a:hover {
      text-decoration: underline;
    }
    
    /* Loading overlay */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255, 255, 255, 0.9);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    
    .loading-overlay.show {
      display: flex;
    }
    
    .loading-spinner {
      text-align: center;
    }
    
    .loading-spinner .spinner-border {
      width: 50px;
      height: 50px;
      color: var(--primary-color);
    }
    
    .loading-spinner p {
      margin-top: 15px;
      color: var(--primary-color);
      font-weight: 500;
    }
    
    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .login-card {
      animation: fadeIn 0.5s ease;
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }
    
    .shake {
      animation: shake 0.4s ease;
    }
  </style>
</head>
<body>
  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner">
      <div class="spinner-border" role="status"></div>
      <p>Signing in...</p>
    </div>
  </div>

  <div class="login-container">
    <div class="login-card" id="loginCard">
      <div class="login-header">
        <div class="login-logo">
          <i class="bi bi-shield-check"></i>
        </div>
        <h1>Hass Petroleum</h1>
        <p>Internal Audit Management System</p>
      </div>
      
      <div class="login-body">
        <!-- Alert -->
        <div class="alert alert-danger" id="errorAlert" style="display: none;">
          <i class="bi bi-exclamation-circle-fill"></i>
          <span id="errorMessage"></span>
        </div>
        
        <div class="alert alert-success" id="successAlert" style="display: none;">
          <i class="bi bi-check-circle-fill"></i>
          <span id="successMessage"></span>
        </div>
        
        <!-- Login Form -->
        <form id="loginForm" onsubmit="handleLogin(event)">
          <div class="form-floating position-relative">
            <i class="bi bi-envelope input-icon"></i>
            <input type="email" class="form-control" id="email" placeholder="Email" required autocomplete="email">
            <label for="email">Email Address</label>
          </div>
          
          <div class="form-floating position-relative">
            <i class="bi bi-lock input-icon"></i>
            <input type="password" class="form-control" id="password" placeholder="Password" required autocomplete="current-password">
            <label for="password">Password</label>
            <button type="button" class="password-toggle" onclick="togglePassword()">
              <i class="bi bi-eye" id="passwordToggleIcon"></i>
            </button>
          </div>
          
          <button type="submit" class="btn-login" id="loginBtn">
            <span id="loginBtnText">Sign In</span>
            <span id="loginBtnSpinner" style="display: none;">
              <span class="spinner-border spinner-border-sm" role="status"></span>
              Signing in...
            </span>
          </button>
        </form>
      </div>
      
      <div class="login-footer">
        <p>Having trouble? Contact <a href="mailto:audit@hasspetroleum.com">audit@hasspetroleum.com</a></p>
      </div>
    </div>
  </div>

  <script>
    // Toggle password visibility
    function togglePassword() {
      const passwordInput = document.getElementById('password');
      const toggleIcon = document.getElementById('passwordToggleIcon');
      
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleIcon.classList.remove('bi-eye');
        toggleIcon.classList.add('bi-eye-slash');
      } else {
        passwordInput.type = 'password';
        toggleIcon.classList.remove('bi-eye-slash');
        toggleIcon.classList.add('bi-eye');
      }
    }
    
    // Show error
    function showError(message) {
      const errorAlert = document.getElementById('errorAlert');
      const errorMessage = document.getElementById('errorMessage');
      const loginCard = document.getElementById('loginCard');
      
      errorMessage.textContent = message;
      errorAlert.style.display = 'flex';
      
      // Hide success if showing
      document.getElementById('successAlert').style.display = 'none';
      
      // Shake animation
      loginCard.classList.add('shake');
      setTimeout(() => loginCard.classList.remove('shake'), 400);
    }
    
    // Show success
    function showSuccess(message) {
      const successAlert = document.getElementById('successAlert');
      const successMessage = document.getElementById('successMessage');
      
      successMessage.textContent = message;
      successAlert.style.display = 'flex';
      
      // Hide error if showing
      document.getElementById('errorAlert').style.display = 'none';
    }
    
    // Hide alerts
    function hideAlerts() {
      document.getElementById('errorAlert').style.display = 'none';
      document.getElementById('successAlert').style.display = 'none';
    }
    
    // Set loading state
    function setLoading(loading) {
      const loginBtn = document.getElementById('loginBtn');
      const loginBtnText = document.getElementById('loginBtnText');
      const loginBtnSpinner = document.getElementById('loginBtnSpinner');
      const loadingOverlay = document.getElementById('loadingOverlay');
      
      loginBtn.disabled = loading;
      loginBtnText.style.display = loading ? 'none' : 'inline';
      loginBtnSpinner.style.display = loading ? 'inline' : 'none';
      
      if (loading) {
        loadingOverlay.classList.add('show');
      } else {
        loadingOverlay.classList.remove('show');
      }
    }
    
    // Handle login
    function handleLogin(event) {
      event.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      
      if (!email || !password) {
        showError('Please enter both email and password.');
        return;
      }
      
      hideAlerts();
      setLoading(true);

      // Call server-side login
      google.script.run
        .withSuccessHandler(function(result) {
          setLoading(false);

          if (result.success) {
            showSuccess('Login successful! Redirecting...');

            // Store session info
            if (result.sessionToken) {
              sessionStorage.setItem('sessionToken', result.sessionToken);
            }
            if (result.user) {
              sessionStorage.setItem('user', JSON.stringify(result.user));
            }

            // Redirect to main app - use multiple methods for compatibility
            setTimeout(() => {
              const appUrl = '<?= ScriptApp.getService().getUrl() ?>?page=app';

              // Try different redirect methods for Google Apps Script iframe
              try {
                // Method 1: Top-level redirect
                if (window.top && window.top.location) {
                  window.top.location.replace(appUrl);
                } else {
                  // Method 2: Current window
                  window.location.replace(appUrl);
                }
              } catch (e) {
                // Method 3: Fallback for cross-origin restrictions
                window.location.href = appUrl;
              }
            }, 500);
          } else {
            showError(result.error || 'Login failed. Please try again.');
          }
        })
        .withFailureHandler(function(error) {
          setLoading(false);
          showError('Connection error. Please try again.');
          console.error('Login error:', error);
        })
        .apiCall('login', { email: email, password: password });
    }
    
    // Initialize - Login is ALWAYS the mandatory entry point
    // No auto-redirect for existing sessions - users must authenticate fresh
    document.addEventListener('DOMContentLoaded', function() {
      // Focus on email field for immediate typing
      document.getElementById('email').focus();
    });
  </script>
</body>
</html>
