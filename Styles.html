<style>
  :root {
    /* Colors */
    --primary-color: #1a365d;
    --primary-light: #2d4a7c;
    --primary-dark: #0f2744;
    --accent-color: #c9a227;
    --accent-light: #dbb84a;
    --success-color: #10b981;
    --warning-color: #f59e0b;
    --danger-color: #ef4444;
    --info-color: #3b82f6;
    
    /* Layout */
    --sidebar-width: 280px;
    --sidebar-collapsed-width: 70px;
    --topbar-height: 60px;
    --border-radius: 12px;
    --border-radius-sm: 8px;
    --box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
    --box-shadow-hover: 0 8px 30px rgba(0, 0, 0, 0.12);
    --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    --sidebar-transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    
    /* Text Colors */
    --text-color: #1f2937;
    --text-muted: #6b7280;
    --border-color: #e5e7eb;
    --bg-light: #f9fafb;
    
    /* ============================================
       TYPOGRAPHY - Centralized Font Sizes
       ============================================ */
    --font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
    
    /* Page Titles */
    --font-size-page-title: 1.25rem;
    --font-size-page-title-mobile: 1.1rem;
    
    /* Section Titles */
    --font-size-section-title: 1.1rem;
    
    /* Headings */
    --font-size-h1: 1.5rem;
    --font-size-h2: 1.25rem;
    --font-size-h3: 1.1rem;
    --font-size-h4: 1rem;
    --font-size-h5: 0.9rem;
    --font-size-h6: 0.85rem;
    
    /* Body Text */
    --font-size-base: 0.875rem;
    --font-size-lg: 0.95rem;
    --font-size-sm: 0.8rem;
    --font-size-xs: 0.75rem;
    --font-size-xxs: 0.7rem;
    
    /* KPI & Stats */
    --font-size-kpi: 1.75rem;
    --font-size-kpi-mobile: 1.5rem;
    --font-size-stat: 1.75rem;
    --font-size-stat-mobile: 1.5rem;
    
    /* Labels */
    --font-size-label: 0.75rem;
    --font-size-label-lg: 0.8rem;
    
    /* Tables */
    --font-size-table: 0.85rem;
    --font-size-table-header: 0.8rem;
    --font-size-table-sm: 0.8rem;
    
    /* Cards */
    --font-size-card-header: 0.9rem;
    --font-size-card-body: 0.875rem;
    
    /* Buttons */
    --font-size-btn: 0.875rem;
    --font-size-btn-sm: 0.8rem;
    --font-size-btn-lg: 1rem;
    
    /* Inputs */
    --font-size-input: 0.875rem;
    --font-size-input-sm: 0.8rem;
    
    /* Badges */
    --font-size-badge: 0.7rem;
    --font-size-badge-lg: 0.75rem;
    
    /* Navigation */
    --font-size-nav: 0.9rem;
    --font-size-nav-sm: 0.85rem;
    --font-size-nav-section: 0.7rem;
    --font-size-breadcrumb: 0.85rem;
    
    /* Icons */
    --font-size-icon-sm: 0.9rem;
    --font-size-icon: 1rem;
    --font-size-icon-lg: 1.1rem;
    --font-size-icon-xl: 1.25rem;
    --font-size-icon-xxl: 1.5rem;
    --font-size-icon-huge: 2rem;
    
    /* Code */
    --font-size-code: 0.8rem;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: var(--font-family);
    font-size: var(--font-size-base);
    background-color: var(--bg-light);
    color: var(--text-color);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* Performance optimizations */
  /* NOTE: .main-content excluded because transform: translateZ(0) creates a new
     stacking context that breaks position:fixed on Bootstrap modals inside it,
     causing the modal backdrop to render ON TOP of the modal dialog. */
  .sidebar, .card, .stat-card {
    will-change: transform;
    transform: translateZ(0);
  }

  /* Loading Overlay */
  .loading-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(4px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    opacity: 0;
    transition: opacity 0.15s ease-out;
  }

  .loading-overlay.show {
    display: flex;
    opacity: 1;
  }

  .loading-content {
    text-align: center;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.02); opacity: 0.8; }
  }

  .loading-content .spinner-border {
    width: 40px;
    height: 40px;
    border-width: 3px;
  }

  .loading-content p {
    margin-top: 12px;
    color: var(--primary-color);
    font-weight: 500;
    font-size: var(--font-size-base);
  }

  /* App Container */
  .app-container {
    display: flex;
    min-height: 100vh;
  }

  /* Sidebar */
  .sidebar {
    width: var(--sidebar-width);
    background: linear-gradient(180deg, var(--primary-color) 0%, var(--primary-dark) 100%);
    color: #fff;
    position: fixed;
    top: 0;
    left: 0;
    bottom: 0;
    display: flex;
    flex-direction: column;
    z-index: 1000;
    transition: transform 0.3s ease;
    box-shadow: 4px 0 20px rgba(0, 0, 0, 0.15);
  }

  /* Main content */
  .main-content {
    flex: 1;
    margin-left: var(--sidebar-width);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .sidebar-header {
    padding: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
  }

  .sidebar-logo {
    width: 45px;
    height: 45px;
    background: #fff;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .sidebar-logo i {
    font-size: 24px;
    color: var(--primary-color);
  }

  .sidebar-brand h5 {
    margin: 0;
    font-size: var(--font-size-h4);
    font-weight: 600;
  }

  .sidebar-brand small {
    opacity: 0.7;
    font-size: var(--font-size-xs);
  }

  .sidebar-toggle {
    display: none;
    background: none;
    border: none;
    color: #fff;
    font-size: var(--font-size-icon-xxl);
    cursor: pointer;
    margin-left: auto;
  }

  .sidebar-user {
    padding: 15px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(255, 255, 255, 0.05);
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
  }

  .user-avatar {
    width: 40px;
    height: 40px;
    background: var(--accent-color);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: var(--font-size-icon-xl);
  }

  .user-info {
    flex: 1;
    min-width: 0;
  }

  .user-name {
    font-weight: 600;
    font-size: var(--font-size-base);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .user-role {
    font-size: var(--font-size-xs);
    opacity: 0.7;
  }

  /* Quick Stats in Sidebar */
  .nav-quick-stats {
    padding: 10px 20px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
  }

  .quick-stats-container {
    display: flex;
    gap: 10px;
    justify-content: center;
  }

  .quick-stat {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 12px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    cursor: pointer;
    transition: var(--transition);
    font-size: var(--font-size-sm);
  }

  .quick-stat:hover {
    background: rgba(255, 255, 255, 0.2);
  }

  .quick-stat.danger {
    background: rgba(239, 68, 68, 0.2);
  }

  .quick-stat.danger:hover {
    background: rgba(239, 68, 68, 0.3);
  }

  .quick-stat i {
    font-size: var(--font-size-icon);
  }

  .quick-stat span {
    font-weight: 600;
  }

  /* Sidebar Navigation */
  .sidebar-nav {
    flex: 1;
    padding: 15px 0;
    overflow-y: auto;
    list-style: none;
  }

  .sidebar-nav .nav-section {
    padding: 15px 20px 8px;
    font-size: var(--font-size-nav-section);
    text-transform: uppercase;
    letter-spacing: 1px;
    opacity: 0.5;
    margin-top: 5px;
  }

  .sidebar-nav .nav-link {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    color: rgba(255, 255, 255, 0.8);
    text-decoration: none;
    transition: var(--transition);
    position: relative;
    font-size: var(--font-size-nav);
  }

  .sidebar-nav .nav-link:hover {
    background: rgba(255, 255, 255, 0.1);
    color: #fff;
  }

  .sidebar-nav .nav-link.active {
    background: rgba(255, 255, 255, 0.15);
    color: #fff;
  }

  .sidebar-nav .nav-link.active::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 4px;
    background: var(--accent-color);
  }

  .sidebar-nav .nav-link i {
    font-size: var(--font-size-icon-lg);
    width: 22px;
    text-align: center;
  }

  .sidebar-nav .nav-link .badge {
    margin-left: auto;
    font-size: var(--font-size-badge);
  }

  /* Submenu Styles */
  .nav-has-submenu {
    position: relative;
  }

  .nav-submenu-toggle {
    cursor: pointer;
  }

  .submenu-icon {
    margin-left: auto;
    font-size: var(--font-size-sm);
    transition: transform 0.3s ease;
  }

  .submenu-icon.rotate {
    transform: rotate(180deg);
  }

  .nav-submenu {
    list-style: none;
    padding: 0;
    margin: 0;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
    background: rgba(0, 0, 0, 0.15);
  }

  .nav-submenu.show {
    max-height: 300px;
  }

  .nav-submenu li {
    padding: 0;
  }

  .nav-submenu .nav-link {
    padding: 10px 20px 10px 52px;
    font-size: var(--font-size-nav-sm);
  }

  .nav-submenu .nav-link i {
    font-size: var(--font-size-icon-sm);
  }

  /* Sidebar Footer */
  .sidebar-footer {
    padding: 15px 20px;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
  }

  .sidebar-footer-info {
    text-align: center;
    margin-bottom: 10px;
  }

  .sidebar-footer-info small {
    opacity: 0.6;
    font-size: var(--font-size-xs);
  }

  /* Main Content */
  /* Top Bar */
  .top-bar {
    height: var(--topbar-height);
    background: #fff;
    border-bottom: 1px solid #e9ecef;
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 15px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .menu-toggle {
    display: none;
    background: none;
    border: none;
    font-size: var(--font-size-icon-xxl);
    color: var(--primary-color);
    cursor: pointer;
  }

  /* Breadcrumb */
  .breadcrumb-nav {
    display: none;
  }

  @media (min-width: 768px) {
    .breadcrumb-nav {
      display: block;
    }
  }

  .breadcrumb {
    font-size: var(--font-size-breadcrumb);
  }

  .breadcrumb-item a {
    color: var(--primary-color);
    text-decoration: none;
  }

  .breadcrumb-item.active {
    color: var(--text-muted);
  }

  .top-bar-title {
    flex: 1;
  }

  .top-bar-title h4 {
    margin: 0;
    font-size: var(--font-size-page-title);
    color: var(--primary-color);
  }

  .top-bar-actions {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* Global Search */
  .global-search .input-group {
    width: 250px;
  }

  .global-search .input-group-text {
    background: #f8f9fa;
    border-right: none;
  }

  .global-search .form-control {
    border-left: none;
    padding-left: 0;
    font-size: var(--font-size-input);
  }

  .global-search .form-control:focus {
    box-shadow: none;
    border-color: #ced4da;
  }

  /* Notification Badge */
  .notification-badge {
    position: absolute;
    top: 2px;
    right: 2px;
    background: var(--danger-color);
    color: #fff;
    font-size: var(--font-size-xxs);
    padding: 2px 5px;
    border-radius: 10px;
    min-width: 18px;
    text-align: center;
  }

  .notifications-dropdown {
    width: 320px;
    max-height: 400px;
    overflow-y: auto;
  }

  .notifications-dropdown .dropdown-header {
    font-weight: 600;
    border-bottom: 1px solid #e9ecef;
    padding: 12px 16px;
    font-size: var(--font-size-base);
  }

  .notifications-list {
    max-height: 300px;
    overflow-y: auto;
  }

  .btn-icon {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f8f9fa;
    border: none;
    color: #6c757d;
    transition: var(--transition);
  }

  .btn-icon:hover {
    background: #e9ecef;
    color: var(--primary-color);
  }

  /* Page Content */
  .page-content {
    flex: 1;
    padding: 20px;
  }

  .page {
    animation: fadeIn 0.15s ease-out;
  }

  /* NOTE: Using opacity-only animation (no transform) to avoid creating a
     stacking context that traps Bootstrap modals inside .page elements. */
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* Tab Navigation for Forms */
  .nav-tabs-custom {
    border-bottom: 2px solid #e9ecef;
    margin-bottom: 20px;
  }

  .nav-tabs-custom .nav-link {
    border: none;
    border-bottom: 3px solid transparent;
    color: var(--text-muted);
    font-weight: 500;
    padding: 12px 20px;
    margin-bottom: -2px;
    transition: var(--transition);
    font-size: var(--font-size-base);
  }

  .nav-tabs-custom .nav-link:hover {
    color: var(--primary-color);
    border-bottom-color: var(--primary-light);
  }

  .nav-tabs-custom .nav-link.active {
    color: var(--primary-color);
    border-bottom-color: var(--primary-color);
    background: transparent;
  }

  .nav-tabs-custom .nav-link i {
    margin-right: 8px;
  }

  .tab-content-custom {
    background: #fff;
    border-radius: var(--border-radius);
    box-shadow: var(--box-shadow);
    padding: 25px;
  }

  /* Cards */
  .card {
    border: none;
    border-radius: var(--border-radius);
    box-shadow: var(--box-shadow);
    margin-bottom: 20px;
  }

  .card-header {
    background: #fff;
    border-bottom: 1px solid #e9ecef;
    padding: 15px 20px;
    font-weight: 600;
    font-size: var(--font-size-card-header);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .card-body {
    padding: 20px;
    font-size: var(--font-size-card-body);
  }

  /* ============================================
     CHART CONTAINER FIX - Prevent vertical stretching
     ============================================ */
  .chart-container {
    position: relative;
    height: 250px;
    width: 100%;
  }

  .chart-container-sm {
    position: relative;
    height: 200px;
    width: 100%;
  }

  .card-body canvas {
    max-height: 100%;
    width: 100% !important;
    height: 100% !important;
  }

  /* Remove h-100 stretching behavior for chart cards */
  .card.chart-card {
    height: auto !important;
  }

  .card.chart-card .card-body {
    height: 280px;
    padding: 15px;
  }

  .card.chart-card-sm .card-body {
    height: 230px;
    padding: 15px;
  }

  /* Stat Cards */
  .stat-card {
    background: #fff;
    border-radius: var(--border-radius);
    padding: 20px;
    box-shadow: var(--box-shadow);
    display: flex;
    align-items: center;
    gap: 15px;
    transition: transform 0.15s ease-out, box-shadow 0.15s ease-out;
    cursor: default;
  }

  .stat-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--box-shadow-hover);
  }

  .stat-card.clickable {
    cursor: pointer;
  }

  .stat-icon {
    width: 60px;
    height: 60px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: var(--font-size-stat);
  }

  .stat-icon.primary { background: rgba(26, 54, 93, 0.1); color: var(--primary-color); }
  .stat-icon.success { background: rgba(16, 185, 129, 0.1); color: var(--success-color); }
  .stat-icon.warning { background: rgba(245, 158, 11, 0.1); color: var(--warning-color); }
  .stat-icon.danger { background: rgba(239, 68, 68, 0.1); color: var(--danger-color); }
  .stat-icon.info { background: rgba(59, 130, 246, 0.1); color: var(--info-color); }

  .stat-content h3 {
    font-size: var(--font-size-stat);
    font-weight: 700;
    margin: 0;
    color: var(--primary-color);
  }

  .stat-content p {
    margin: 0;
    color: #6c757d;
    font-size: var(--font-size-base);
  }

  /* Role-Based Dashboard Sections */
  .dashboard-section {
    margin-bottom: 30px;
  }

  .dashboard-section-title {
    font-size: var(--font-size-section-title);
    font-weight: 600;
    color: var(--primary-color);
    margin-bottom: 15px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .dashboard-section-title i {
    color: var(--accent-color);
  }

  /* Document Upload Zone */
  .upload-zone {
    border: 2px dashed #d1d5db;
    border-radius: var(--border-radius);
    padding: 40px 20px;
    text-align: center;
    background: #fafafa;
    transition: var(--transition);
    cursor: pointer;
  }

  .upload-zone:hover,
  .upload-zone.dragover {
    border-color: var(--primary-color);
    background: rgba(26, 54, 93, 0.05);
  }

  .upload-zone i {
    font-size: 3rem;
    color: #9ca3af;
    margin-bottom: 15px;
  }

  .upload-zone p {
    color: var(--text-muted);
    margin-bottom: 10px;
    font-size: var(--font-size-base);
  }

  .upload-zone .btn {
    margin-top: 10px;
  }

  /* Uploaded Files List */
  .files-list {
    margin-top: 20px;
  }

  .file-item {
    display: flex;
    align-items: center;
    padding: 12px 15px;
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: var(--border-radius-sm);
    margin-bottom: 10px;
    transition: var(--transition);
  }

  .file-item:hover {
    border-color: var(--primary-color);
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
  }

  .file-item .file-icon {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    background: #f3f4f6;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 12px;
  }

  .file-item .file-icon i {
    font-size: var(--font-size-icon-xl);
    color: var(--primary-color);
  }

  .file-item .file-info {
    flex: 1;
  }

  .file-item .file-name {
    font-weight: 500;
    color: var(--text-color);
    margin-bottom: 2px;
    font-size: var(--font-size-base);
  }

  .file-item .file-meta {
    font-size: var(--font-size-sm);
    color: var(--text-muted);
  }

  .file-item .file-actions {
    display: flex;
    gap: 8px;
  }

  .file-item .file-actions .btn {
    padding: 4px 8px;
    font-size: var(--font-size-btn-sm);
  }

  /* Document Category Badge */
  .file-category {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: var(--font-size-badge);
    font-weight: 500;
    text-transform: uppercase;
    margin-left: 8px;
  }

  .file-category.evidence { background: #dbeafe; color: #1e40af; }
  .file-category.supporting { background: #fef3c7; color: #92400e; }
  .file-category.policy { background: #d1fae5; color: #065f46; }
  .file-category.correspondence { background: #f3e8ff; color: #6b21a8; }
  .file-category.other { background: #f3f4f6; color: #374151; }

  /* Tables */
  .table-container {
    background: #fff;
    border-radius: var(--border-radius);
    box-shadow: var(--box-shadow);
    overflow: hidden;
  }

  .table {
    margin-bottom: 0;
    font-size: var(--font-size-table);
  }

  .table thead th {
    background: #f8f9fa;
    border-bottom: 2px solid #e9ecef;
    font-weight: 600;
    font-size: var(--font-size-table-header);
    color: var(--primary-color);
    white-space: nowrap;
    padding: 12px 15px;
  }

  .table tbody td {
    padding: 12px 15px;
    vertical-align: middle;
  }

  .table tbody tr:hover {
    background: #f8f9fa;
  }

  .table-clickable tbody tr {
    cursor: pointer;
  }

  .table-sm {
    font-size: var(--font-size-table-sm);
  }

  .table-sm thead th {
    padding: 10px 12px;
    font-size: var(--font-size-table-header);
  }

  .table-sm tbody td {
    padding: 10px 12px;
  }

  /* Badges */
  .badge {
    font-weight: 500;
