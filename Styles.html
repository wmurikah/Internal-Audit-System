<style>
  :root {
    --primary-color: #1a365d;
    --primary-light: #2d4a7c;
    --primary-dark: #0f2744;
    --accent-color: #c9a227;
    --accent-light: #dbb84a;
    --success-color: #10b981;
    --warning-color: #f59e0b;
    --danger-color: #ef4444;
    --info-color: #3b82f6;
    --sidebar-width: 280px;
    --topbar-height: 60px;
    --border-radius: 12px;
    --border-radius-sm: 8px;
    --box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
    --box-shadow-hover: 0 8px 30px rgba(0, 0, 0, 0.12);
    --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    --text-color: #1f2937;
    --text-muted: #6b7280;
    --border-color: #e5e7eb;
    --bg-light: #f9fafb;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
    background-color: var(--bg-light);
    color: var(--text-color);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* Performance optimizations */
  .sidebar, .main-content, .card, .stat-card {
    will-change: transform;
    transform: translateZ(0);
  }

  /* Loading Overlay */
  .loading-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(4px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    opacity: 0;
    transition: opacity 0.15s ease-out;
  }

  .loading-overlay.show {
    display: flex;
    opacity: 1;
  }

  .loading-content {
    text-align: center;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.02); opacity: 0.8; }
  }

  .loading-content .spinner-border {
    width: 40px;
    height: 40px;
    border-width: 3px;
  }

  .loading-content p {
    margin-top: 12px;
    color: var(--primary-color);
    font-weight: 500;
    font-size: 0.9rem;
  }

  /* App Container */
  .app-container {
    display: flex;
    min-height: 100vh;
  }

  /* Sidebar */
  .sidebar {
    width: var(--sidebar-width);
    background: linear-gradient(180deg, var(--primary-color) 0%, var(--primary-dark) 100%);
    color: #fff;
    position: fixed;
    top: 0;
    left: 0;
    bottom: 0;
    display: flex;
    flex-direction: column;
    z-index: 1000;
    transition: transform 0.3s ease;
    box-shadow: 4px 0 20px rgba(0, 0, 0, 0.15);
  }

  .sidebar-header {
    padding: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
  }

  .sidebar-logo {
    width: 45px;
    height: 45px;
    background: #fff;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .sidebar-logo i {
    font-size: 24px;
    color: var(--primary-color);
  }

  .sidebar-brand h5 {
    margin: 0;
    font-size: 1rem;
    font-weight: 600;
  }

  .sidebar-brand small {
    opacity: 0.7;
    font-size: 0.75rem;
  }

  .sidebar-toggle {
    display: none;
    background: none;
    border: none;
    color: #fff;
    font-size: 1.5rem;
    cursor: pointer;
    margin-left: auto;
  }

  .sidebar-user {
    padding: 15px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(255, 255, 255, 0.05);
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
  }

  .user-avatar {
    width: 40px;
    height: 40px;
    background: var(--accent-color);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
  }

  .user-info {
    flex: 1;
    min-width: 0;
  }

  .user-name {
    font-weight: 600;
    font-size: 0.9rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .user-role {
    font-size: 0.75rem;
    opacity: 0.7;
  }

  /* Quick Stats in Sidebar */
  .nav-quick-stats {
    padding: 10px 20px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
  }

  .quick-stats-container {
    display: flex;
    gap: 10px;
    justify-content: center;
  }

  .quick-stat {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 12px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    cursor: pointer;
    transition: var(--transition);
    font-size: 0.85rem;
  }

  .quick-stat:hover {
    background: rgba(255, 255, 255, 0.2);
  }

  .quick-stat.danger {
    background: rgba(239, 68, 68, 0.2);
  }

  .quick-stat.danger:hover {
    background: rgba(239, 68, 68, 0.3);
  }

  .quick-stat i {
    font-size: 1rem;
  }

  .quick-stat span {
    font-weight: 600;
  }

  /* Sidebar Navigation */
  .sidebar-nav {
    flex: 1;
    padding: 15px 0;
    overflow-y: auto;
    list-style: none;
  }

  .sidebar-nav .nav-section {
    padding: 15px 20px 8px;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    opacity: 0.5;
    margin-top: 5px;
  }

  .sidebar-nav .nav-link {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    color: rgba(255, 255, 255, 0.8);
    text-decoration: none;
    transition: var(--transition);
    position: relative;
    font-size: 0.9rem;
  }

  .sidebar-nav .nav-link:hover {
    background: rgba(255, 255, 255, 0.1);
    color: #fff;
  }

  .sidebar-nav .nav-link.active {
    background: rgba(255, 255, 255, 0.15);
    color: #fff;
  }

  .sidebar-nav .nav-link.active::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 4px;
    background: var(--accent-color);
  }

  .sidebar-nav .nav-link i {
    font-size: 1.1rem;
    width: 22px;
    text-align: center;
  }

  .sidebar-nav .nav-link .badge {
    margin-left: auto;
    font-size: 0.7rem;
  }

  /* Submenu Styles */
  .nav-has-submenu {
    position: relative;
  }

  .nav-submenu-toggle {
    cursor: pointer;
  }

  .submenu-icon {
    margin-left: auto;
    font-size: 0.8rem;
    transition: transform 0.3s ease;
  }

  .submenu-icon.rotate {
    transform: rotate(180deg);
  }

  .nav-submenu {
    list-style: none;
    padding: 0;
    margin: 0;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
    background: rgba(0, 0, 0, 0.15);
  }

  .nav-submenu.show {
    max-height: 300px;
  }

  .nav-submenu li {
    padding: 0;
  }

  .nav-submenu .nav-link {
    padding: 10px 20px 10px 52px;
    font-size: 0.85rem;
  }

  .nav-submenu .nav-link i {
    font-size: 0.9rem;
  }

  /* Sidebar Footer */
  .sidebar-footer {
    padding: 15px 20px;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
  }

  .sidebar-footer-info {
    text-align: center;
    margin-bottom: 10px;
  }

  .sidebar-footer-info small {
    opacity: 0.6;
  }

  /* Main Content */
  .main-content {
    flex: 1;
    margin-left: var(--sidebar-width);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Top Bar */
  .top-bar {
    height: var(--topbar-height);
    background: #fff;
    border-bottom: 1px solid #e9ecef;
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 15px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .menu-toggle {
    display: none;
    background: none;
    border: none;
    font-size: 1.5rem;
    color: var(--primary-color);
    cursor: pointer;
  }

  /* Breadcrumb */
  .breadcrumb-nav {
    display: none;
  }

  @media (min-width: 768px) {
    .breadcrumb-nav {
      display: block;
    }
  }

  .breadcrumb {
    font-size: 0.85rem;
  }

  .breadcrumb-item a {
    color: var(--primary-color);
    text-decoration: none;
  }

  .breadcrumb-item.active {
    color: var(--text-muted);
  }

  .top-bar-title {
    flex: 1;
  }

  .top-bar-title h4 {
    margin: 0;
    font-size: 1.25rem;
    color: var(--primary-color);
  }

  .top-bar-actions {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* Global Search */
  .global-search .input-group {
    width: 250px;
  }

  .global-search .input-group-text {
    background: #f8f9fa;
    border-right: none;
  }

  .global-search .form-control {
    border-left: none;
    padding-left: 0;
  }

  .global-search .form-control:focus {
    box-shadow: none;
    border-color: #ced4da;
  }

  /* Notification Badge */
  .notification-badge {
    position: absolute;
    top: 2px;
    right: 2px;
    background: var(--danger-color);
    color: #fff;
    font-size: 0.65rem;
    padding: 2px 5px;
    border-radius: 10px;
    min-width: 18px;
    text-align: center;
  }

  .notifications-dropdown {
    width: 320px;
    max-height: 400px;
    overflow-y: auto;
  }

  .notifications-dropdown .dropdown-header {
    font-weight: 600;
    border-bottom: 1px solid #e9ecef;
    padding: 12px 16px;
  }

  .notifications-list {
    max-height: 300px;
    overflow-y: auto;
  }

  .btn-icon {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f8f9fa;
    border: none;
    color: #6c757d;
    transition: var(--transition);
  }

  .btn-icon:hover {
    background: #e9ecef;
    color: var(--primary-color);
  }

  /* Page Content */
  .page-content {
    flex: 1;
    padding: 20px;
  }

  .page {
    animation: fadeIn 0.15s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Tab Navigation for Forms */
  .nav-tabs-custom {
    border-bottom: 2px solid #e9ecef;
    margin-bottom: 20px;
  }

  .nav-tabs-custom .nav-link {
    border: none;
    border-bottom: 3px solid transparent;
    color: var(--text-muted);
    font-weight: 500;
    padding: 12px 20px;
    margin-bottom: -2px;
    transition: var(--transition);
  }

  .nav-tabs-custom .nav-link:hover {
    color: var(--primary-color);
    border-bottom-color: var(--primary-light);
  }

  .nav-tabs-custom .nav-link.active {
    color: var(--primary-color);
    border-bottom-color: var(--primary-color);
    background: transparent;
  }

  .nav-tabs-custom .nav-link i {
    margin-right: 8px;
  }

  .tab-content-custom {
    background: #fff;
    border-radius: var(--border-radius);
    box-shadow: var(--box-shadow);
    padding: 25px;
  }

  /* Cards */
  .card {
    border: none;
    border-radius: var(--border-radius);
    box-shadow: var(--box-shadow);
    margin-bottom: 20px;
  }

  .card-header {
    background: #fff;
    border-bottom: 1px solid #e9ecef;
    padding: 15px 20px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .card-body {
    padding: 20px;
  }

  /* Stat Cards */
  .stat-card {
    background: #fff;
    border-radius: var(--border-radius);
    padding: 20px;
    box-shadow: var(--box-shadow);
    display: flex;
    align-items: center;
    gap: 15px;
    transition: transform 0.15s ease-out, box-shadow 0.15s ease-out;
    cursor: default;
  }

  .stat-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--box-shadow-hover);
  }

  .stat-card.clickable {
    cursor: pointer;
  }

  .stat-icon {
    width: 60px;
    height: 60px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.75rem;
  }

  .stat-icon.primary { background: rgba(26, 54, 93, 0.1); color: var(--primary-color); }
  .stat-icon.success { background: rgba(16, 185, 129, 0.1); color: var(--success-color); }
  .stat-icon.warning { background: rgba(245, 158, 11, 0.1); color: var(--warning-color); }
  .stat-icon.danger { background: rgba(239, 68, 68, 0.1); color: var(--danger-color); }
  .stat-icon.info { background: rgba(59, 130, 246, 0.1); color: var(--info-color); }

  .stat-content h3 {
    font-size: 1.75rem;
    font-weight: 700;
    margin: 0;
    color: var(--primary-color);
  }

  .stat-content p {
    margin: 0;
    color: #6c757d;
    font-size: 0.9rem;
  }

  /* Role-Based Dashboard Sections */
  .dashboard-section {
    margin-bottom: 30px;
  }

  .dashboard-section-title {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--primary-color);
    margin-bottom: 15px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .dashboard-section-title i {
    color: var(--accent-color);
  }

  /* Document Upload Zone */
  .upload-zone {
    border: 2px dashed #d1d5db;
    border-radius: var(--border-radius);
    padding: 40px 20px;
    text-align: center;
    background: #fafafa;
    transition: var(--transition);
    cursor: pointer;
  }

  .upload-zone:hover,
  .upload-zone.dragover {
    border-color: var(--primary-color);
    background: rgba(26, 54, 93, 0.05);
  }

  .upload-zone i {
    font-size: 3rem;
    color: #9ca3af;
    margin-bottom: 15px;
  }

  .upload-zone p {
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  .upload-zone .btn {
    margin-top: 10px;
  }

  /* Uploaded Files List */
  .files-list {
    margin-top: 20px;
  }

  .file-item {
    display: flex;
    align-items: center;
    padding: 12px 15px;
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: var(--border-radius-sm);
    margin-bottom: 10px;
    transition: var(--transition);
  }

  .file-item:hover {
    border-color: var(--primary-color);
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
  }

  .file-item .file-icon {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    background: #f3f4f6;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 12px;
  }

  .file-item .file-icon i {
    font-size: 1.25rem;
    color: var(--primary-color);
  }

  .file-item .file-info {
    flex: 1;
  }

  .file-item .file-name {
    font-weight: 500;
    color: var(--text-color);
    margin-bottom: 2px;
  }

  .file-item .file-meta {
    font-size: 0.8rem;
    color: var(--text-muted);
  }

  .file-item .file-actions {
    display: flex;
    gap: 8px;
  }

  .file-item .file-actions .btn {
    padding: 4px 8px;
    font-size: 0.85rem;
  }

  /* Document Category Badge */
  .file-category {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.7rem;
    font-weight: 500;
    text-transform: uppercase;
    margin-left: 8px;
  }

  .file-category.evidence { background: #dbeafe; color: #1e40af; }
  .file-category.supporting { background: #fef3c7; color: #92400e; }
  .file-category.policy { background: #d1fae5; color: #065f46; }
  .file-category.correspondence { background: #f3e8ff; color: #6b21a8; }
  .file-category.other { background: #f3f4f6; color: #374151; }

  /* Tables */
  .table-container {
    background: #fff;
    border-radius: var(--border-radius);
    box-shadow: var(--box-shadow);
    overflow: hidden;
  }

  .table {
    margin-bottom: 0;
  }

  .table thead th {
    background: #f8f9fa;
    border-bottom: 2px solid #e9ecef;
    font-weight: 600;
    color: var(--primary-color);
    white-space: nowrap;
    padding: 12px 15px;
  }

  .table tbody td {
    padding: 12px 15px;
    vertical-align: middle;
  }

  .table tbody tr:hover {
    background: #f8f9fa;
  }

  .table-clickable tbody tr {
    cursor: pointer;
  }

  /* Badges */
  .badge {
    font-weight: 500;
    padding: 5px 10px;
    border-radius: 6px;
  }

  .badge-status {
    font-size: 0.75rem;
  }

  /* Status Colors */
  .status-draft { background: #6c757d; color: #fff; }
  .status-submitted { background: #17a2b8; color: #fff; }
  .status-under-review { background: #ffc107; color: #000; }
  .status-revision-required { background: #fd7e14; color: #fff; }
  .status-approved { background: #28a745; color: #fff; }
  .status-sent-to-auditee { background: #1a365d; color: #fff; }
  .status-not-due { background: #6c757d; color: #fff; }
  .status-pending { background: #17a2b8; color: #fff; }
  .status-in-progress { background: #ffc107; color: #000; }
  .status-implemented { background: #28a745; color: #fff; }
  .status-verified { background: #1a365d; color: #fff; }
  .status-overdue { background: #dc3545; color: #fff; }
  .status-not-implemented { background: #dc3545; color: #fff; }
  .status-closed { background: #198754; color: #fff; }
  .status-pending-hoa-review { background: #6f42c1; color: #fff; }

  /* Risk Colors */
  .risk-extreme { background: #dc3545; color: #fff; }
  .risk-high { background: #fd7e14; color: #fff; }
  .risk-medium { background: #ffc107; color: #000; }
  .risk-low { background: #28a745; color: #fff; }

  /* Buttons */
  .btn-primary {
    background: var(--primary-color);
    border-color: var(--primary-color);
  }

  .btn-primary:hover {
    background: var(--primary-light);
    border-color: var(--primary-light);
  }

  .btn-accent {
    background: var(--accent-color);
    border-color: var(--accent-color);
    color: #fff;
  }

  .btn-accent:hover {
    background: var(--accent-light);
    border-color: var(--accent-light);
    color: #fff;
  }

  /* Forms */
  .form-control, .form-select {
    border-radius: 8px;
    border: 2px solid #e9ecef;
    padding: 10px 15px;
    transition: var(--transition);
  }

  .form-control:focus, .form-select:focus {
    border-color: var(--primary-color);
    box-shadow: 0 0 0 3px rgba(26, 54, 93, 0.1);
  }

  .form-label {
    font-weight: 500;
    color: #495057;
    margin-bottom: 8px;
  }

  .form-label .required {
    color: var(--danger-color);
  }

  /* Alerts */
  .alert {
    border-radius: var(--border-radius);
    border: none;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .alert-card {
    background: #fff;
    border-radius: var(--border-radius);
    padding: 15px 20px;
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 10px;
    box-shadow: var(--box-shadow);
    border-left: 4px solid;
  }

  .alert-card.danger { border-left-color: var(--danger-color); }
  .alert-card.warning { border-left-color: var(--warning-color); }
  .alert-card.info { border-left-color: var(--info-color); }
  .alert-card.success { border-left-color: var(--success-color); }

  .alert-card .alert-icon {
    font-size: 1.5rem;
  }

  .alert-card.danger .alert-icon { color: var(--danger-color); }
  .alert-card.warning .alert-icon { color: var(--warning-color); }
  .alert-card.info .alert-icon { color: var(--info-color); }
  .alert-card.success .alert-icon { color: var(--success-color); }

  /* Modal */
  .modal-header {
    background: var(--primary-color);
    color: #fff;
    border-radius: 0;
  }

  .modal-header .btn-close {
    filter: brightness(0) invert(1);
  }

  .modal-content {
    border: none;
    border-radius: var(--border-radius);
    overflow: hidden;
  }

  /* Kanban View */
  .kanban-container {
    display: flex;
    gap: 20px;
    overflow-x: auto;
    padding-bottom: 20px;
  }

  .kanban-column {
    min-width: 280px;
    max-width: 320px;
    background: #f3f4f6;
    border-radius: var(--border-radius);
    padding: 15px;
  }

  .kanban-column-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 12px;
    border-bottom: 2px solid #e5e7eb;
    margin-bottom: 12px;
  }

  .kanban-column-title {
    font-weight: 600;
    font-size: 0.9rem;
    color: var(--text-color);
  }

  .kanban-column-count {
    background: #e5e7eb;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 0.8rem;
