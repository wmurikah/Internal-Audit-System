<script>
// Global State
window.currentUser = null;
window.appDropdowns = null;
let currentPage = 'dashboard';
let pageParams = {};

// Client-side cache for performance
const ClientCache = {
  _cache: new Map(),
  _ttls: new Map(),

  set(key, value, ttlMs = 300000) {
    this._cache.set(key, value);
    this._ttls.set(key, Date.now() + ttlMs);
  },

  get(key) {
    const ttl = this._ttls.get(key);
    if (ttl && Date.now() > ttl) {
      this._cache.delete(key);
      this._ttls.delete(key);
      return null;
    }
    return this._cache.get(key);
  },

  has(key) {
    return this.get(key) !== undefined;
  },

  invalidate(pattern) {
    if (pattern === '*') {
      this._cache.clear();
      this._ttls.clear();
    } else {
      for (const key of this._cache.keys()) {
        if (key.startsWith(pattern)) {
          this._cache.delete(key);
          this._ttls.delete(key);
        }
      }
    }
  }
};

// Parallel data loader
async function loadParallel(requests) {
  const results = {};
  const promises = requests.map(async req => {
    const cacheKey = req.cacheKey || `${req.action}_${JSON.stringify(req.data)}`;
    const cached = ClientCache.get(cacheKey);
    if (cached) {
      results[req.action] = cached;
      return;
    }
    const result = await apiCall(req.action, req.data || {});
    if (result) ClientCache.set(cacheKey, result, req.ttl || 300000);
    results[req.action] = result;
  });
  await Promise.all(promises);
  return results;
}

// Debounce & throttle utilities
function debounce(func, wait) {
  let timeout;
  return function(...args) {
    clearTimeout(timeout);
    timeout = setTimeout(() => func.apply(this, args), wait);
  };
}

function throttle(func, limit) {
  let inThrottle;
  return function(...args) {
    if (!inThrottle) {
      func.apply(this, args);
      inThrottle = true;
      setTimeout(() => inThrottle = false, limit);
    }
  };
}

// Initialization
document.addEventListener('DOMContentLoaded', initApp);

function initApp() {
  showLoading('Initializing...');

  // Include sessionToken for session-based authentication
  const sessionToken = sessionStorage.getItem('sessionToken') || '';

  google.script.run
    .withSuccessHandler(function(result) {
      hideLoading();
      if (result && result.success) {
        window.currentUser = result.user;
        window.appDropdowns = result.dropdowns;
        document.getElementById('userName').textContent = result.user.full_name;
        document.getElementById('userRole').textContent = result.user.role_name;
        setupNavigation(result.permissions);
        handleHashChange();
        window.addEventListener('hashchange', handleHashChange);
        if (result.user.must_change_password) { showChangePassword(); showToast('Please change your password', 'warning'); }
      } else if (result && result.requireLogin) {
        // Session expired or not authenticated - redirect to login
        sessionStorage.removeItem('sessionToken');
        window.top.location.href = window.top.location.pathname;
      } else {
        showToast(result?.error || 'Failed to initialize', 'danger');
        setTimeout(() => {
          sessionStorage.removeItem('sessionToken');
          window.top.location.href = window.top.location.pathname;
        }, 2000);
      }
    })
    .withFailureHandler(function(error) {
      hideLoading();
      console.error('Init error:', error);
      showToast('Connection error', 'danger');
    })
    .apiCall('getInitData', { sessionToken: sessionToken });
}

function setupNavigation(p) {
  if (!p.canCreateWorkPaper) document.getElementById('navNewWorkPaper')?.classList.add('d-none');
  if (!p.canViewReports) { document.getElementById('navReportsSection')?.classList.add('d-none'); document.getElementById('navReports')?.classList.add('d-none'); }
  if (!p.canManageUsers) {
    document.getElementById('navAdminSection')?.classList.add('d-none');
    document.getElementById('navUsers')?.classList.add('d-none');
    document.getElementById('navSettings')?.classList.add('d-none');
  }
  // Show analytics for auditors and management
  const auditorRoles = ['SUPER_ADMIN', 'HEAD_OF_AUDIT', 'SENIOR_AUDITOR', 'MANAGEMENT'];
  if (!auditorRoles.includes(window.currentUser?.role_code)) {
    document.getElementById('navAnalyticsSection')?.classList.add('d-none');
    document.getElementById('navAnalytics')?.classList.add('d-none');
  }
}

// Navigation
function handleHashChange() {
  const hash = window.location.hash.slice(1) || 'dashboard';
  const parts = hash.split('?');
  const page = parts[0];
  const params = {};
  if (parts[1]) parts[1].split('&').forEach(p => { const [k, v] = p.split('='); params[k] = decodeURIComponent(v); });
  navigateTo(page, params, false);
}

function navigateTo(page, params, updateHash = true) {
  params = params || {};
  if (updateHash) { window.location.hash = '#' + page + (Object.keys(params).length ? '?' + Object.entries(params).map(([k, v]) => k + '=' + encodeURIComponent(v)).join('&') : ''); return; }
  currentPage = page; pageParams = params;
  document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
  document.querySelectorAll('.sidebar-nav .nav-link').forEach(l => l.classList.toggle('active', l.dataset.page === page));
  
  const pageMap = {
    'dashboard': { el: 'page-dashboard', title: 'Dashboard', init: loadDashboard },
    'work-papers': { el: 'page-work-papers', title: 'Work Papers', init: () => { initWPFilters(); loadWorkPapers(params); } },
    'work-paper-form': { el: 'page-work-paper-form', title: params.id ? 'Edit Work Paper' : 'New Work Paper', init: () => initWorkPaperForm(params) },
    'work-paper-view': { el: 'page-work-paper-view', title: 'Work Paper Details', init: () => loadWorkPaperView(params) },
    'action-plans': { el: 'page-action-plans', title: 'Action Plans', init: () => loadActionPlans(params) },
    'action-plans-overdue': { el: 'page-action-plans', title: 'Overdue Action Plans', init: loadActionPlansOverdue },
    'action-plan-view': { el: 'page-action-plan-view', title: 'Action Plan Details', init: () => loadActionPlanView(params) },
    'reports': { el: 'page-reports', title: 'Reports', init: loadReports },
    'users': { el: 'page-settings', title: 'Settings - User Management', init: loadSettings },
    'settings': { el: 'page-settings', title: 'Settings', init: loadSettings },
    'analytics': { el: 'page-analytics', title: 'Analytics & Insights', init: initAnalyticsPage }
  };
  const config = pageMap[page] || pageMap['dashboard'];
  const pageEl = document.getElementById(config.el);
  if (pageEl) pageEl.style.display = 'block';
  document.getElementById('pageTitle').textContent = config.title;
  if (config.init) config.init();
  if (window.innerWidth < 992) toggleSidebar(false);
}

function refreshCurrentPage() { navigateTo(currentPage, pageParams, false); }

// API calls with comprehensive debugging
function apiCall(action, data) {
  return new Promise((resolve, reject) => {
    // START DEBUG LOGGING
    const debugId = 'API_' + Date.now();
    const sessionToken = sessionStorage.getItem('sessionToken');

    console.log('========================================');
    console.log('[' + debugId + '] API CALL START');
    console.log('[' + debugId + '] Action:', action);
    console.log('[' + debugId + '] Has session token:', !!sessionToken);
    console.log('[' + debugId + '] Session token length:', sessionToken ? sessionToken.length : 0);
    console.log('[' + debugId + '] Data keys:', data ? Object.keys(data) : 'null');
    console.log('[' + debugId + '] Timestamp:', new Date().toISOString());

    // Include sessionToken with all API calls for session-based authentication
    // This is required when deployed as "Anyone with Google Account"
    const requestData = {
      ...(data || {}),
      sessionToken: sessionToken || ''
    };

    console.log('[' + debugId + '] Calling google.script.run.apiCall...');
    const startTime = Date.now();

    google.script.run
      .withSuccessHandler(result => {
        const duration = Date.now() - startTime;
        console.log('[' + debugId + '] SUCCESS HANDLER CALLED');
        console.log('[' + debugId + '] Duration:', duration + 'ms');
        console.log('[' + debugId + '] Result type:', typeof result);
        console.log('[' + debugId + '] Result is null:', result === null);
        console.log('[' + debugId + '] Result is undefined:', result === undefined);

        if (result !== null && result !== undefined) {
          console.log('[' + debugId + '] Result keys:', Object.keys(result));
          console.log('[' + debugId + '] Result.success:', result.success);
          console.log('[' + debugId + '] Result.error:', result.error);
          console.log('[' + debugId + '] Full result:', JSON.stringify(result, null, 2).substring(0, 500));
        }

        // Ensure we always return an object
        if (result === null || result === undefined) {
          console.error('[' + debugId + '] CRITICAL: Backend returned null/undefined!');
          resolve({ success: false, error: 'No response from server (null/undefined)' });
        } else {
          // Check if session expired and redirect to login
          if (result.requireLogin) {
            console.log('[' + debugId + '] Session expired, redirecting to login');
            sessionStorage.removeItem('sessionToken');
            window.top.location.href = window.top.location.pathname;
            return;
          }
          console.log('[' + debugId + '] Resolving with result');
          resolve(result);
        }
        console.log('[' + debugId + '] API CALL END');
        console.log('========================================');
      })
      .withFailureHandler(error => {
        const duration = Date.now() - startTime;
        console.error('[' + debugId + '] FAILURE HANDLER CALLED');
        console.error('[' + debugId + '] Duration:', duration + 'ms');
        console.error('[' + debugId + '] Error type:', typeof error);
        console.error('[' + debugId + '] Error message:', error?.message);
        console.error('[' + debugId + '] Error stack:', error?.stack);
        console.error('[' + debugId + '] Full error:', error);
        console.error('[' + debugId + '] API CALL END (ERROR)');
        console.log('========================================');

        // Convert error to object for consistent handling
        resolve({ success: false, error: error?.message || 'Connection error' });
      })
      .apiCall(action, requestData);
  });
}

  }).then(r => {
    console.log('[TEST 2] Test connection result:', r);

    // Test 3: Get init data
    console.log('\n[TEST 3] Getting init data...');

  }).then(r => {

      success: r.success,
      error: r.error,

      hasDropdowns: !!r.dropdowns,
      hasPermissions: !!r.permissions
    });

    // Test 4: Run comprehensive diagnostic
    console.log('\n[TEST 4] Running comprehensive diagnostic...');

    console.log('[TEST 4] Diagnostic test result:', r);

    // Test 5: Get dashboard data

// DEBUG TOOL: Check session info
window.debugSessionInfo = function() {
  console.log('===== SESSION DEBUG INFO =====');
  console.log('Session token exists:', !!sessionStorage.getItem('sessionToken'));
  console.log('Session token length:', sessionStorage.getItem('sessionToken')?.length || 0);
  console.log('Session token (first 20 chars):', sessionStorage.getItem('sessionToken')?.substring(0, 20));
  console.log('Local storage keys:', Object.keys(localStorage));
  console.log('Session storage keys:', Object.keys(sessionStorage));
  console.log('=============================');
};

// Make debug functions available in console
console.log('%c=== DEBUG TOOLS LOADED ===', 'color: green; font-weight: bold');
console.log('%cTo test API connectivity, run: debugTestAPI()', 'color: cyan');
console.log('%cTo check session info, run: debugSessionInfo()', 'color: cyan');
console.log('%c=========================', 'color: green; font-weight: bold');

// UI helpers
function showLoading(text) { document.getElementById('loadingText').textContent = text || 'Loading...'; document.getElementById('loadingOverlay').classList.add('show'); }
function hideLoading() { document.getElementById('loadingOverlay').classList.remove('show'); }

function showToast(message, type, duration) {
  type = type || 'info'; duration = duration || 5000;
  const toastId = 'toast-' + Date.now();
  const bgClass = type === 'danger' ? 'bg-danger' : type === 'success' ? 'bg-success' : type === 'warning' ? 'bg-warning text-dark' : 'bg-info';
  document.getElementById('toastContainer').insertAdjacentHTML('beforeend', `<div id="${toastId}" class="toast ${bgClass} text-white" role="alert"><div class="d-flex"><div class="toast-body">${escapeHtml(message)}</div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div></div>`);
  const toast = new bootstrap.Toast(document.getElementById(toastId), { delay: duration });
  toast.show();
  document.getElementById(toastId).addEventListener('hidden.bs.toast', function() { this.remove(); });
}

function toggleSidebar(show) {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  if (show === undefined) show = !sidebar.classList.contains('show');
  sidebar.classList.toggle('show', show);
  overlay.classList.toggle('show', show);
}

// Formatting helpers
function formatDate(date) {
  if (!date) return '-';
  const d = new Date(date);
  if (isNaN(d.getTime())) return '-';
  return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
}

function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function getStatusClass(status) {
  const map = { 'Draft': 'status-draft', 'Submitted': 'status-submitted', 'Under Review': 'status-under-review', 'Revision Required': 'status-revision-required', 'Approved': 'status-approved', 'Sent to Auditee': 'status-sent-to-auditee', 'Not Due': 'status-not-due', 'Pending': 'status-pending', 'In Progress': 'status-in-progress', 'Implemented': 'status-implemented', 'Verified': 'status-verified', 'Overdue': 'status-overdue', 'Not Implemented': 'status-not-implemented' };
  return map[status] || 'bg-secondary';
}

function getRiskClass(risk) {
  const map = { 'Extreme': 'risk-extreme', 'High': 'risk-high', 'Medium': 'risk-medium', 'Low': 'risk-low' };
  return map[risk] || 'bg-secondary';
}

function populateDropdown(id, items, val, txt, ph) {
  const el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = ph ? `<option value="">${ph}</option>` : '';
  items.forEach(i => el.innerHTML += `<option value="${i[val]}">${i[txt]}</option>`);
}

// Auth functions
function handleLogout() {
  if (!confirm('Sign out?')) return;
  showLoading('Signing out...');
  google.script.run.withSuccessHandler(() => window.top.location.reload()).withFailureHandler(() => window.top.location.reload()).apiCall('logout', {});
}

function showChangePassword() {
  document.getElementById('currentPassword').value = '';
  document.getElementById('newPassword').value = '';
  document.getElementById('confirmPassword').value = '';
  new bootstrap.Modal(document.getElementById('changePasswordModal')).show();
}

function submitChangePassword() {
  const current = document.getElementById('currentPassword').value;
  const newPwd = document.getElementById('newPassword').value;
  const confirm = document.getElementById('confirmPassword').value;
  if (newPwd !== confirm) { showToast('Passwords do not match', 'danger'); return; }
  if (newPwd.length < 8) { showToast('Password must be at least 8 characters', 'danger'); return; }
  showLoading('Changing password...');
  apiCall('changePassword', { currentPassword: current, newPassword: newPwd }).then(r => {
    hideLoading();
    if (r.success) { bootstrap.Modal.getInstance(document.getElementById('changePasswordModal')).hide(); showToast('Password changed', 'success'); }
    else showToast(r.error || 'Error', 'danger');
  }).catch(() => { hideLoading(); showToast('Error', 'danger'); });
}

// Action plan functions
function saveActionPlan() {
  const id = document.getElementById('apFormId').value;
  const wpId = document.getElementById('apFormWorkPaperId').value;
  const desc = document.getElementById('apFormDesc').value;
  const dueDate = document.getElementById('apFormDueDate').value;
  const ownerSelect = document.getElementById('apFormOwners');
  const ownerIds = Array.from(ownerSelect.selectedOptions).map(o => o.value).join(',');
  const ownerNames = Array.from(ownerSelect.selectedOptions).map(o => o.text).join(', ');
  if (!desc || !dueDate) { showToast('Please fill required fields', 'danger'); return; }
  showLoading('Saving...');
  apiCall(id ? 'updateActionPlan' : 'createActionPlan', { action_plan_id: id || undefined, work_paper_id: wpId, action_description: desc, due_date: dueDate, owner_ids: ownerIds, owner_names: ownerNames }).then(r => {
    hideLoading(); bootstrap.Modal.getInstance(document.getElementById('actionPlanFormModal')).hide();
    if (r.success) { showToast('Saved', 'success'); if (currentPage === 'work-paper-view') loadWorkPaperView(pageParams); else loadActionPlans(); }
    else showToast(r.error || 'Error', 'danger');
  }).catch(() => { hideLoading(); showToast('Error', 'danger'); });
}

// File upload
function uploadFile() {
  const fileInput = document.getElementById('uploadFileInput');
  const desc = document.getElementById('uploadFileDesc').value;
  const entityType = document.getElementById('uploadEntityType').value;
  const entityId = document.getElementById('uploadEntityId').value;
  if (!fileInput.files.length) { showToast('Please select a file', 'danger'); return; }
  const file = fileInput.files[0];
  const reader = new FileReader();
  reader.onload = function(e) {
    const base64 = e.target.result.split(',')[1];
    showLoading('Uploading...');
    google.script.run.withSuccessHandler(function(result) {
      if (result.success) {
        const fileData = { file_name: file.name, file_description: desc, drive_file_id: result.file.drive_file_id, drive_url: result.file.drive_url, file_size: result.file.file_size, mime_type: result.file.mime_type };
        const action = entityType === 'WORK_PAPER' ? 'addWorkPaperFile' : 'addActionPlanEvidence';
        const payload = entityType === 'WORK_PAPER' ? { workPaperId: entityId, ...fileData } : { actionPlanId: entityId, ...fileData };
        apiCall(action, payload).then(r => { hideLoading(); bootstrap.Modal.getInstance(document.getElementById('uploadFileModal')).hide(); if (r.success) { showToast('Uploaded', 'success'); refreshCurrentPage(); } else showToast(r.error || 'Error', 'danger'); });
      } else { hideLoading(); showToast(result.error || 'Upload failed', 'danger'); }
    }).withFailureHandler(function() { hideLoading(); showToast('Upload error', 'danger'); }).uploadFileToDrive(file.name, file.type, base64, null);
  };
  reader.readAsDataURL(file);
}

function showUploadFile() {
  document.getElementById('uploadEntityType').value = 'WORK_PAPER';
  document.getElementById('uploadEntityId').value = currentWorkPaper?.work_paper_id || '';
  document.getElementById('uploadFileInput').value = '';
  document.getElementById('uploadFileDesc').value = '';
  new bootstrap.Modal(document.getElementById('uploadFileModal')).show();
}

function deleteFile(fileId) {
  if (!confirm('Delete this file?')) return;
  showLoading('Deleting...');
  apiCall('deleteWorkPaperFile', { fileId }).then(r => { hideLoading(); if (r.success) { showToast('Deleted', 'success'); refreshCurrentPage(); } else showToast(r.error || 'Error', 'danger'); }).catch(() => { hideLoading(); showToast('Error', 'danger'); });
}
</script>
