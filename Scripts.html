<script>
// Global State
window.currentUser = null;
window.appDropdowns = null;
window.currentWorkPaper = null;
window.currentActionPlan = null;
let currentPage = 'reports';
let pageParams = {};

// Loading state tracker
window.loadingState = {
  essential: false,      // User, permissions - MUST load first
  dropdowns: false,      // Users, affiliates, areas - load in background
  dashboardStats: false, // Dashboard numbers - load after UI ready
  sidebarCounts: false   // Pending/overdue counts - load last
};

// Client-side cache for performance
const ClientCache = {
  _cache: new Map(),
  _ttls: new Map(),

  set(key, value, ttlMs = 300000) {
    this._cache.set(key, value);
    this._ttls.set(key, Date.now() + ttlMs);
  },

  get(key) {
    const ttl = this._ttls.get(key);
    if (ttl && Date.now() > ttl) {
      this._cache.delete(key);
      this._ttls.delete(key);
      return null;
    }
    return this._cache.get(key);
  },

  has(key) {
    return this.get(key) !== undefined;
  },

  invalidate(pattern) {
    if (pattern === '*') {
      this._cache.clear();
      this._ttls.clear();
    } else {
      for (const key of this._cache.keys()) {
        if (key.startsWith(pattern)) {
          this._cache.delete(key);
          this._ttls.delete(key);
        }
      }
    }
  }
};

// Parallel data loader
async function loadParallel(requests) {
  const results = {};
  const promises = requests.map(async req => {
    const cacheKey = req.cacheKey || `${req.action}_${JSON.stringify(req.data)}`;
    const cached = ClientCache.get(cacheKey);
    if (cached) {
      results[req.action] = cached;
      return;
    }
    const result = await apiCall(req.action, req.data || {});
    if (result) ClientCache.set(cacheKey, result, req.ttl || 300000);
    results[req.action] = result;
  });
  await Promise.all(promises);
  return results;
}

// =============================================
// GLOBAL SAFE ACTION — Debounce wrapper for all action buttons
// Prevents duplicate submissions on rapid clicks
// =============================================
var _processingActions = {};

/**
 * Wrap any async action with debounce and button state management.
 * Usage: safeAction(this, async () => { ...existing logic... }, 60000)
 * @param {HTMLElement} buttonElement - The button that was clicked
 * @param {Function} actionFn - Async function to execute
 * @param {number} cooldownMs - Cooldown in ms before re-enabling (default 2000)
 */
async function safeAction(buttonElement, actionFn, cooldownMs) {
  cooldownMs = cooldownMs || 2000;

  // If button is already processing, ignore
  if (buttonElement && buttonElement.getAttribute('data-processing') === 'true') {
    return;
  }

  // Fallback: use a global map keyed by button id or text content
  var actionKey = buttonElement ? (buttonElement.id || buttonElement.textContent.trim()) : 'unknown';
  if (_processingActions[actionKey]) {
    return;
  }

  _processingActions[actionKey] = true;
  var originalHTML = '';

  if (buttonElement) {
    buttonElement.setAttribute('data-processing', 'true');
    originalHTML = buttonElement.innerHTML;
    buttonElement.disabled = true;
    buttonElement.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Processing...';
  }

  try {
    await actionFn();
  } catch (err) {
    console.error('safeAction error:', err);
    showToast(err.message || 'An error occurred', 'danger');
  } finally {
    setTimeout(function() {
      if (buttonElement) {
        buttonElement.disabled = false;
        buttonElement.innerHTML = originalHTML;
        buttonElement.removeAttribute('data-processing');
      }
      delete _processingActions[actionKey];
    }, cooldownMs);
  }
}

// =============================================
// FRONTEND VALIDATION — Work Paper & Action Plan mandatory fields
// =============================================

/**
 * Validate work paper fields before submission/sending.
 * @param {Object} data - Form data object
 * @param {string} targetStatus - The target status ('Submitted', 'Sent to Auditee', etc.)
 * @returns {string[]} Array of missing field labels (empty = valid)
 */
function validateWorkPaperFields(data, targetStatus) {
  var missing = [];

  // Always required for submission
  if (!data.observation_title || String(data.observation_title).trim() === '') {
    missing.push('Observation Title');
  }
  if (!data.observation_description || String(data.observation_description).trim() === '') {
    missing.push('Observation Description');
  }
  if (!data.risk_rating || String(data.risk_rating).trim() === '') {
    missing.push('Risk Rating');
  }
  if (!data.affiliate_code || String(data.affiliate_code).trim() === '') {
    missing.push('Affiliate');
  }
  if (!data.audit_area_id || String(data.audit_area_id).trim() === '') {
    missing.push('Audit Area');
  }

  // Additional fields required before sending to auditee
  if (targetStatus === 'Sent to Auditee' || targetStatus === 'Approved') {
    if (!data.responsible_ids || String(data.responsible_ids).trim() === '') {
      missing.push('Responsible Parties');
    }
    if (!data.cc_recipients || String(data.cc_recipients).trim() === '') {
      missing.push('CC Recipients');
    }
  }

  return missing;
}

/**
 * Validate action plan fields before submission.
 * @param {Object} data - Action plan form data
 * @returns {string[]} Array of missing field labels (empty = valid)
 */
function validateActionPlanFields(data) {
  var missing = [];
  if (!data.action_description || String(data.action_description).trim() === '') {
    missing.push('Action Description');
  }
  if (!data.owner_ids || String(data.owner_ids).trim() === '') {
    missing.push('Owner');
  }
  if (!data.due_date || String(data.due_date).trim() === '') {
    missing.push('Due Date');
  }
  return missing;
}

/**
 * Show validation error toast listing missing fields.
 * @param {string[]} missingFields - Array of missing field names
 */
function showValidationError(missingFields) {
  showToast('Please fill in the following required fields: ' + missingFields.join(', '), 'danger', 8000);
}

// Debounce & throttle utilities
function debounce(func, wait) {
  let timeout;
  return function(...args) {
    clearTimeout(timeout);
    timeout = setTimeout(() => func.apply(this, args), wait);
  };
}

function throttle(func, limit) {
  let inThrottle;
  return function(...args) {
    if (!inThrottle) {
      func.apply(this, args);
      inThrottle = true;
      setTimeout(() => inThrottle = false, limit);
    }
  };
}

// =============================================
// INSTANT LOAD ENGINE
// Three-tier init: SSR → localStorage → API fallback
// =============================================

// sessionStorage cache layer - cleared when browser tab closes (safer for sensitive data)
const LocalStore = {
  PREFIX: 'hpias_',

  set(key, value, ttlMinutes = 30) {
    try {
      const item = {
        data: value,
        expires: Date.now() + (ttlMinutes * 60 * 1000)
      };
      sessionStorage.setItem(this.PREFIX + key, JSON.stringify(item));
    } catch(e) { /* quota exceeded - ignore */ }
  },

  get(key) {
    try {
      const raw = sessionStorage.getItem(this.PREFIX + key);
      if (!raw) return null;
      const item = JSON.parse(raw);
      if (Date.now() > item.expires) {
        sessionStorage.removeItem(this.PREFIX + key);
        return null;
      }
      return item.data;
    } catch(e) { return null; }
  },

  clear() {
    const keys = Object.keys(sessionStorage).filter(k => k.startsWith(this.PREFIX));
    keys.forEach(k => sessionStorage.removeItem(k));
    // Also clear any legacy localStorage entries
    try {
      const legacyKeys = Object.keys(localStorage).filter(k => k.startsWith(this.PREFIX));
      legacyKeys.forEach(k => localStorage.removeItem(k));
    } catch(e) {}
  }
};

// Initialization
document.addEventListener('DOMContentLoaded', initApp);

function initApp() {
  const t0 = performance.now();
  
  // -----------------------------------------------
  // TIER 0: Login-provided data (stored during login, used on redirect)
  // This is the FASTEST path - data was already fetched during login
  // -----------------------------------------------
  const loginData = sessionStorage.getItem('loginInitData');
  if (loginData) {
    try {
      const parsed = JSON.parse(loginData);
      if (parsed && parsed.success) {
        console.log('⚡ TIER 0: Login-provided data - zero wait');
        sessionStorage.removeItem('loginInitData'); // One-time use
        applyInitData(parsed);
        LocalStore.set('initData', parsed, 15);
        console.log('⚡ UI ready in', Math.round(performance.now() - t0), 'ms');
        scheduleBackgroundLoads();
        
        // Run deferred login cleanup
        if (parsed._needsCleanup) {
          setTimeout(function() {
            apiCall('postLoginCleanup', {
              userId: parsed.user.user_id,
              email: parsed.user.email,
              roleCode: parsed.user.role_code
            }).catch(function() {});
          }, 2000);
        }
        return;
      }
    } catch(e) { sessionStorage.removeItem('loginInitData'); }
  }
  
  // -----------------------------------------------
  // TIER 1: SSR data (baked into HTML by the server)
  // Available instantly - no network call at all
  // -----------------------------------------------
  if (window.__INIT_DATA__ && window.__INIT_DATA__.success) {
    console.log('⚡ TIER 1: SSR init data found - instant load');
    applyInitData(window.__INIT_DATA__);
    LocalStore.set('initData', window.__INIT_DATA__, 15);
    console.log('⚡ UI ready in', Math.round(performance.now() - t0), 'ms');
    scheduleBackgroundLoads();
    return;
  }
  
  // -----------------------------------------------
  // TIER 2: localStorage cache (from a previous visit)
  // Available instantly - no network call
  // -----------------------------------------------
  const cached = LocalStore.get('initData');
  if (cached && cached.success) {
    console.log('⚡ TIER 2: localStorage cache hit - instant load');
    applyInitData(cached);
    console.log('⚡ UI ready in', Math.round(performance.now() - t0), 'ms');
    scheduleBackgroundLoads();
    silentRefreshInitData();
    return;
  }
  
  // -----------------------------------------------
  // TIER 3: API fallback (first visit ever, or all caches empty)
  // This is the slow path - should rarely happen
  // -----------------------------------------------
  console.log('TIER 3: No cache - falling back to API call');
  showLoading('Loading...');
  
  const sessionToken = sessionStorage.getItem('sessionToken') || '';
  
  google.script.run
    .withSuccessHandler(function(result) {
      hideLoading();
      if (result && result.success) {
        applyInitData(result);
        LocalStore.set('initData', result, 15);
        scheduleBackgroundLoads();
        console.log('UI ready in', Math.round(performance.now() - t0), 'ms (API fallback)');
      } else if (result && result.requireLogin) {
        handleAuthFailure();
      } else {
        showToast(result?.error || 'Failed to initialize', 'danger');
        setTimeout(handleAuthFailure, 2000);
      }
    })
    .withFailureHandler(function(error) {
      hideLoading();
      console.error('Init error:', error);
      showToast('Connection error. Please refresh.', 'danger');
    })
    .apiCall('getInitDataLight', { sessionToken: sessionToken });
}

// =============================================
// APPLY INIT DATA - Same logic regardless of source
// =============================================
function applyInitData(result) {
  hideLoading();
  
  window.currentUser = result.user;
  window.loadingState.essential = true;
  
  // Set dropdowns (may be empty from SSR/cache - filled later)
  window.appDropdowns = result.dropdowns || {
    affiliates: [], auditAreas: [], subAreas: [],
    users: [], auditees: [], auditors: [], roles: []
  };
  
  // Has dropdowns? Mark as loaded
  if (result.dropdowns && Object.keys(result.dropdowns).length > 2) {
    window.loadingState.dropdowns = true;
  }

  // Update UI
  document.getElementById('userName').textContent = result.user.full_name;
  document.getElementById('userRole').style.display = 'none';
  
  const profileName = document.getElementById('profileName');
  const profileEmail = document.getElementById('profileEmail');
  if (profileName) profileName.textContent = result.user.full_name;
  if (profileEmail) profileEmail.textContent = result.user.email;

  // Store permissions globally so other functions can reference them
  window.currentPermissions = result.permissions || {};

  // Setup navigation
  setupNavigation(result.permissions);
  handleHashChange();
  window.addEventListener('hashchange', handleHashChange);

  // Invalidate the server-side session when the tab/browser is closed.
  // sessionStorage auto-clears the token on the client side,
  // but we also need to tell the server so the session row is marked invalid.
  if (!window.__beforeUnloadRegistered) {
    window.__beforeUnloadRegistered = true;
    window.addEventListener('beforeunload', function() {
      var token = sessionStorage.getItem('sessionToken');
      if (token) {
        // Use sendBeacon for reliable fire-and-forget on tab close
        var baseUrl = window.__BASE_URL__ || window.location.pathname.replace(/\/exec.*/, '/exec');
        try {
          navigator.sendBeacon(
            baseUrl,
            JSON.stringify({ action: 'logout', data: { sessionToken: token } })
          );
        } catch(e) { /* best-effort */ }
      }
    });
  }

  // PATCHED: Block dashboard until password is changed
  // Skip if password was already changed in this session (prevents race condition loop)
  if (result.user.must_change_password && !sessionStorage.getItem('passwordChangedInSession')) {
    showForcePasswordChange();
  }
}

// =============================================
// BACKGROUND LOADS - Non-blocking, after UI is ready
// =============================================
function scheduleBackgroundLoads() {
  if (window.__backgroundLoadersStarted) return;
  window.__backgroundLoadersStarted = true;

  // Dropdowns - only if not already loaded
  if (!window.loadingState.dropdowns) {
    setTimeout(loadDropdownsBackground, 300);
  }
  
  // Sidebar counts - 1 second after UI
  setTimeout(loadSidebarCountsBackground, 1000);

  // Show pending findings banner for auditees after 1.5s
  setTimeout(checkAndShowPendingFindings, 1500);

  // Permission-specific fast refresh every 15s
  setInterval(refreshPermissionsQuick, 15000);

  // Periodic refresh every 15s (dropdowns, sidebar counts)
  setInterval(refreshBackgroundData, 15000);

  // Full init data refresh every 5 minutes (catches user flag changes like must_change_password)
  setInterval(silentRefreshInitData, 300000);
}

function loadDropdownsBackground() {
  if (window.loadingState.dropdowns) return;
  
  apiCall('getDropdowns', {})
    .then(result => {
      if (result && result.success !== false) {
        window.appDropdowns = { ...window.appDropdowns, ...result };
        window.loadingState.dropdowns = true;
        
        // Update localStorage cache with dropdowns included
        const cached = LocalStore.get('initData');
        if (cached) {
          cached.dropdowns = window.appDropdowns;
          LocalStore.set('initData', cached, 15);
        }
        
        console.log('Dropdowns loaded in background');
      }
    })
    .catch(err => console.error('Dropdown load error:', err));
}

function loadSidebarCountsBackground() {
  apiCall('getSidebarCounts', {})
    .then(result => {
      if (result && result.success) {
        updateQuickStats(result.pendingReview || 0, result.overdueActionPlans || 0, result.approvedQueue || 0);
        window.loadingState.sidebarCounts = true;
        var respBadge = document.getElementById('responsesReviewCount');
        if (respBadge) { var rc = result.pendingResponses || 0; respBadge.textContent = rc; respBadge.style.display = rc > 0 ? '' : 'none'; }
        updateNewBadges(result);

        // Post-login redirect for auditee roles: if overdue count > 0, redirect to overdue page
        if (!window._postLoginRedirectDone) {
          window._postLoginRedirectDone = true;
          var role = window.currentUser?.role_code || '';
          if (['JUNIOR_STAFF', 'UNIT_MANAGER', 'SENIOR_MGMT'].includes(role)) {
            var myOverdue = result.myOverdue || 0;
            var currentHash = window.location.hash.slice(1).split('?')[0];
            // Only redirect if user is on default page (not deep-linked)
            if (myOverdue > 0 && (!currentHash || currentHash === 'auditee-findings' || currentHash === 'reports')) {
              navigateTo('action-plans-overdue');
            } else if (!currentHash || currentHash === 'reports') {
              navigateTo('auditee-findings');
            }
          }
        }
      }
    })
    .catch(err => console.error('Sidebar counts error:', err));
}

function refreshBackgroundData() {
  apiCall('getSidebarCounts', {})
    .then(result => {
      if (result && result.success) {
        updateQuickStats(result.pendingReview || 0, result.overdueActionPlans || 0, result.approvedQueue || 0);
        var respBadge = document.getElementById('responsesReviewCount');
        if (respBadge) { var rc = result.pendingResponses || 0; respBadge.textContent = rc; respBadge.style.display = rc > 0 ? '' : 'none'; }
        updateNewBadges(result);
      }
    })
    .catch(() => {});
}

function updateNewBadges(result) {
  // My Work Papers badge
  var wpBadge = document.getElementById('wpListCount');
  if (wpBadge) { var c = result.myWorkPapers || 0; wpBadge.textContent = c; wpBadge.style.display = c > 0 ? '' : 'none'; }

  // My Action Plans badge
  var apBadge = document.getElementById('actionPlansCount');
  if (apBadge) { var c = result.myActionPlans || 0; apBadge.textContent = c; apBadge.style.display = c > 0 ? '' : 'none'; }

  // Overdue badge (RED)
  var odBadge = document.getElementById('overdueCount');
  if (odBadge) { var c = result.myOverdue || 0; odBadge.textContent = c; odBadge.style.display = c > 0 ? '' : 'none'; }

  // My Observations badge
  var obsBadge = document.getElementById('myObservationsCount');
  if (obsBadge) { var c = result.myObservations || 0; obsBadge.textContent = c; obsBadge.style.display = c > 0 ? '' : 'none'; }
}

// Fast permission refresh - checks every 15 seconds if permissions changed
function checkAndShowPendingFindings() {
  if (sessionStorage.getItem('findings_banner_dismissed') === 'true') return;

  var role = window.currentUser?.role_code || '';
  if (!['JUNIOR_STAFF', 'UNIT_MANAGER', 'SENIOR_MGMT'].includes(role)) return;

  // Use pre-loaded data from init if available
  var cached = LocalStore.get('initData');
  if (cached && cached.pendingFindings) {
    var counts = cached.pendingFindings;
    var pending = (counts.pendingResponse || 0) + (counts.rejected || 0);
    if (pending > 0) {
      showPendingFindingsBanner(pending, counts);
    }
    return;
  }

  // Fallback: make API call
  apiCall('getAuditeeFindingCounts', {})
    .then(function(result) {
      if (result && result.success && result.counts) {
        var pending = (result.counts.pendingResponse || 0) + (result.counts.rejected || 0);
        if (pending > 0) {
          showPendingFindingsBanner(pending, result.counts);
        }
      }
    })
    .catch(function() {});
}

function showPendingFindingsBanner(count, counts) {
  var rejected = counts.rejected || 0;
  var pendingNew = counts.pendingResponse || 0;

  var message = '';
  if (pendingNew > 0 && rejected > 0) {
    message = 'You have ' + pendingNew + ' new observation(s) and ' + rejected + ' observation(s) returned for revision.';
  } else if (pendingNew > 0) {
    message = 'You have ' + pendingNew + ' new audit observation(s) requiring your response.';
  } else {
    message = 'You have ' + rejected + ' observation(s) returned for revision by the audit team.';
  }

  var bannerHtml =
    '<div id="pendingFindingsBanner" class="pending-findings-banner">' +
    '  <div class="banner-content">' +
    '    <div class="banner-icon"><i class="bi bi-bell-fill"></i></div>' +
    '    <div class="banner-text">' +
    '      <strong>Action Required</strong>' +
    '      <p>' + message + '</p>' +
    '    </div>' +
    '    <div class="banner-actions">' +
    '      <button class="btn btn-light btn-sm" onclick="navigateTo(\'auditee-findings\'); dismissFindingsBanner();">' +
    '        <i class="bi bi-arrow-right me-1"></i>View Findings' +
    '      </button>' +
    '      <button class="btn btn-outline-light btn-sm" onclick="dismissFindingsBanner();">' +
    '        Dismiss' +
    '      </button>' +
    '    </div>' +
    '  </div>' +
    '</div>';

  var pageContent = document.getElementById('pageContent');
  if (pageContent) {
    pageContent.insertAdjacentHTML('afterbegin', bannerHtml);
  }
}

function dismissFindingsBanner() {
  var banner = document.getElementById('pendingFindingsBanner');
  if (banner) {
    banner.style.opacity = '0';
    banner.style.transform = 'translateY(-20px)';
    setTimeout(function() { banner.remove(); }, 300);
  }
  sessionStorage.setItem('findings_banner_dismissed', 'true');
}

function refreshPermissionsQuick() {
  apiCall('getInitDataLight', {})
    .then(function(result) {
      if (result && result.success && result.permissions) {
        var newPermsStr = JSON.stringify(result.permissions);
        var oldPermsStr = JSON.stringify(window.currentPermissions);
        if (newPermsStr !== oldPermsStr) {
          console.log('Permissions changed — updating UI');
          window.currentPermissions = result.permissions;
          setupNavigation(result.permissions);
          var cached = LocalStore.get('initData');
          if (cached) {
            cached.permissions = result.permissions;
            LocalStore.set('initData', cached, 15);
          }
        }
      }
    })
    .catch(function() { /* silent fail */ });
}

// Silent refresh: update cached data without blocking UI
function silentRefreshInitData() {
  const sessionToken = sessionStorage.getItem('sessionToken') || '';

  google.script.run
    .withSuccessHandler(function(result) {
      if (result && result.success) {
        // Prevent stale must_change_password from overwriting a successful change
        if (sessionStorage.getItem('passwordChangedInSession') && result.user) {
          result.user.must_change_password = false;
          // Clear the flag once server confirms the change
          if (!result.user.must_change_password) {
            // Server has caught up - flag can stay for the session to be safe
          }
        }
        // Update in-memory state
        window.currentUser = result.user;
        if (result.permissions) {
          window.currentPermissions = result.permissions;
          setupNavigation(result.permissions);
        }
        // Update cache
        const merged = { ...result, dropdowns: window.appDropdowns };
        LocalStore.set('initData', merged, 15);
      } else if (result && result.requireLogin) {
        // Session expired - force re-auth
        handleAuthFailure();
      }
    })
    .withFailureHandler(function() {
      // Silent fail - user already has cached UI
    })
    .apiCall('getInitDataLight', { sessionToken: sessionToken });
}

function handleAuthFailure() {
  LocalStore.clear();
  sessionStorage.removeItem('sessionToken');
  sessionStorage.removeItem('passwordChangedInSession');
  sessionStorage.clear();
  redirectToLogin();
}

// Legacy alias
function initAppProgressive() { initApp(); }

function setupNavigation(p) {
  const role = window.currentUser?.role_code || '';

  // Debug log
  console.log('Setting up navigation for role:', role);
  console.log('Permissions object:', p);

  // SUPER_ADMIN sees everything - no hiding needed
  if (role === 'SUPER_ADMIN') {
    console.log('SUPER_ADMIN detected - showing all navigation items');
    document.getElementById('navAuditWorkbench')?.classList.remove('d-none');
    document.getElementById('navAuditMgmtSection')?.classList.remove('d-none');
    document.getElementById('navInsightsSection')?.classList.remove('d-none');
    document.getElementById('navReports')?.classList.remove('d-none');
    document.getElementById('navAnalytics')?.classList.remove('d-none');
    document.getElementById('navAdminSection')?.classList.remove('d-none');
    document.getElementById('navUsers')?.classList.remove('d-none');
    document.getElementById('navSettings')?.classList.remove('d-none');
    document.getElementById('navQuickStats')?.classList.remove('d-none');
    document.getElementById('navNewWorkPaper')?.classList.remove('d-none');
    document.getElementById('navMyWorkPapers')?.classList.remove('d-none');
    document.getElementById('navPendingReview')?.classList.remove('d-none');
    document.getElementById('navSendQueue')?.classList.remove('d-none');
    document.getElementById('navResponsesReview')?.classList.remove('d-none');
    document.getElementById('navAuditeeSection')?.classList.remove('d-none');
    document.getElementById('navAuditeeMenu')?.classList.remove('d-none');
    return;
  }

  // All visibility is now driven by DB permissions (no hardcoded role arrays)

  // Work Paper creation
  if (!p || !p.canCreateWorkPaper) {
    document.getElementById('navNewWorkPaper')?.classList.add('d-none');
  }

  // Work Paper review/my items - requires approve permission
  if (!p || !p.canReviewWorkPaper) {
    document.getElementById('navPendingReview')?.classList.add('d-none');
  }

  // Send Queue - only reviewers (approve permission) can batch-send to auditees
  if (!p || !p.canApproveWorkPaper) {
    document.getElementById('navSendQueue')?.classList.add('d-none');
    document.getElementById('navResponsesReview')?.classList.add('d-none');
  }
  if (!p || !p.canCreateWorkPaper) {
    document.getElementById('navMyWorkPapers')?.classList.add('d-none');
  }

  // Dashboard (Reports) - visible to ALL users regardless of role
  document.getElementById('navReports')?.classList.remove('d-none');

  // AI Assist - driven by AI_ASSIST module permission
  if (!p || !p.canViewAIAssist) {
    document.getElementById('navAnalytics')?.classList.add('d-none');
  }

// Navigation
function getDefaultPage() {
  var role = window.currentUser?.role_code || '';

  // Auditee roles: redirect to overdue APs if they have any, otherwise My Action Plans / My Observations
  if (['JUNIOR_STAFF', 'UNIT_MANAGER', 'SENIOR_MGMT'].includes(role)) {

    if (overdueCount > 0) {

function handleHashChange() {
  const rawHash = window.location.hash;
  const hash = rawHash.slice(1) || getDefaultPage();
  console.log('handleHashChange triggered - raw hash:', rawHash, 'parsed:', hash);
  
  const parts = hash.split('?');
  const page = parts[0];
  const params = {};
  if (parts[1]) {
    parts[1].split('&').forEach(p => {
      const [k, v] = p.split('=');
      params[k] = decodeURIComponent(v);
    });
  }
  console.log('handleHashChange calling navigateTo:', page, params);
  navigateTo(page, params, false);
}

function navigateTo(page, params, updateHash = true) {
  params = params || {};

  // Backward compat: redirect old #dashboard to #audit-workbench
  if (page === 'dashboard') {
    page = 'audit-workbench';
  }

  console.log('navigateTo called:', page, params, 'updateHash:', updateHash);

  if (updateHash) {
    const hashParams = Object.keys(params).length
      ? '?' + Object.entries(params).map(([k, v]) => k + '=' + encodeURIComponent(v)).join('&')
      : '';
    window.location.hash = '#' + page + hashParams;
    return;
  }

  // Page-level access guard: restrict WP pages to allowed roles
  var userRole = window.currentUser ? window.currentUser.role_code : '';
  var wpPages = ['work-papers', 'work-paper-form', 'work-paper-view', 'pending-review', 'send-queue', 'responses-to-review'];
  var wpAllowedRoles = ['SUPER_ADMIN', 'SENIOR_AUDITOR', 'AUDITOR', 'BOARD_MEMBER'];
  if (wpPages.indexOf(page) >= 0 && wpAllowedRoles.indexOf(userRole) === -1) {
    showToast('You do not have access to this page', 'danger');
    navigateTo(getDefaultPage(), {}, false);
    return;
  }
  // OBSERVER cannot access create/edit pages
  if (page === 'work-paper-form' && userRole === 'BOARD_MEMBER') {
    showToast('Board Members have view-only access', 'warning');
    navigateTo('work-papers', {}, false);
    return;
  }
  // Board Reports: only OBSERVER and SUPER_ADMIN
  if (page === 'board-reports' && userRole !== 'BOARD_MEMBER' && userRole !== 'SUPER_ADMIN') {
    showToast('You do not have access to this page', 'danger');
    navigateTo(getDefaultPage(), {}, false);
    return;
  }

  currentPage = page;
  pageParams = params;

  // Hide all pages
  document.querySelectorAll('.page').forEach(p => p.style.display = 'none');

  // Update active nav links
  document.querySelectorAll('.sidebar-nav .nav-link').forEach(l => {
    const linkPage = l.dataset.page;
    l.classList.toggle('active', linkPage === page || (linkPage && page.startsWith(linkPage)));

  // Open relevant submenu
  if (typeof openSubmenuForPage === 'function') {

  // Page configuration
  const pageMap = {
    'audit-workbench': { el: 'page-audit-workbench', title: 'Audit Workbench', init: loadAuditWorkbench },
    'work-papers': { el: 'page-work-papers', title: 'Work Papers', init: () => { if (typeof initWPFilters === 'function') initWPFilters(); if (typeof loadWorkPapers === 'function') loadWorkPapers(params); } },
    'work-paper-form': { el: 'page-work-paper-form', title: params.id ? 'Edit Work Paper' : 'New Work Paper', init: () => { if (typeof initWorkPaperForm === 'function') initWorkPaperForm(params); else console.error('initWorkPaperForm not found!'); } },
    'work-paper-view': { el: 'page-work-paper-view', title: 'Work Paper Details', init: () => { if (typeof loadWorkPaperView === 'function') loadWorkPaperView(params); else console.error('loadWorkPaperView not found!'); } },
    'send-queue': { el: 'page-send-queue', title: 'Send Queue', init: () => { if (typeof loadSendQueue === 'function') loadSendQueue(); } },
    'responses-to-review': { el: 'page-responses-to-review', title: 'Responses to Review', init: () => { if (typeof loadResponsesToReview === 'function') loadResponsesToReview(); } },
    'action-plans': { el: 'page-action-plans', title: 'Action Plans', init: () => { if (typeof loadActionPlans === 'function') loadActionPlans(params); } },
    'action-plans-overdue': { el: 'page-action-plans', title: 'Overdue Action Plans', init: () => { if (typeof loadActionPlansOverdue === 'function') loadActionPlansOverdue(); else if (typeof loadActionPlans === 'function') loadActionPlans({ overdue: true }); } },
    'action-plan-view': { el: 'page-action-plan-view', title: 'Action Plan Details', init: () => { if (typeof loadActionPlanView === 'function') loadActionPlanView(params); } },
    'auditee-findings': { el: 'page-auditee-findings', title: 'My Audit Observations', init: () => { if (typeof loadAuditeeFindings === 'function') loadAuditeeFindings(); } },
    'auditee-response': { el: 'page-auditee-response', title: 'Observation Response', init: () => { if (typeof loadAuditeeResponse === 'function') loadAuditeeResponse(params); } },
    'reports': { el: 'page-reports', title: 'Dashboard', init: () => { if (typeof loadReports === 'function') loadReports(); } },
    'users': { el: 'page-settings', title: 'User Management', init: () => { if (typeof loadSettings === 'function') loadSettings({ tab: 'users' }); } },
    'settings': { el: 'page-settings', title: 'Settings', init: () => { if (typeof loadSettings === 'function') loadSettings(params); } },
    'analytics': { el: 'page-analytics', title: 'AI Assist', init: () => { if (typeof initAnalyticsPage === 'function') initAnalyticsPage(); } },
    'board-reports': { el: 'page-board-reports', title: 'Audit Reports', init: () => { if (typeof loadBoardReports === 'function') loadBoardReports(); } }

// In-flight request deduplication map.
// If the same action+data is already pending, reuse its Promise instead of
// firing a duplicate google.script.run call.  This eliminates redundant
// getSidebarCounts / getDropdowns calls that fire in quick succession.
var _inflightRequests = {};

function apiCall(action, data) {
  var dedupeKey = action + '_' + JSON.stringify(data || {});

  // If an identical request is already in flight, piggyback on it
  if (_inflightRequests[dedupeKey]) {
    return _inflightRequests[dedupeKey];
  }

  var promise = new Promise(function(resolve) {
    var requestData = Object.assign({}, data || {}, {
      sessionToken: sessionStorage.getItem('sessionToken') || ''
    });

    google.script.run
      .withSuccessHandler(function(result) {
        delete _inflightRequests[dedupeKey];
        if (result === null || result === undefined) {
          resolve({ success: false, error: 'No response from server' });
        } else if (result.requireLogin) {
          sessionStorage.removeItem('sessionToken');
          redirectToLogin();
        } else {
          resolve(result);
          // Auto-refresh sidebar counts after successful write actions
          if (WRITE_ACTIONS.indexOf(action) >= 0 && result && result.success !== false) {
            setTimeout(refreshSidebarCounts, 500);
          }
        }
      })
      .withFailureHandler(function(error) {
        delete _inflightRequests[dedupeKey];
        console.error('API error for ' + action + ':', error);
        resolve({ success: false, error: error?.message || 'Connection error' });
      })
      .apiCall(action, requestData);
  });

  _inflightRequests[dedupeKey] = promise;
  return promise;
}

// UI helpers
var _loadingTimeout = null;

function showLoading(text) {
  document.getElementById('loadingText').textContent = text || 'Loading...';
  document.getElementById('loadingOverlay').classList.add('show');

  // Safety: auto-hide overlay after 30 seconds to prevent permanent UI freeze
  clearTimeout(_loadingTimeout);

    if (document.getElementById('loadingOverlay').classList.contains('show')) {
      console.warn('Loading overlay auto-hidden after 30s timeout');
      hideLoading();
      showToast('The operation is taking longer than expected. You can continue using the system.', 'warning');
    }
  }, 30000);
}

function hideLoading() {
  document.getElementById('loadingOverlay').classList.remove('show');

}

function showToast(message, type, optionsOrDuration) {
  type = type || 'info';

  // Support both old signature (message, type, duration) and new (message, type, {duration, undoCallback})
  var duration = 5000;
  var undoCallback = null;
  if (typeof optionsOrDuration === 'object' && optionsOrDuration !== null) {
    duration = optionsOrDuration.duration || 5000;
    undoCallback = optionsOrDuration.undoCallback || null;
  } else if (typeof optionsOrDuration === 'number') {
    duration = optionsOrDuration;
  }

  var toastId = 'toast-' + Date.now();

  // Icon and title mapping
  var iconMap = {
    success: '<i class="bi bi-check-circle-fill"></i>',
    danger: '<i class="bi bi-exclamation-circle-fill"></i>',
    warning: '<i class="bi bi-exclamation-triangle-fill"></i>',
    info: '<i class="bi bi-info-circle-fill"></i>'
  };
  var titleMap = {
    success: 'Success',
    danger: 'Error',
    warning: 'Warning',
    info: 'Notice'
  };

  var icon = iconMap[type] || iconMap.info;
  var title = titleMap[type] || titleMap.info;
  var typeClass = 'toast-' + type;
  var undoBtn = undoCallback ? '<button class="btn-undo" data-toast-id="' + toastId + '">Undo</button>' : '';

  var html =
    '<div id="' + toastId + '" class="toast toast-styled ' + typeClass + '" role="alert" data-bs-autohide="true" data-bs-delay="' + duration + '">' +
    '  <div class="toast-inner">' +
    '    <div class="toast-accent"></div>' +
    '    <div class="toast-icon">' + icon + '</div>' +
    '    <div class="toast-content">' +
    '      <p class="toast-title">' + title + '</p>' +
    '      <p class="toast-message">' + escapeHtml(message) + '</p>' +
    undoBtn +
    '    </div>' +
    '    <button type="button" class="toast-close" data-bs-dismiss="toast" aria-label="Close">&times;</button>' +
    '  </div>' +
    '  <div class="toast-progress"><div class="toast-progress-bar" style="width:100%;"></div></div>' +
    '</div>';

  document.getElementById('toastContainer').insertAdjacentHTML('beforeend', html);
  var toastEl = document.getElementById(toastId);
  var toast = new bootstrap.Toast(toastEl, { delay: duration });
  toast.show();

  // Animate progress bar
  var progressBar = toastEl.querySelector('.toast-progress-bar');
  if (progressBar) {
    requestAnimationFrame(function() {
      progressBar.style.transitionDuration = duration + 'ms';
      progressBar.style.width = '0%';
    });
  }

  // Wire up undo button
  if (undoCallback) {
    var undoBtnEl = toastEl.querySelector('.btn-undo');
    if (undoBtnEl) {
      undoBtnEl.addEventListener('click', function(e) {
        e.stopPropagation();
        undoCallback();
        toast.hide();
      });
    }
  }

  toastEl.addEventListener('hidden.bs.toast', function() {
    this.remove();
  });
}

function toggleSidebar(show) {

// Formatting helpers
function formatDate(date) {
  if (!date) return '-';
  var d = new Date(date);
  if (isNaN(d.getTime())) return '-';
  return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
}

function formatDateTime(date) {
  if (!date) return '-';
  const d = new Date(date);
  if (isNaN(d.getTime())) return '-';
  return d.toLocaleDateString('en-US', {
    year: 'numeric', month: 'short', day: 'numeric',
    hour: '2-digit', minute: '2-digit'
  });
}

function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function getStatusClass(status) {
  if (!status) return 'bg-secondary';
  const s = status.toLowerCase().replace(/\s+/g, '-');
  const map = {
    'draft': 'status-draft',
    'submitted': 'status-submitted',
    'under-review': 'status-under-review',
    'revision-required': 'status-revision-required',
    'approved': 'status-approved',
    'sent-to-auditee': 'status-sent-to-auditee',
    'not-due': 'status-not-due',
    'pending': 'status-pending',
    'in-progress': 'status-in-progress',
    'implemented': 'status-implemented',
    'pending-verification': 'status-implemented',
    'verified': 'status-verified',
    'rejected': 'status-overdue',
    'overdue': 'status-overdue',
    'not-implemented': 'status-not-implemented',
    'closed': 'status-closed',
    'pending-hoa-review': 'status-pending-hoa-review'
  };
  return map[s] || 'bg-secondary';
}

function getRiskClass(risk) {
  if (!risk) return 'bg-secondary';
  const map = {
    'extreme': 'risk-extreme',
    'high': 'risk-high',
    'medium': 'risk-medium',
    'low': 'risk-low'
  };
  return map[risk.toLowerCase()] || 'bg-secondary';
}

function populateDropdown(id, items, valueField, textField, placeholder) {
  const el = document.getElementById(id);
  if (!el) return;

  el.innerHTML = placeholder ? `<option value="">${placeholder}</option>` : '';

  if (items && items.length) {
    items.forEach(item => {
      el.innerHTML += `<option value="${item[valueField]}">${escapeHtml(item[textField])}</option>`;
    });
  }
}

function populateMultiSelect(id, items, valueField, textField) {

// Auth functions
// PATCHED: Use GAS sandbox-safe anchor redirect instead of window.top.location.reload()
function handleLogout() {
  if (!confirm('Are you sure you want to sign out?')) return;

  const token = sessionStorage.getItem('sessionToken') || '';

  // Clear all caches and redirect immediately for fast UX
  LocalStore.clear();
  sessionStorage.removeItem('sessionToken');
  sessionStorage.clear();

  // Fire-and-forget logout call; do not block redirect
  google.script.run
    .withSuccessHandler(function() {})
    .withFailureHandler(function() {})
    .apiCall('logout', { sessionToken: token });

  redirectToLogin();
}

function redirectToLogin() {
  var baseUrl = window.__BASE_URL__ || window.location.pathname.replace(/\/exec.*/, '/exec');
  // Explicitly navigate to login page
  var loginUrl = baseUrl + (baseUrl.indexOf('?') === -1 ? '?page=login' : '&page=login');
  var a = document.createElement('a');
  a.href = loginUrl;
  a.target = '_top';
  document.body.appendChild(a);
  a.click();
}

function showChangePassword() {
  document.getElementById('currentPassword').value = '';
  document.getElementById('newPassword').value = '';
  document.getElementById('confirmPassword').value = '';
  bootstrap.Modal.getOrCreateInstance(document.getElementById('changePasswordModal')).show();
}

function submitChangePassword() {
  const current = document.getElementById('currentPassword').value;
  const newPwd = document.getElementById('newPassword').value;
  const confirm = document.getElementById('confirmPassword').value;

  if (newPwd !== confirm) {
    showToast('Passwords do not match', 'danger');
    return;
  }

  if (newPwd.length < 8) {
    showToast('Password must be at least 8 characters', 'danger');
    return;
  }

  // Validate password strength
  if (!/[A-Z]/.test(newPwd)) {
    showToast('Password must contain at least one uppercase letter', 'danger');
    return;
  }
  if (!/[a-z]/.test(newPwd)) {
    showToast('Password must contain at least one lowercase letter', 'danger');
    return;
  }
  if (!/[0-9]/.test(newPwd)) {
    showToast('Password must contain at least one digit', 'danger');
    return;
  }

  showLoading('Changing password...');
  apiCall('changePassword', { currentPassword: current, newPassword: newPwd })
    .then(r => {
      hideLoading();
      if (r.success) {
        bootstrap.Modal.getInstance(document.getElementById('changePasswordModal')).hide();
        showToast('Password changed successfully', 'success');
        if (window.currentUser) {
          window.currentUser.must_change_password = false;
        }
        sessionStorage.setItem('passwordChangedInSession', 'true');
      } else {
        showToast(r.error || 'Failed to change password', 'danger');
      }
    })
    .catch(() => {
      hideLoading();
      showToast('Error changing password', 'danger');
    });
}

function submitForcePasswordChange() {
  var current = document.getElementById('forceCurrentPwd').value;
  var newPwd = document.getElementById('forceNewPwd').value;
  var confirmPwd = document.getElementById('forceConfirmPwd').value;
  var errorEl = document.getElementById('forcePwdError');
  var btn = document.getElementById('forcePwdBtn');

  errorEl.style.display = 'none';

  if (!current) {
    errorEl.textContent = 'Enter your current/temporary password';
    errorEl.style.display = 'block';
    return;
  }
  if (newPwd.length < 8) {
    errorEl.textContent = 'Password must be at least 8 characters';
    errorEl.style.display = 'block';
    return;
  }
  if (!/[A-Z]/.test(newPwd) || !/[a-z]/.test(newPwd) || !/[0-9]/.test(newPwd)) {
    errorEl.textContent = 'Password needs uppercase, lowercase, and a number';
    errorEl.style.display = 'block';
    return;
  }
  if (newPwd !== confirmPwd) {
    errorEl.textContent = 'Passwords do not match';
    errorEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Changing...';

  apiCall('changePassword', { currentPassword: current, newPassword: newPwd })
    .then(function(r) {
      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-check-lg me-2"></i>Set New Password';
      if (r.success) {
        window.currentUser.must_change_password = false;
        // Mark that password was changed in this session to prevent race condition loop
        sessionStorage.setItem('passwordChangedInSession', 'true');
        // Update cached data
        var cached = LocalStore.get('initData');
        if (cached && cached.user) {
          cached.user.must_change_password = false;
          LocalStore.set('initData', cached, 15);
        }
        // Reveal the app
        document.getElementById('forcePasswordOverlay').style.display = 'none';
        document.getElementById('sidebar').style.display = '';
        document.querySelector('.main-content').style.display = '';
        showToast('Password changed. Welcome!', 'success');
        // Force an immediate refresh to sync server state
        silentRefreshInitData();
      } else {
        errorEl.textContent = r.error || 'Failed to change password';
        errorEl.style.display = 'block';
      }
    })
    .catch(function() {
      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-check-lg me-2"></i>Set New Password';
      errorEl.textContent = 'Connection error. Try again.';
      errorEl.style.display = 'block';
    });
}

// Action plan functions
function saveActionPlan() {
  const id = document.getElementById('apFormId').value;
  const wpId = document.getElementById('apFormWorkPaperId').value;
  const desc = document.getElementById('apFormDesc').value;
  const dueDate = document.getElementById('apFormDueDate').value;
  const ownerSelect = document.getElementById('apFormOwners');
  const ownerIds = Array.from(ownerSelect.selectedOptions).map(o => o.value).join(',');
  const ownerNames = Array.from(ownerSelect.selectedOptions).map(o => o.text).join(', ');

  if (!desc || !dueDate) {
    showToast('Please fill required fields', 'danger');
    return;
  }

  showLoading('Saving...');
  const action = id ? 'updateActionPlan' : 'createActionPlan';
  const payload = {
    action_plan_id: id || undefined,
    work_paper_id: wpId,
    action_description: desc,
    due_date: dueDate,
    owner_ids: ownerIds,
    owner_names: ownerNames
  };

  apiCall(action, payload)
    .then(r => {
      hideLoading();
      bootstrap.Modal.getInstance(document.getElementById('actionPlanFormModal')).hide();
      if (r.success) {
        showToast('Action plan saved', 'success');
        ClientCache.invalidate('action');
        if (currentPage === 'work-paper-view') {
          loadWorkPaperView(pageParams);
        } else {
          if (typeof loadActionPlans === 'function') loadActionPlans();
        }
      } else {
        showToast(r.error || 'Error saving action plan', 'danger');
      }
    })
    .catch(() => {
      hideLoading();
      showToast('Error saving action plan', 'danger');
    });
}

// File upload functions
function showUploadModal(entityType, entityId) {
  document.getElementById('uploadEntityType').value = entityType;
  document.getElementById('uploadEntityId').value = entityId;
  document.getElementById('uploadFileInput').value = '';
  if (document.getElementById('uploadFileDesc')) document.getElementById('uploadFileDesc').value = '';
  if (document.getElementById('uploadFileCategory')) document.getElementById('uploadFileCategory').value = 'Evidence';
  bootstrap.Modal.getOrCreateInstance(document.getElementById('uploadFileModal')).show();
}

function showUploadFile() {
  showUploadModal('WORK_PAPER', window.currentWorkPaper?.work_paper_id || '');
}

function uploadFile() {
  const fileInput = document.getElementById('uploadFileInput');
  const desc = document.getElementById('uploadFileDesc')?.value || '';
  const category = document.getElementById('uploadFileCategory')?.value || 'Evidence';
  const entityType = document.getElementById('uploadEntityType').value;
  const entityId = document.getElementById('uploadEntityId').value;

  if (!fileInput.files.length) {
    showToast('Please select a file', 'danger');
    return;
  }

  const file = fileInput.files[0];
  const maxSize = 10 * 1024 * 1024; // 10 MB

  if (file.size > maxSize) {
    showToast('File size exceeds 10 MB limit', 'danger');
    return;
  }

  const reader = new FileReader();
  reader.onload = function(e) {
    const base64 = e.target.result.split(',')[1];
    showLoading('Uploading ' + file.name + '...');

    google.script.run
      .withSuccessHandler(function(result) {
        if (result && result.success) {
          const fileData = {
            file_name: file.name,
            file_description: desc,
            file_category: category,
            drive_file_id: result.file.drive_file_id,
            drive_url: result.file.drive_url,
            file_size: result.file.file_size,
            mime_type: result.file.mime_type
          };

          const action = entityType === 'WORK_PAPER' ? 'addWorkPaperFile' : 'addActionPlanEvidence';
          const payload = entityType === 'WORK_PAPER'
            ? { workPaperId: entityId, ...fileData }
            : { actionPlanId: entityId, ...fileData };

          apiCall(action, payload)
            .then(r => {
              hideLoading();
              bootstrap.Modal.getInstance(document.getElementById('uploadFileModal'))?.hide();
              if (r.success) {
                showToast('Uploaded successfully', 'success');
                ClientCache.invalidate('file');
                refreshCurrentPage();
              } else {
                showToast(r.error || 'Error saving file record', 'danger');
              }
            });
        } else {
          hideLoading();
          showToast(result?.error || 'Upload failed', 'danger');
        }
      })
      .withFailureHandler(function(error) {
        hideLoading();
        showToast('Upload error: ' + (error?.message || 'Unknown error'), 'danger');
      })
      .uploadFileToDrive(file.name, file.type, base64, null, sessionStorage.getItem('sessionToken') || '');
  };

  reader.onerror = function() {
    showToast('Error reading file', 'danger');
  };

  reader.readAsDataURL(file);
}

function deleteFile(fileId, entityType) {
  if (!confirm('Delete this file?')) return;

  showLoading('Deleting...');
  const action = entityType === 'ACTION_PLAN' ? 'deleteActionPlanEvidence' : 'deleteWorkPaperFile';

  apiCall(action, { fileId: fileId, evidenceId: fileId })
    .then(r => {
      hideLoading();
      if (r.success) {
        showToast('File deleted', 'success');
        ClientCache.invalidate('file');
        refreshCurrentPage();
      } else {
        showToast(r.error || 'Error deleting file', 'danger');
      }
    })
    .catch(() => {
      hideLoading();
      showToast('Error deleting file', 'danger');
    });
}

function getFileIcon(mimeType, fileName) {
  if (!mimeType && fileName) {
    const ext = fileName.split('.').pop().toLowerCase();
    const mimeMap = {
      'pdf': 'bi-file-earmark-pdf',
      'doc': 'bi-file-earmark-word',
      'docx': 'bi-file-earmark-word',
      'xls': 'bi-file-earmark-excel',
      'xlsx': 'bi-file-earmark-excel',
      'png': 'bi-file-earmark-image',
      'jpg': 'bi-file-earmark-image',
      'jpeg': 'bi-file-earmark-image',
      'gif': 'bi-file-earmark-image',
      'zip': 'bi-file-earmark-zip',
      'txt': 'bi-file-earmark-text',
      'csv': 'bi-file-earmark-spreadsheet'
    };
    return mimeMap[ext] || 'bi-file-earmark';
  }

  if (mimeType?.includes('pdf')) return 'bi-file-earmark-pdf';
  if (mimeType?.includes('word')) return 'bi-file-earmark-word';
  if (mimeType?.includes('excel') || mimeType?.includes('spreadsheet')) return 'bi-file-earmark-excel';
  if (mimeType?.includes('image')) return 'bi-file-earmark-image';
  if (mimeType?.includes('zip')) return 'bi-file-earmark-zip';
  return 'bi-file-earmark';
}

function formatFileSize(bytes) {
  if (!bytes || bytes === 0) return '-';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

function renderFilesList(files, containerId, entityType, canDelete = true) {
  const container = document.getElementById(containerId);
  if (!container) return;

  if (!files || files.length === 0) {
    container.innerHTML = '<div class="text-center text-muted py-3"><i class="bi bi-folder2-open me-2"></i>No files attached</div>';
    return;
  }

  let html = '';
  files.forEach(file => {
    const iconClass = getFileIcon(file.mime_type, file.file_name);
    const categoryClass = (file.file_category || 'other').toLowerCase();

    html += `
      <div class="file-item">
        <div class="file-icon">
          <i class="bi ${iconClass}"></i>
        </div>
        <div class="file-info">
          <div class="file-name">
            ${escapeHtml(file.file_name || 'Unknown')}
            ${file.file_category ? `<span class="file-category ${categoryClass}">${file.file_category}</span>` : ''}
          </div>
          <div class="file-meta">
            ${formatFileSize(file.file_size)} | Uploaded ${formatDate(file.uploaded_at)}
            ${file.uploaded_by_name ? ' by ' + escapeHtml(file.uploaded_by_name) : ''}
          </div>
        </div>
        <div class="file-actions">
          ${file.drive_url ? `<a href="${file.drive_url}" target="_blank" class="btn btn-sm btn-outline-primary" title="View"><i class="bi bi-eye"></i></a>` : ''}
          ${canDelete ? `<button class="btn btn-sm btn-outline-danger" onclick="deleteFile('${file.file_id || file.evidence_id}', '${entityType}')" title="Delete"><i class="bi bi-trash"></i></button>` : ''}
        </div>
      </div>
    `;
  });

  container.innerHTML = html;
}

// Export to CSV helper
function exportToCSV(data, filename) {
  if (!data || !data.length) {
    showToast('No data to export', 'warning');
    return;
  }

  const headers = Object.keys(data[0]);
  const csvContent = [
    headers.join(','),
    ...data.map(row => headers.map(h => {
      let val = row[h] || '';
      if (typeof val === 'string' && (val.includes(',') || val.includes('"') || val.includes('\n'))) {
        val = '"' + val.replace(/"/g, '""') + '"';
      }
      return val;
    }).join(','))
  ].join('\n');

  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = filename || 'export.csv';
  link.click();
}

  const overdueCount = document.getElementById('overdueCount');

  if (pendingEl) pendingEl.textContent = pending || 0;

// Print helper
function printContent(elementId, title) {
  const content = document.getElementById(elementId);
  if (!content) return;

  const printWindow = window.open('', '_blank');
  printWindow.document.write(`
    <html>
    <head>
      <title>${title || 'Print'}</title>
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
      <style>
        body { padding: 20px; }
        @media print {
          .no-print { display: none; }
        }
      </style>
    </head>
    <body>
      <h2>${title || ''}</h2>
      ${content.innerHTML}
      <script>window.onload = function() { window.print(); window.close(); }<\/script>
    </body>
    </html>
  `);
  printWindow.document.close();
}

/**
 * Toggle sidebar collapsed state
 */
function toggleSidebarCollapse() {
  const sidebar = document.getElementById('sidebar');
  const mainContent = document.querySelector('.main-content');
  const toggleBtn = document.getElementById('sidebarCollapseToggle');
  const toggleIcon = toggleBtn?.querySelector('i');
  
  const isCollapsed = sidebar.classList.toggle('collapsed');
  
  // Update main content margin
  if (mainContent) {
    mainContent.classList.toggle('sidebar-collapsed', isCollapsed);
  }
  
  // Update toggle icon direction
  if (toggleIcon) {
    toggleIcon.className = isCollapsed ? 'bi bi-chevron-right' : 'bi bi-chevron-left';
  }
  
  // Save preference to localStorage
  localStorage.setItem('sidebarCollapsed', isCollapsed ? 'true' : 'false');
}

/**
 * Initialize sidebar state from saved preference
 */
function initSidebarState() {
  const savedState = localStorage.getItem('sidebarCollapsed');
  const sidebar = document.getElementById('sidebar');
  const mainContent = document.querySelector('.main-content');
  const toggleBtn = document.getElementById('sidebarCollapseToggle');
  const toggleIcon = toggleBtn?.querySelector('i');
  
  // Default to collapsed on desktop for cleaner look
  // Or restore saved preference
  const shouldCollapse = savedState === 'true';
  
  if (shouldCollapse && sidebar) {
    sidebar.classList.add('collapsed');
    if (mainContent) mainContent.classList.add('sidebar-collapsed');
    if (toggleIcon) toggleIcon.className = 'bi bi-chevron-right';
  }
}

/**
 * Expand sidebar (for hover or programmatic use)
 */
function expandSidebar() {
  const sidebar = document.getElementById('sidebar');
  const mainContent = document.querySelector('.main-content');
  
  if (sidebar) {
    sidebar.classList.remove('collapsed');
    if (mainContent) mainContent.classList.remove('sidebar-collapsed');
  }
}

/**
 * Collapse sidebar (for programmatic use)
 */
function collapseSidebar() {
  const sidebar = document.getElementById('sidebar');
  const mainContent = document.querySelector('.main-content');
  
  if (sidebar) {
    sidebar.classList.add('collapsed');
    if (mainContent) mainContent.classList.add('sidebar-collapsed');
  }
}

// Initialize sidebar state on page load
document.addEventListener('DOMContentLoaded', function() {
  // Small delay to ensure DOM is ready
  setTimeout(initSidebarState, 100);
});

// INACTIVITY TIMEOUT - Auto-redirect to login after 5 minutes
// ============================================================
var INACTIVITY_TIMEOUT_MS = 5 * 60 * 1000;
var _inactivityTimer = null;

function resetInactivityTimer() {
  if (_inactivityTimer) clearTimeout(_inactivityTimer);
  _inactivityTimer = setTimeout(function() {
    console.log('Session timed out due to inactivity');
    LocalStore.clear();
    sessionStorage.removeItem('sessionToken');
    sessionStorage.clear();
    redirectToLogin();
  }, INACTIVITY_TIMEOUT_MS);
}

['mousemove', 'mousedown', 'keydown', 'click', 'scroll', 'touchstart'].forEach(function(evt) {
  document.addEventListener(evt, resetInactivityTimer, { passive: true });
});

// Start inactivity timer on load
resetInactivityTimer();
